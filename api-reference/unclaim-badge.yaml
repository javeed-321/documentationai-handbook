openapi: 3.1.0
info:
  title: Unclaim badge
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/v1/badges/badgeMeta/{badgeId}/unclaim":
    post:
      summary: Unclaim badge
      description: ''
      operationId: unclaim-badge
      parameters:
      - name: badgeId
        in: path
        description: Unique ID of the badge.
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - ownerType
              - referenceId
              properties:
                ownerType:
                  type: string
                  description: Module for which the reward was created.
                  enum:
                  - LOYALTY
                  - REFERRAL_CAMPAIGNS
                  - JOURNEYS
                  - AUDIENCE_CAMPAIGNS
                  - REWARDS_CATALOG
                  - GOODWILL_MODULE
                  - MILESTONES
                referenceId:
                  type: string
                  description: Reference ID of the owner type.
            examples:
              Request Example:
                value:
                  ownerType: Loyalty
                  referenceId: '123'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample response:
                  value:
                    data:
                      ownerType: Loyalty
                      referenceId: '123'
                      isActive: false
                    errors: null
                    warnings: []
                  summary: Sample response
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      ownerType:
                        type: string
                        example: Loyalty
                      referenceId:
                        type: string
                        example: string
                      isActive:
                        type: boolean
                        example: false
                        default: true
                  errors: {}
                  warnings:
                    type: array
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - code: "curl --location 'https://eu.api.capillarytech.com/api_gateway/v1/badges/badgeMeta/69381220cebb9648d8974518/unclaim'\
            \ \\\n--header 'Accept: application/json' \\\n--header 'Content-Type:\
            \ application/json' \\\n--header 'accept: application/json' \\\n--header\
            \ 'Authorization: Basic bWFkaHVMjU2YQ==' \\\n--header 'Cookie: _cfuvid=GwR6P.Wo28InVQzxrZVpalpv9uu696nsUn.b7W_MO8Y-1772617632944-0.0.1.1-604800000'\
            \ \\\n--data '{\n    \"ownerType\": \"Loyalty\",\n    \"referenceId\"\
            : \"123\"\n}'"
          language: shell
          name: Example request
        samples-languages:
        - shell
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
