openapi: 3.1.0
info:
  title: Get Target Completion Details
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /das/getTargetCompletedExplodeLedger:
    get:
      summary: Get Target Completion Details
      description: ''
      operationId: get-target-completion-details
      parameters:
      - name: ledgerEntryTypes
        in: query
        description: "Type of entry recorded in a customer's points ledger. Values:\
          \ CREDIT, DEBIT"
        required: true
        schema:
          type: string
      - name: userId
        in: query
        description: Customer ID of the customer.
        required: true
        schema:
          type: integer
          format: int64
      - name: endDate
        in: query
        description: "Last date to which you want to retrieve the ledger information.\
          \ **Format**: YYYY-MM-DD.   **Example**: 2025-06-22"
        required: true
        schema:
          type: string
          format: date
      - name: startDate
        in: query
        description: "Start date to which you want to retrieve the ledger information.\
          \ **Format**: YYYY-MM-DD.   **Example**: 2025-06-01"
        required: true
        schema:
          type: string
          format: date
      - name: alternateCurrencyNames
        in: query
        description: Name of the alternate currency for which ledger information is
          retrieved.
        schema:
          type: string
      - name: page
        in: query
        description: "Retrieve details of a specific page. Page count starts from\
          \ 1.  Example: page=2 retrieves data on page 2."
        schema:
          type: integer
          format: int32
      - name: count
        in: query
        description: Number of results to display per page. The default value is 10.
          The maximum supported value is 100.
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample Response:
                  value: ''
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
