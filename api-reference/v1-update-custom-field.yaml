openapi: 3.1.0
info:
  title: Update reward custom field
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/brand/customfield/{id}:
    put:
      summary: Update reward custom field
      description: ''
      operationId: update-custom-field
      parameters:
      - name: id
        in: path
        description: Unique name identifier for the custom field.
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              - scope
              - dataType
              properties:
                name:
                  type: string
                  description: Unique name identifier for the custom field.
                orgId:
                  type: string
                  description: Unique identifier of the organisation. To retrieve
                    the orgId, use the Get Org Details API.
                description:
                  type: string
                  description: Description for the custom field.
                isMandatory:
                  type: boolean
                  description: Specify if the custom field is mandatory.
                isActive:
                  type: boolean
                  description: Parameter to define if the custom field is active or
                    not
                scope:
                  type: string
                  description: Specify where the additional custom fields will apply
                  enum:
                  - REWARD
                  - ISSUE_REWARD
                  - CATALOGUE_PROMOTION
                dataType:
                  type: string
                  description: Type of data for the custom field. 255 is the character
                    limit with datatype as string
                  enum:
                  - BOOLEAN
                  - ENUM
                  - DATE
                  - STRING
                  - INTEGER
                enumValues:
                  type: array
                  description: Object containing the enum values. This parameter is
                    required if dataType is ENUM.
                  items:
                    type: string
            examples:
              Request body:
                value:
                  orgId: 100458
                  name: CF1A_update
                  description: CF1A
                  isMandatory: false
                  isActive: true
                  scope: REWARD
                  defaultValue: null
                  dataType: STRING
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                'Scope: REWARD':
                  value: "{\n    \"id\": 18880,\n    \"orgId\": 100737,\n    \"name\"\
                    : \"age_update\",\n    \"description\": \"CF1A\",\n    \"isMandatory\"\
                    : false,\n    \"isActive\": true,\n    \"scope\": \"REWARD\",\n\
                    \    \"defaultValue\": null,\n    \"dataType\": \"STRING\",\n\
                    \    \"createdBy\": 75155282,\n    \"createdOn\": 1741934782959,\n\
                    \    \"createdOnDateTime\": \"2025-03-14T06:46:22Z\",\n    \"\
                    lastUpdatedBy\": 75155282,\n    \"lastUpdatedOn\": 1741934782959,\n\
                    \    \"enumValues\": null,\n    \"lastUpdatedOnDateTime\": \"\
                    2025-03-14T06:46:22Z\"\n}"
                'Scope: CATALOGUE_PROMOTION':
                  value: "{\n    \"id\": 107,\n    \"orgId\": 100458,\n    \"name\"\
                    : \"CF1A_update\",\n    \"description\": \"CF1A\",\n    \"isMandatory\"\
                    : false,\n    \"isActive\": true,\n    \"scope\": \"CATALOGUE_PROMOTION\"\
                    ,\n    \"defaultValue\": null,\n    \"dataType\": \"STRING\",\n\
                    \    \"createdBy\": null,\n    \"createdOn\": null,\n    \"lastUpdatedBy\"\
                    : 75086856,\n    \"lastUpdatedOn\": null\n}"
                'Scope: ISSUE_REWARD':
                  value: "{\n    \"id\": 108,\n    \"orgId\": 100458,\n    \"name\"\
                    : \"CF1A_update\",\n    \"description\": \"CF1A\",\n    \"isMandatory\"\
                    : false,\n    \"isActive\": true,\n    \"scope\": \"ISSUE_REWARD\"\
                    ,\n    \"defaultValue\": null,\n    \"dataType\": \"STRING\",\n\
                    \    \"createdBy\": null,\n    \"createdOn\": null,\n    \"lastUpdatedBy\"\
                    : 75086856,\n    \"lastUpdatedOn\": null\n}"
              schema:
                oneOf:
                - title: 'Scope: REWARD'
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 18880
                      default: 0
                    orgId:
                      type: integer
                      example: 100737
                      default: 0
                    name:
                      type: string
                      example: age_update
                    description:
                      type: string
                      example: CF1A
                    isMandatory:
                      type: boolean
                      example: false
                      default: true
                    isActive:
                      type: boolean
                      example: true
                      default: true
                    scope:
                      type: string
                      example: REWARD
                    defaultValue: {}
                    dataType:
                      type: string
                      example: STRING
                    createdBy:
                      type: integer
                      example: 75155282
                      default: 0
                    createdOn:
                      type: integer
                      example: 1741934782959
                      default: 0
                    createdOnDateTime:
                      type: string
                      example: '2025-03-14T06:46:22Z'
                    lastUpdatedBy:
                      type: integer
                      example: 75155282
                      default: 0
                    lastUpdatedOn:
                      type: integer
                      example: 1741934782959
                      default: 0
                    enumValues: {}
                    lastUpdatedOnDateTime:
                      type: string
                      example: '2025-03-14T06:46:22Z'
                - title: 'Scope: CATALOGUE_PROMOTION'
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 107
                      default: 0
                    orgId:
                      type: integer
                      example: 100458
                      default: 0
                    name:
                      type: string
                      example: CF1A_update
                    description:
                      type: string
                      example: CF1A
                    isMandatory:
                      type: boolean
                      example: false
                      default: true
                    isActive:
                      type: boolean
                      example: true
                      default: true
                    scope:
                      type: string
                      example: CATALOGUE_PROMOTION
                    defaultValue: {}
                    dataType:
                      type: string
                      example: STRING
                    createdBy: {}
                    createdOn: {}
                    lastUpdatedBy:
                      type: integer
                      example: 75086856
                      default: 0
                    lastUpdatedOn: {}
                - title: 'Scope: ISSUE_REWARD'
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 108
                      default: 0
                    orgId:
                      type: integer
                      example: 100458
                      default: 0
                    name:
                      type: string
                      example: CF1A_update
                    description:
                      type: string
                      example: CF1A
                    isMandatory:
                      type: boolean
                      example: false
                      default: true
                    isActive:
                      type: boolean
                      example: true
                      default: true
                    scope:
                      type: string
                      example: ISSUE_REWARD
                    defaultValue: {}
                    dataType:
                      type: string
                      example: STRING
                    createdBy: {}
                    createdOn: {}
                    lastUpdatedBy:
                      type: integer
                      example: 75086856
                      default: 0
                    lastUpdatedOn: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Wrong default value:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 3025,\n        \"message\": \"Default value not\
                    \ found in the enum list\"\n    }\n}"
                ENUM value empty:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 3030,\n        \"message\": \"Enum value cannot\
                    \ be empty\"\n    }\n}"
                Unsupported character in ENUM:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 3024,\n        \"message\": \"Invalid characters\
                    \ in enum value. Allowed characters: [a-z,A-Z,0-9,[]()-_ ]\"\n\
                    \    }\n}"
                No ENUM provided:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 400,\n        \"message\": \"ENUM's list size is\
                    \ out of limit\"\n    }\n}"
                ENUM character limit exceeded:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 3028,\n        \"message\": \"Enum value exceeds\
                    \ the limit of 80 characters\"\n    }\n}"
                Duplicate ENUM values provided:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 3029,\n        \"message\": \"Duplicate enum values\
                    \ found\"\n    }\n}"
              schema:
                oneOf:
                - title: Wrong default value
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 3025
                          default: 0
                        message:
                          type: string
                          example: Default value not found in the enum list
                - title: ENUM value empty
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 3030
                          default: 0
                        message:
                          type: string
                          example: Enum value cannot be empty
                - title: Unsupported character in ENUM
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 3024
                          default: 0
                        message:
                          type: string
                          example: 'Invalid characters in enum value. Allowed characters:
                            [a-z,A-Z,0-9,[]()-_ ]'
                - title: No ENUM provided
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 400
                          default: 0
                        message:
                          type: string
                          example: ENUM's list size is out of limit
                - title: ENUM character limit exceeded
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 3028
                          default: 0
                        message:
                          type: string
                          example: Enum value exceeds the limit of 80 characters
                - title: Duplicate ENUM values provided
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 3029
                          default: 0
                        message:
                          type: string
                          example: Duplicate enum values found
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
