openapi: 3.1.0
info:
  title: Get Cart Promotions for a Customer
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/promotions/customer/109943742?includeRedemptions=true&includeSupplementaryPromotions=true:
    get:
      summary: Get Cart Promotions for a Customer
      description: This API is used to retrieve the cart promotions tagged to a particular
        customer based on the user ID. This returns cart promotions issued to the
        customer or POS promotions which are tagged to the customer's tier or supplementary
        programs.
      operationId: get-promotions-for-a-customer
      parameters:
      - name: includeRedemptions
        in: query
        description: includeRedemptions=true includes the restrictions applied to
          the promotion including max limit and remaining redemptions
        schema:
          type: boolean
      - name: includeSupplementaryPromotions
        in: query
        description: includeSupplementaryPromotions=true includes the POS promotions
          tagged to the customer's tier or supplementary program
        schema:
          type: boolean
      responses:
