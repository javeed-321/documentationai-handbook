                                maxLimit:
                                  type: integer
                                  example: 0
                                  default: 0
                                remainingRedemption:
                                  type: integer
                                  example: 0
                                  default: 0
                                tempRedemption:
                                  type: integer
                                  example: 0
                                  default: 0
                                periodStart:
                                  type: integer
                                  example: 0
                                  default: 0
                                periodEnd:
                                  type: integer
                                  example: 0
                                  default: 0
                          additionalProp2:
                            type: array
                            items:
                              type: object
                              properties:
                                kpi:
                                  type: string
                                  example: REDEMPTION
                                maxLimit:
                                  type: integer
                                  example: 0
                                  default: 0
                                remainingRedemption:
                                  type: integer
                                  example: 0
                                  default: 0
                                tempRedemption:
                                  type: integer
                                  example: 0
                                  default: 0
                                periodStart:
                                  type: integer
