openapi: 3.1.0
info:
  title: Update Data Field
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/cortex/v1/dataFields/{id}:
    put:
      summary: Update Data Field
      description: This API allows you to update data fields that you defined for
        the org.
      operationId: put-data-field-api
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Customer:
                  value: "{\n  \"searchStrategyType\" : \"PREFIX\",\n  \"entityType\"\
                    \ : \"CUSTOMER\",\n  \"dataFieldDefinitions\" : [\n\t\t{\n\t\t\
                    \t\"fieldId\" : \"firstName\",\n\t\t\t\"fieldAlias\" : \"firstName\"\
                    ,\n\t\t\t\"fieldType\" : \"DATA\",\n\t\t\t\"dataSourceDetails\"\
                    \ : {\n\t\t\t\t\"fieldReference\" : \"firstName\"\n\t\t\t},\n\t\
                    \t\t\"dataType\" : \"STRING\"\n\t\t},\n\t\t{\n\t\t\t\"fieldId\"\
                    \ : \"lastName\",\n\t\t\t\"fieldAlias\" : \"lastName\",\n\t\t\t\
                    \"fieldType\" : \"DATA\",\n\t\t\t\"dataSourceDetails\" : {\n\t\
                    \t\t\t\"fieldReference\" : \"lastName\"\n\t\t\t},\n\t\t\t\"dataType\"\
                    \ : \"STRING\"\n\t\t},\n\t\t{\n\t\t\t\"fieldId\" : \"mobile\"\
                    ,\n\t\t\t\"fieldAlias\" : \"mobile\",\n\t\t\t\"fieldType\" : \"\
                    DATA\",\n\t\t\t\"dataSourceDetails\" : {\n\t\t\t\t\"fieldReference\"\
                    \ : \"mobile\"\n\t\t\t},\n\t\t\t\"dataType\" : \"STRING\"\n\t\t\
                    },\n\t\t{\n\t\t\t\"fieldId\" : \"email\",\n\t\t\t\"fieldAlias\"\
                    \ : \"email\",\n\t\t\t\"fieldType\" : \"DATA\",\n\t\t\t\"dataSourceDetails\"\
                    \ : {\n\t\t\t\t\"fieldReference\" : \"email\"\n\t\t\t},\n\t\t\t\
                    \"dataType\" : \"STRING\"\n\t\t},\n    {\n\t\t\t\"fieldId\" :\
                    \ \"externalId\",\n\t\t\t\"fieldAlias\" : \"externalId\",\n\t\t\
                    \t\"fieldType\" : \"DATA\",\n\t\t\t\"dataSourceDetails\" : {\n\
                    \t\t\t\t\"fieldReference\" : \"externalId\"\n\t\t\t},\n\t\t\t\"\
                    dataType\" : \"STRING\"\n\t\t}\n\n\t]\n}"
                Transaction:
                  value: "{\n    \"data\": {\n        \"id\": \"67ebcbe9730aa850fc504145\"\
                    ,\n        \"orgId\": 100737,\n        \"searchStrategyType\"\
                    : \"COMBINATION\",\n        \"entityType\": \"TRANSACTION\",\n\
                    \        \"dataFieldDefinitions\": [\n            {\n        \
                    \        \"fieldId\": \"billNumber\",\n                \"fieldAlias\"\
                    : \"billNumber\",\n                \"fieldType\": \"DATA\",\n\
                    \                \"dataSourceDetails\": {\n                  \
                    \  \"fieldReference\": \"billNumber\"\n                },\n  \
                    \              \"dataType\": \"STRING\"\n            },\n    \
                    \        {\n                \"fieldId\": \"billDate\",\n     \
                    \           \"fieldAlias\": \"billDate\",\n                \"\
                    fieldType\": \"DATA\",\n                \"dataSourceDetails\"\
                    : {\n                    \"fieldReference\": \"billDate\"\n  \
                    \              },\n                \"dataType\": \"DATE\"\n  \
                    \          },\n            {\n                \"fieldId\": \"\
                    storename\",\n                \"fieldAlias\": \"storename\",\n\
                    \                \"fieldType\": \"DATA\",\n                \"\
                    dataSourceDetails\": {\n                    \"fieldReference\"\
                    : \"additionalFields.storename\"\n                },\n       \
                    \         \"dataType\": \"STRING\"\n            },\n         \
                    \   {\n                \"fieldId\": \"storecode\",\n         \
                    \       \"fieldAlias\": \"storecode\",\n                \"fieldType\"\
                    : \"DATA\",\n                \"dataSourceDetails\": {\n      \
                    \              \"fieldReference\": \"additionalFields.storecode\"\
                    \n                },\n                \"dataType\": \"STRING\"\
                    \n            }\n        ],\n        \"auditInfo\": {\n      \
                    \      \"createdOn\": \"2025-04-01T11:20:09.793+00:00\",\n   \
                    \         \"createdBy\": 75155282,\n            \"lastUpdatedOn\"\
                    : \"2025-04-01T11:20:09.793+00:00\",\n            \"lastUpdatedBy\"\
                    : 75155282\n        }\n    },\n    \"errors\": []\n}"
              schema:
                oneOf:
                - title: Customer
                  type: object
                  properties:
                    searchStrategyType:
                      type: string
                      example: PREFIX
                    entityType:
                      type: string
                      example: CUSTOMER
                    dataFieldDefinitions:
                      type: array
                      items:
                        type: object
                        properties:
                          fieldId:
                            type: string
                            example: firstName
                          fieldAlias:
                            type: string
                            example: firstName
                          fieldType:
                            type: string
                            example: DATA
                          dataSourceDetails:
                            type: object
                            properties:
                              fieldReference:
                                type: string
                                example: firstName
                          dataType:
                            type: string
                            example: STRING
                - title: Transaction
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        id:
                          type: string
                          example: 67ebcbe9730aa850fc504145
                        orgId:
                          type: integer
                          example: 100737
                          default: 0
                        searchStrategyType:
                          type: string
                          example: COMBINATION
                        entityType:
                          type: string
                          example: TRANSACTION
                        dataFieldDefinitions:
                          type: array
                          items:
                            type: object
                            properties:
                              fieldId:
                                type: string
                                example: billNumber
                              fieldAlias:
                                type: string
                                example: billNumber
                              fieldType:
                                type: string
                                example: DATA
                              dataSourceDetails:
                                type: object
                                properties:
                                  fieldReference:
                                    type: string
                                    example: billNumber
                              dataType:
                                type: string
                                example: STRING
                        auditInfo:
                          type: object
                          properties:
                            createdOn:
                              type: string
                              example: '2025-04-01T11:20:09.793+00:00'
                            createdBy:
                              type: integer
                              example: 75155282
                              default: 0
                            lastUpdatedOn:
                              type: string
                              example: '2025-04-01T11:20:09.793+00:00'
                            lastUpdatedBy:
                              type: integer
                              example: 75155282
                              default: 0
                    errors:
                      type: array
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
