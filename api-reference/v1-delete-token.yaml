openapi: 3.1.0
info:
  title: Delete token
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/mfa/token/expire:
    delete:
      summary: Delete token
      description: Delete or expire token generated by MFA OTP or password validation
        APIs.
      operationId: delete-token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - brand
              - deviceId
              - token
              - identifierType
              - identifierValue
              properties:
                brand:
                  type: string
                  description: Brand or organisation for which the token is generated.
                deviceId:
                  type: string
                  description: Unique ID of the device that generated the MFA token.
                token:
                  type: string
                  description: Token generated by `mfa/otp/validate`or`/mfa/password/validate`.
                identifierType:
                  type: string
                  description: Type of identifier to identify the customer.
                  enum:
                  - MOBILE
                  - EMAIL
                  - USERNAME
                  - EXTERNALID
                identifierValue:
                  type: string
                  description: Value of the identifier.
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"Token expired successfully\"\
                    \n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: Token expired successfully
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
