openapi: 3.1.0
info:
  title: Get Cart Promotions code API
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/promotions/code:
    get:
      summary: Get Cart Promotions code API
      description: This API can be used to fetch the Cart promotion details based
        on the code of the promotion
      operationId: get-promotions-code-api
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                codes:
                  type: string
                  description: Code assigned to the promotion which can be used for
                    redemption
                mode:
                  type: string
                  description: 'type of mode: DISCOUNT or PAYMENT_VOUCHER'
                includeRedemptions:
                  type: boolean
                  description: to include details of redemption
            examples:
              Request Body:
                value:
                  codes:
                  - string
                  mode: DISCOUNT
                  includeRedemptions: true
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n  \"data\": [\n    {\n      \"id\": \"string\",\n   \
                    \   \"orgId\": 0,                        \t\t //Unique id assigned\
                    \ to the organization/brand\n      \"promotionId\": \"string\"\
                    , \t\t  \t //Unique id assigned to any promotion created\n   \
                    \   \"promotionName\": \"string\",\t  \t       //Name assigned\
                    \ to any promotion created\n      \"code\": \"string\", //Code\
                    \ assigned to the promotion which can be used for redemption\n\
                    \      \"customerId\": 0\t\t\t\t\t         //Unique id assigned\
                    \ to a customer\n      \"active\": true,  \t\t //Whether the promotion\
                    \ is active or not(marked by the user)\n      \"createdOn\": 0,\
                    \ \t\t\t\t\t\t       //Date of promotion creation\n      \"validTill\"\
                    : 0,\n      \"mode\": \"DISCOUNT\", //mode of the promotion\n\
                    \      \"apiError\": {\n        \"code\": 0,\n        \"message\"\
                    : \"string\"\n      },\n\"redeemableFrom\": 0,         //Date\
                    \ after which the promotion is applicable for redemption     \
                    \ \"restrictions\": {   \t\t                               \t\
                    \        //applicable redemption restrictions\n        \"additionalProp1\"\
                    : [\n          {\n            \"kpi\": \"REDEMPTION\",\n \"maxLimit\"\
                    : 0,                                    //Maximum number of  redemptions\
                    \ allowed\n \t\"remainingRedemption\": 0, //Number of  redemptions\
                    \ remaining on the promotion\n          \"tempRedemption\": 0,\
                    \         //Number of Temporary redemptions on the promotion\n\
                    \              \"periodStart\": 0,                         //Period\
                    \ from which the restriction is applicable\n           \"periodEnd\"\
                    : 0                                   //Period till which the\
                    \ restriction is applicable\n          }\n        ],\n       \
                    \ \"additionalProp2\": [\n          {\n            \"kpi\": \"\
                    REDEMPTION\",\n            \"maxLimit\": 0,\n            \"remainingRedemption\"\
                    : 0,\n            \"tempRedemption\": 0,\n            \"periodStart\"\
                    : 0,\n            \"periodEnd\": 0\n          }\n        ],\n\
                    \        \"additionalProp3\": [\n          {\n            \"kpi\"\
                    : \"REDEMPTION\",\n            \"maxLimit\": 0,\n            \"\
                    remainingRedemption\": 0,\n            \"tempRedemption\": 0,\n\
                    \            \"periodStart\": 0,\n            \"periodEnd\": 0\n\
                    \          }\n        ]\n      }\n    }\n  ],\n  \"errors\": [\n\
                    \    {\n      \"code\": 0,\n      \"message\": \"string\"\n  \
                    \  }\n  ]\n}\n"
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
