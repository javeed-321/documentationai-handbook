                        type: integer
                        example: 1
                        default: 0
                      numberOfElements:
                        type: integer
                        example: 5
                        default: 0
                      first:
                        type: boolean
                        example: true
                        default: true
                      size:
                        type: integer
                        example: 10
                        default: 0
                      number:
                        type: integer
                        example: 0
                        default: 0
