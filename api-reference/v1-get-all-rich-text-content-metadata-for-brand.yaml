                        name:
                          type: string
                          example: RCtest22
                        description:
                          type: string
                          example: RC1_desc
                        isMandatory:
                          type: boolean
                          example: false
                          default: true
                        isActive:
                          type: boolean
                          example: true
                          default: true
                        scope:
                          type: string
                          example: REWARD
                        defaultValue: {}
                        createdBy:
