                          example: 75161973
                          default: 0
                        createdOn:
                          type: integer
                          example: 1742256000000
                          default: 0
                        lastUpdatedBy:
                          type: integer
                          example: 75161973
                          default: 0
                        lastUpdatedOn:
                          type: integer
                          example: 1742342400000
                          default: 0
                  pagingDto:
                    type: object
                    properties:
