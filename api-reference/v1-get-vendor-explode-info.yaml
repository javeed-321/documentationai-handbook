openapi: 3.1.0
info:
  title: Get Vendor Details
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/vendor/{vendorId}/details":
    get:
      summary: Get Vendor Details
      description: ''
      operationId: get-vendor-explode-info
      parameters:
      - name: VendorId
        in: path
        description: Unique ID of the Vendor.
        schema:
          type: integer
          format: int32
        required: true
      - name: vendorId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 5001,\n        \"message\": \"Vendor fetched successfully\"\
                    \n    },\n    \"vendor\": {\n        \"id\": 59,\n        \"name\"\
                    : \"DocVendor7\",\n        \"code\": \"Doc007\",\n        \"brandId\"\
                    : 61,\n        \"rank\": null,\n        \"description\": null,\n\
                    \        \"enabled\": true,\n        \"vendorTypes\": null,\n\
                    \        \"vendorDetails\": {},\n        \"images\": [\n     \
                    \       {\n                \"name\": \"imageName001\",\n     \
                    \           \"altText\": null,\n                \"id\": null,\n\
                    \                \"url\": \"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6RFSqYEgenJSDc0Wo_eoEKzxd0iXvTOO-LQ&s\"\
                    ,\n                \"isExternal\": true\n            }\n     \
                    \   ],\n        \"videos\": [\n            {\n               \
                    \ \"name\": \"videoName001\",\n                \"altText\": null,\n\
                    \                \"id\": null,\n                \"url\": \"https://videos.pexels.com/video-files/6265096/6265096-uhd_1440_2560_30fps.mp4\"\
                    ,\n                \"isExternal\": true\n            }\n     \
                    \   ],\n        \"type\": \"REWARDS\",\n        \"redemptionsConfigured\"\
                    : 1,\n        \"createdOn\": 1739783601000,\n        \"lastUpdatedOn\"\
                    : 1739783601000,\n        \"lastUpdatedOnDateTime\": \"2025-02-17T09:13:21Z\"\
                    ,\n        \"createdBy\": null,\n        \"lastUpdatedBy\": null,\n\
                    \        \"createdOnDateTime\": \"2025-02-17T09:13:21Z\",\n  \
                    \      \"encryptionRequired\": false\n    }\n}"
                "Failure: Invalid Vendor ID":
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 5004,\n        \"message\": \"Vendor not found\"\
                    \n    },\n    \"vendor\": null\n}"
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: true
                          default: true
                        code:
                          type: integer
                          example: 5001
                          default: 0
                        message:
                          type: string
                          example: Vendor fetched successfully
                    vendor:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 59
                          default: 0
                        name:
                          type: string
                          example: DocVendor7
                        code:
                          type: string
                          example: Doc007
                        brandId:
                          type: integer
                          example: 61
                          default: 0
                        rank: {}
                        description: {}
                        enabled:
                          type: boolean
                          example: true
                          default: true
                        vendorTypes: {}
                        vendorDetails:
                          type: object
                          properties: {}
                        images:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                example: imageName001
                              altText: {}
                              id: {}
                              url:
                                type: string
                                example: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6RFSqYEgenJSDc0Wo_eoEKzxd0iXvTOO-LQ&s"
                              isExternal:
                                type: boolean
                                example: true
                                default: true
                        videos:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                example: videoName001
                              altText: {}
                              id: {}
                              url:
                                type: string
                                example: "https://videos.pexels.com/video-files/6265096/6265096-uhd_1440_2560_30fps.mp4"
                              isExternal:
                                type: boolean
                                example: true
                                default: true
                        type:
                          type: string
                          example: REWARDS
                        redemptionsConfigured:
                          type: integer
                          example: 1
                          default: 0
                        createdOn:
                          type: integer
                          example: 1739783601000
                          default: 0
                        lastUpdatedOn:
                          type: integer
                          example: 1739783601000
                          default: 0
                        lastUpdatedOnDateTime:
                          type: string
                          example: "2025-02-17T09:13:21Z"
                        createdBy: {}
                        lastUpdatedBy: {}
                        createdOnDateTime:
                          type: string
                          example: "2025-02-17T09:13:21Z"
                        encryptionRequired:
                          type: boolean
                          example: false
                          default: true
                - title: "Failure: Invalid Vendor ID"
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 5004
                          default: 0
                        message:
                          type: string
                          example: Vendor not found
                    vendor: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location 'https://eu.api.capillarytech.com/api_gateway/rewards/core/v1/vendor/59/details'\
            \ \\\n--header 'Accept: application/json' \\\n--header 'Content-Type:\
            \ application/json' \\\n--header 'Authorization: Basic bmFtYW5fZG9jOmzA3MWJmYjM5OGM5ZmM2YjZlY2I2MmEy'\
            \ \\\n--header 'Cookie: _cfuvid=fmRA3Hit0aFMwbfKLvt4ueC_cBYGp6.izrIrTxsLCds-1727420270955-0.0.1.1-604800000;\
            \ _cfuvid=FJsFTsQxFxFqUup40xQQ36aT7bnuhPmb6nYOClavKpU-1739797830423-0.0.1.1-604800000'"
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
