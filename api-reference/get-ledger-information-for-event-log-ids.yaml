openapi: 3.1.0
info:
  title: Get Ledger Information for Event Log IDs
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /x/neo/customer/ledgerDetails:
    get:
      summary: Get Ledger Information for Event Log IDs
      description: ''
      operationId: get-ledger-information-for-event-log-ids
      parameters:
      - name: ledgerEntryTypes
        in: query
        description: "Type of entry recorded in a customer's points ledger. Values:\
          \ CREDIT, DEBIT"
        schema:
          type: string
      - name: userId
        in: query
        description: Unique customer ID of the customer.
        schema:
          type: integer
          format: int64
      - name: endDate
        in: query
        description: "Last date to which you want to retrieve the ledger information.\
          \ Format: YYYY-MM-DD. Example: 2025-06-30"
        schema:
          type: string
          format: date
      - name: startDate
        in: query
        description: "Start date to which you want to retrieve the ledger information.\
          \ Format: YYYY-MM-DD. Example: 2025-06-01"
        schema:
          type: string
          format: date
      - name: page
        in: query
        description: "Retrieve details of a specific page. Page count starts from\
          \ 1.   Example: page=2 retrieves data on page 2."
        schema:
          type: integer
          format: int32
      - name: count
        in: query
        description: Number of results to display per page. The default value is 10.
          The maximum supported value is 100.
        schema:
          type: integer
          format: int32
      - name: alternateCurrencyNames
        in: query
        description: Name of the alternate currency for which ledger information is
          retrieved.
        schema:
          type: string
      responses:
        '200':
          description: '200'
