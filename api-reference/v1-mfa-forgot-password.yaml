openapi: 3.1.0
info:
  title: Forgot password
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/mfa/password/forget:
    post:
      summary: Forgot password
      description: Generate new password when you forget your password.
      operationId: mfa-forgot-password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - deviceId
              - brand
              - sessionId
              - password
              - confirmPassword
              - identifierType
              - identifierValue
              properties:
                deviceId:
                  type: string
                  description: Unique ID of the device used for password generation.
                    It should be the same device used to generate the token.
                brand:
                  type: string
                  description: Name of the brand or organisation that needs verification.
                sessionId:
                  type: string
                  description: Unique ID created from `/mfa/token/generate` API.
                password:
                  type: string
                  description: The new password.
                confirmPassword:
                  type: string
                  description: Re-enter new password.
                identifierType:
                  type: string
                  description: Type of identifier to identify the customer.
                  enum:
                  - MOBILE
                  - EMAIL
                  - USERNAME
                  - EXTERNALID
                identifierValue:
                  type: string
                  description: Value of the identifier.
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"SUCCESS\"\n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: SUCCESS
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
