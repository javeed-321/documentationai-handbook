                    \           \"code\": 814,\n            \"message\": \"Active\
                    \ earn instance is not present.\",\n            \"reference\"\
                    : null\n        }\n    ],\n    \"warnings\": null\n}"
              schema:
                type: object
                properties:
                  data: {}
                  errors:
                    type: array
                    items:
                      type: object
