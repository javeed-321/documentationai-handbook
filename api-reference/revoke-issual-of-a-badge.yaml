paths:
  /badges/customer/revokeEarn:
    post:
      summary: Revoke issued badge
      description: ''
      operationId: revoke-issual-of-a-badge
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - badgeMetaId
              - customerId
              - earnedBadgeId
              properties:
                badgeMetaId:
                  type: string
                  description: Unique identifier for the badge metadata.
                customerId:
                  type: string
                  description: Unique identifier for the customer.
                earnedBadgeId:
                  type: string
                  description: Unique identifier for the earned badge.
            examples:
              Request Example:
                value:
                  badgeMetaId: 698dae82d30c4f6b3da9dc06
                  customerId: 566135941
                  earnedBadgeId: 698daf848644c157e72d83f3
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample response:
                  value:
                    data:
                      badgeMetaId: 698dae82d30c4f6b3da9dc06
                      customerId: 566135941
                      earnedBadgeId: 698daf848644c157e72d83f3
                      isActive: false
                    errors: []
                    warnings: []
                  summary: Sample response
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      badgeMetaId:
                        type: string
                        example: 653ddb33b3cda7078c7c68e9
                      customerId:
                        type: integer
                        example: 62090013
