                      default: 0
                    points_exclusive:
                      type: integer
                      example: 50
                      default: 0
                    status:
                      type: string
                      example: EXPIRED
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
