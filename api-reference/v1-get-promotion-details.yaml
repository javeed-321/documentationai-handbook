openapi: 3.1.0
info:
  title: Get Details of all Loyalty Promotions
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/loyalty/v1/programs/promotions/list:
    get:
      summary: Get Details of all Loyalty Promotions
      description: Lists all promotions.
      operationId: get-promotion-details
      parameters:
      - name: limit
        in: query
        description: Number of entries in a page.
        required: true
        schema:
          type: integer
          format: int32
      - name: offset
        in: query
        description: Page number you want to fetch.
        required: true
        schema:
          type: integer
          format: int32
      - name: program
        in: query
        description: Program ID for which you want to get the promotion metadata.
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        description: Status of promotion.
        schema:
          type: string
          enum:
          - COMPLETED
          - LIVE
          - UPCOMING
          - INACTIVE
      - name: activity
        in: query
        description: Event name for promotion.
        schema:
          type: string
          enum:
          - CustomerRegistration
          - CustomerUpdate
          - GenericEvent
          - NewBill
          - PointsContributionToGroup
          - PointsTransfer
          - ReturnBill
          - TargetCompleted
          - TransactionAdd
          - ALL
      - name: startDate
        in: query
        description: Start date of the promotion.
        schema:
          type: string
      - name: endDate
        in: query
        description: End date of promotion.
        schema:
          type: string
      - name: promotionName
        in: query
        description: Promotion name.
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value:
                    status:
                      code: 200
                      message: success
                    validationErrors: null
