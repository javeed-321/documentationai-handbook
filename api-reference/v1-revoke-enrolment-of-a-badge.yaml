openapi: 3.1.0
info:
  title: Revoke enrolled badges
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/badges/badgeMeta/customer/revokeIssue:
    post:
      summary: Revoke enrolled badges
      description: ''
      operationId: revoke-enrolment-of-a-badge
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - badgeMetaId
              - customers
              properties:
                badgeMetaId:
                  type: string
                  description: Unique identifier for the badge metadata
                customers:
                  type: object
                  properties:
                    customerID:
                      type: string
            examples:
              With Revoke Issuals:
                value:
                  badgeMetaId: 670371e39235f02fd5d71cbd
                  revokeIssuals:
                  - customerId: '387403362'
                    issueId: '236'
                  - customerId: '387403360'
                    issueId: '234'
              Multiple customers:
                value:
                  badgeMetaId: 654bb48766a87827bb61e631
                  customers:
                  - 123
                  - 62090013
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Single Customer:
                  value: "{\n    \"data\": {\n        \"badgeMetaId\": \"653de84db3cda7078c7c68ed\"\
                    ,\n        \"revokedIssuedBadges\": [\n            {\n       \
                    \         \"customerId\": 62090013,\n                \"issuedId\"\
                    : \"653e024bb3cda7078c7c6903\",\n                \"error\": null\n\
                    \            }\n        ],\n        \"requestId\": null\n    },\n\
                    \    \"errors\": [],\n    \"warnings\": []\n}"
                'Failure: Customer is not issued':
                  value: "{\n    \"data\": {\n        \"badgeMetaId\": \"653de84db3cda7078c7c68ed\"\
                    ,\n        \"revokedIssuedBadges\": [\n            {\n       \
                    \         \"customerId\": 123,\n                \"issuedId\":\
                    \ null,\n                \"error\": {\n                    \"\
                    code\": 404,\n                    \"message\": \"Customer doesn't\
                    \ have issue instance\",\n                    \"reference\": null\n\
                    \                }\n            }\n        ],\n        \"requestId\"\
                    : null\n    },\n    \"errors\": [],\n    \"warnings\": []\n}"
                Multiple Customer:
                  value: "{\n    \"data\": {\n        \"badgeMetaId\": \"654bb48766a87827bb61e631\"\
                    ,\n        \"revokedIssuedBadges\": [\n            {\n       \
                    \         \"customerId\": 123,\n                \"issuedId\":\
                    \ \"654cc02b6bccde1274b6d3a7\",\n                \"error\": null\n\
                    \            },\n            {\n                \"customerId\"\
                    : 62090013,\n                \"issuedId\": \"654cc03e6bccde1274b6d3a9\"\
                    ,\n                \"error\": null\n            }\n        ],\n\
                    \        \"requestId\": null\n    },\n    \"errors\": [],\n  \
                    \  \"warnings\": []\n}"
                With Revoke Issual:
                  value: "{\n   \"data\": {\n       \"badgeMetaId\": \"66e3ef1b5abea9582ae4f301\"\
                    ,\n       \"revokedIssuedBadges\": [\n           { \"customerId\"\
                    : 12323, \"issuedId\": \"66e3ef1e5abea9582ae4f302\" }\n      \
                    \ ]\n   },\n   \"errors\": [],\n   \"warnings\": []\n}"
                'Failure: RevokeIssuals or CustomerId is not passed':
                  value: "{\n    \"data\": null,\n    \"errors\": [\n        {\n \
                    \           \"code\": 1051,\n            \"message\": \"RevokeIssuals\
                    \ or CustomerId is mandatory\",\n            \"reference\": null\n\
                    \        }\n    ],\n    \"warnings\": null\n}"
              schema:
                oneOf:
                - title: Single Customer
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        badgeMetaId:
                          type: string
                          example: 653de84db3cda7078c7c68ed
                        revokedIssuedBadges:
                          type: array
                          items:
                            type: object
                            properties:
                              customerId:
                                type: integer
                                example: 62090013
                                default: 0
                              issuedId:
                                type: string
                                example: 653e024bb3cda7078c7c6903
                              error: {}
                        requestId: {}
                    errors:
                      type: array
                    warnings:
                      type: array
                - title: 'Failure: Customer is not issued'
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        badgeMetaId:
                          type: string
                          example: 653de84db3cda7078c7c68ed
                        revokedIssuedBadges:
                          type: array
                          items:
                            type: object
                            properties:
                              customerId:
                                type: integer
                                example: 123
                                default: 0
                              issuedId: {}
                              error:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    example: 404
                                    default: 0
                                  message:
                                    type: string
                                    example: Customer doesn't have issue instance
                                  reference: {}
                        requestId: {}
                    errors:
                      type: array
                    warnings:
                      type: array
                - title: Multiple Customer
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        badgeMetaId:
                          type: string
                          example: 654bb48766a87827bb61e631
                        revokedIssuedBadges:
                          type: array
                          items:
                            type: object
                            properties:
                              customerId:
                                type: integer
                                example: 123
                                default: 0
                              issuedId:
                                type: string
                                example: 654cc02b6bccde1274b6d3a7
                              error: {}
                        requestId: {}
                    errors:
                      type: array
                    warnings:
                      type: array
                - title: With Revoke Issual
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        badgeMetaId:
                          type: string
                          example: 66e3ef1b5abea9582ae4f301
                        revokedIssuedBadges:
                          type: array
                          items:
                            type: object
                            properties:
                              customerId:
                                type: integer
                                example: 12323
                                default: 0
                              issuedId:
                                type: string
                                example: 66e3ef1e5abea9582ae4f302
                    errors:
                      type: array
                    warnings:
                      type: array
                - title: 'Failure: RevokeIssuals or CustomerId is not passed'
                  type: object
                  properties:
                    data: {}
                    errors:
                      type: array
                      items:
                        type: object
                        properties:
                          code:
                            type: integer
                            example: 1051
                            default: 0
                          message:
                            type: string
                            example: RevokeIssuals or CustomerId is mandatory
                          reference: {}
                    warnings: {}
        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"data\": null,\n    \"errors\": [\n        {\n \
                    \           \"code\": 404,\n            \"message\": \"Passed\
                    \ badge is not found\",\n            \"reference\": null\n   \
                    \     }\n    ],\n    \"warnings\": null\n}"
              schema:
                type: object
                properties:
                  data: {}
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: integer
                          example: 404
                          default: 0
                        message:
                          type: string
                          example: Passed badge is not found
                        reference: {}
                  warnings: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
