openapi: 3.1.0
info:
  title: Get all customer badges
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/v1/badges/management/{customerId}":
    get:
      summary: Get all customer badges
      description: ''
      operationId: get-all-customer-badges
      parameters:
      - name: customerId
        in: path
        description: Unique customer identifier
        schema:
          type: integer
          format: int64
        required: true
      - name: page
        in: query
        schema:
          type: string
      - name: size
        in: query
        schema:
          type: string
      - name: sortOn
        in: query
        description: Sorting based on parameters
        schema:
          type: string
          enum:
          - EXPIRES_ON
          - LAST_MODIFIED_DATE
          - LAST_ISSUED_DATE
          - LAST_EXPIRED_BADGE
      - name: order
        in: query
        description: Sorting results based on ascending or descending order
        schema:
          type: string
          enum:
          - DESC
          - ASC
      - name: name
        in: query
        schema:
          type: string
      - name: badgeType
        in: query
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
      - name: badgeStatu
        in: query
        schema:
          type: string
      - name: owner
        in: query
        schema:
          type: string
      - name: claimedBy
        in: query
        schema:
          type: string
      - name: startOn
        in: query
        schema:
          type: string
      - name: expiresOn
        in: query
        schema:
          type: string
      - name: startOnOperator
        in: query
        schema:
          type: string
      - name: endOnOperator
        in: query
        schema:
          type: string
      - name: groupId
        in: query
        schema:
          type: string
      - name: lastEarnEventDate
        in: query
        description: "Date and time when a triggering event (transactional or behavioural)\
          \ occurred, initiating the badge earning. Time format: Epoch format (UNIX\
          \ timestamp in milliseconds)."
        schema:
          type: number
          format: float
      - name: lastEarnedOnDate
        in: query
        description: "Date and time when the badge was awarded to the customer. Time\
          \ format: Epoch format (UNIX timestamp in milliseconds)."
        schema:
          type: number
          format: float
      responses:
