openapi: 3.1.0
info:
  title: Get all brand rewards using Brand ID
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/reward/list/brand/{BrandID}":
    get:
      summary: Get all brand rewards using Brand ID
      description: ''
      operationId: get-reward-list
      parameters:
      - name: BrandId
        in: path
        description: Unique identifier of the brand
        schema:
          type: integer
          format: int32
        required: true
      - name: ownerType
        in: query
        description: Module for which the reward was created.
        schema:
          type: string
          enum:
          - Loyalty program
          - Milestones
          - Campaigns
          - Journeys
          - Goodwill.
      - name: ownerId
        in: query
        description: Unique identifier of the owner to claim the reward.
        schema:
          type: string
      - name: size
        in: query
        description: Results to show per page. Default - 100
        schema:
          type: string
      - name: page
        in: query
        description: Allows to retrieve details of a specific page.
        schema:
          type: string
      - name: language
        in: query
        description: Filters the response based on the reward language. Use this parameter
          to retrieve rewards in a specific language. For example, to display rewards
          in English, set the parameter to en
        schema:
          type: string
          enum:
          - ''
          default: en
      - name: BrandID
        in: path
        required: true
        schema:
          type: string
      responses:
