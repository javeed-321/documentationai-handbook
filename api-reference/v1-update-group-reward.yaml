openapi: 3.1.0
info:
  title: Groups - Update rewards group
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/group/{id}":
    put:
      summary: Groups - Update rewards group
      description: ''
      operationId: update-group-reward
      parameters:
      - name: id
        in: path
        description: Unique ID of the group
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the group
                rank:
                  type: string
                  description: Rank of the group
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"id\": 2422,\n    \"orgId\": 100737,\n    \"name\"\
                    : \"dw\",\n    \"rank\": 8,\n    \"isActive\": true,\n    \"createdBy\"\
                    : 75155282,\n    \"createdOn\": 1742196639000,\n    \"createdOnDateTime\"\
                    : \"2025-03-17T07:30:39Z\",\n    \"lastUpdatedBy\": 75155282,\n\
                    \    \"lastUpdatedOn\": 1742197082485,\n    \"lastUpdatedOnDateTime\"\
                    : \"2025-03-17T07:38:02Z\"\n}"
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 2422
                    default: 0
                  orgId:
                    type: integer
                    example: 100737
                    default: 0
                  name:
                    type: string
                    example: dw
                  rank:
                    type: integer
                    example: 8
                    default: 0
                  isActive:
                    type: boolean
                    example: true
                    default: true
                  createdBy:
                    type: integer
                    example: 75155282
                    default: 0
                  createdOn:
                    type: integer
                    example: 1742196639000
                    default: 0
                  createdOnDateTime:
                    type: string
                    example: "2025-03-17T07:30:39Z"
                  lastUpdatedBy:
                    type: integer
                    example: 75155282
                    default: 0
                  lastUpdatedOn:
                    type: integer
                    example: 1742197082485
                    default: 0
                  lastUpdatedOnDateTime:
                    type: string
                    example: "2025-03-17T07:38:02Z"
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location --request PUT 'https://eu.api.capillarytech.com/api_gateway/rewards/core/v1/group/2422'\
            \ \\\n--header 'Accept: application/json' \\\n--header 'Content-Type:\
            \ application/json' \\\n--header 'accept: application/json' \\\n--data\
            \ '{\n    \"name\": \"dw\",\n    \"rank\": 8 \n}'"
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
