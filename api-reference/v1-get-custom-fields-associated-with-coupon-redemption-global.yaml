openapi: 3.1.0
info:
  title: Get Custom Fields Associated with Coupon Redemption
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /x/neo/couponRedemption/customFields:
    get:
      summary: Get Custom Fields Associated with Coupon Redemption
      description: ''
      operationId: get-custom-fields-associated-with-coupon-redemption-global
      parameters:
      - name: redemption_ids
        in: query
        description: A unique identifier for the redemption instance. This ID is generated
          when a coupon is redeemed. You can provide multiple redemption IDs, separated
          by commas.
        required: true
        schema:
          type: integer
          format: int64
      - name: page
        in: query
        description: 'Retrieve details of a specific page. Page count starts from
          1. Example: page=2 results on page 2.'
        schema:
          type: integer
          format: int32
      - name: count
        in: query
        description: Number of results to display per page. Default value is 10. Maximum
          supported value is 100.
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample Response:
                  value: "[\n    {\n        \"redemptionId\": 1046094,\n        \"\
                    redemptionCustomFields\": [\n            {\n                \"\
                    name\": \"age\",\n                \"value\": \"12\"\n        \
                    \    },\n            {\n                \"name\": \"redem_gender\"\
                    ,\n                \"value\": \"Female1\"\n            }\n   \
                    \     ]\n    },\n    {\n        \"redemptionId\": 1046095,\n \
                    \       \"redemptionCustomFields\": [\n            {\n       \
                    \         \"name\": \"age\",\n                \"value\": \"10\"\
                    \n            }\n        ]\n    },\n    {\n        \"redemptionId\"\
                    : 1046096,\n        \"redemptionCustomFields\": [\n          \
                    \  {\n                \"name\": \"age\",\n                \"value\"\
                    : \"12\"\n            },\n            {\n                \"name\"\
                    : \"redem_gender\",\n                \"value\": \"Female2\"\n\
                    \            }\n        ]\n    }\n]"
              schema:
                type: array
                items:
                  type: object
                  properties:
                    redemptionId:
                      type: integer
                      example: 1046094
                      default: 0
                    redemptionCustomFields:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            example: age
                          value:
                            type: string
                            example: '12'
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: 'curl --location ''https://nightly.api.capillarytech.com/x/neo/couponRedemption/customFields?redemption_ids=1046094%2C1046095%2C1046096&page=1&count=15''
            \

            --header ''Content-Type: application/json'' \

            --header ''x-cap-neo-dag-scope: global'' \

            --header ''Authorization: Basic A3NWI5NjRiMDcxNTJkMjM0Yjcw'' \

            --header ''Cookie: _cfuvid=bDzuqORMDePiD7OSqoaM5Wf.LRjcYN1SoBJGzi0aLo4-1749727061901-0.0.1.1-604800000'''
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
