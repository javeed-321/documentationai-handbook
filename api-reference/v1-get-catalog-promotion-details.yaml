openapi: 3.1.0
info:
  title: Get catalog promotion details
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/promotion/{promotionId}/brand/{brandId}":
    get:
      summary: Get catalog promotion details
      description: ''
      operationId: get-catalog-promotion-details
      parameters:
      - name: promotionid
        in: query
        description: Unique ID of reward.
        required: true
        schema:
          type: string
      - name: brandId
        in: query
        description: Unique ID of the brand.
        required: true
        schema:
          type: integer
          format: int64
      - name: promotionId
        in: path
        required: true
        schema:
          type: string
      - name: brandId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 11008,\n        \"message\": \"Catalog promotion\
                    \ fetched successfully.\"\n    },\n    \"catalogPromotion\": {\n\
                    \        \"id\": 8800,\n        \"name\": \"test1\",\n       \
                    \ \"orgId\": 100458,\n        \"isEnabled\": true,\n        \"\
