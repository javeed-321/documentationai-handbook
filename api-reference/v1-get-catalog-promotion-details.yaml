                    \ 05:46:00\",\n                \"endDateTime\": \"2025-10-25T05:46:00Z\"\
                    ,\n                \"expired\": false,\n                \"started\"\
                    : false,\n                \"intouchPointsPostDiscount\": 99,\n\
                    \                \"configId\": 3914\n            }\n        ]\n\
                    \    }\n}\n    "
