                    : \"2025-03-14T20:58:49Z\",\n        \"endTime\": \"2025-10-25\
                    \ 05:46:00\",\n        \"endDateTime\": \"2025-10-25T05:46:00Z\"\
                    ,\n        \"discountType\": \"ABSOLUTE\",\n        \"discountValue\"\
                    : 1.00,\n        \"lastUpdatedOn\": \"2025-03-13 09:48:42\",\n\
