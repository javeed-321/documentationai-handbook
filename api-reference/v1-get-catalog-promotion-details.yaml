                    \        \"createdOn\": \"2025-03-13 09:48:42\",\n        \"createdOnDateTime\"\
                    : \"2025-03-13T09:48:42Z\",\n        \"lastUpdatedBy\": 75140757,\n\
                    \        \"createdBy\": 75140757,\n        \"languageSpecificInfo\"\
                    : [\n            {\n                \"languageCode\": \"en\",\n\
                    \                \"name\": \"test1\",\n                \"description\"\
                    : \"description\",\n                \"enabled\": true,\n     \
                    \           \"createdBy\": 75140757,\n                \"createdOn\"\
                    : \"2025-03-13 09:48:42\",\n                \"createdOnDateTime\"\
                    : \"2025-03-13T09:48:42Z\",\n                \"lastUpdatedBy\"\
