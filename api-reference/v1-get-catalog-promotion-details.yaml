                              type: integer
                              example: 3914
                              default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                '11007':
                  value: "{\n   \"status\": {\n       \"success\": false,\n      \
                    \ \"code\": 11007,\n       \"message\": \"Catalog promotion not\
                    \ found.\"\n   },\n   \"catalogPromotion\": null\n}\n\n"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: false
                        default: true
                      code:
                        type: integer
                        example: 11007
                        default: 0
                      message:
                        type: string
                        example: Catalog promotion not found.
                  catalogPromotion: {}
      deprecated: false
components:
