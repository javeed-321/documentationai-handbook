                      rewards:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 8799
                              default: 0
                            rewardId:
                              type: integer
                              example: 308795
                              default: 0
                            promotionId:
                              type: integer
                              example: 8800
                              default: 0
                            startTime:
                              type: string
                              example: "2025-03-14 20:58:49"
                            startDateTime:
                              type: string
                              example: "2025-03-14T20:58:49Z"
                            endTime:
                              type: string
                              example: "2025-10-25 05:46:00"
                            endDateTime:
                              type: string
                              example: "2025-10-25T05:46:00Z"
