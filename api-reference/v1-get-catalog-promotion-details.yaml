                              example: en
                            name:
                              type: string
                              example: test1
                            description:
                              type: string
                              example: description
                            enabled:
                              type: boolean
                              example: true
                              default: true
                            createdBy:
                              type: integer
                              example: 75140757
                              default: 0
                            createdOn:
                              type: string
                              example: "2025-03-13 09:48:42"
                            createdOnDateTime:
                              type: string
                              example: "2025-03-13T09:48:42Z"
                            lastUpdatedBy:
                              type: integer
                              example: 75140757
                              default: 0
                            lastUpdateOn:
                              type: string
                              example: "2025-03-13 09:48:42"
                            lastUpdateOnDateTime:
                              type: string
                              example: "2025-03-13T09:48:42Z"
                      customFields:
                        type: object
                        properties:
                          A:
                            type: string
                            example: '1'
                          CF1233:
                            type: string
                            example: '1'
                          EnumCF2:
                            type: string
                            example: r1
                          EnumCF1:
                            type: string
