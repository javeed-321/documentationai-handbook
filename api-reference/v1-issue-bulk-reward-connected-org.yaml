                - title: With DATA-SCOPE as SELF
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: true
                          default: true
                        code:
                          type: integer
                          example: 200
                          default: 0
                        message:
                          type: string
                          example: Reward issued successfully
                    rewards:
                      type: array
