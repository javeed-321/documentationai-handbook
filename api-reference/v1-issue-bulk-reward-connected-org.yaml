openapi: 3.1.0
info:
  title: Issue Reward in connected orgs
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /v1.1/user/rewards/issue/?username={till}&skip_validation=true:
    post:
      summary: Issue Reward in connected orgs
      description: ''
      operationId: issue-bulk-reward-connected-org
      parameters:
      - name: username
        in: query
        description: username here represents name of the store
        required: true
        schema:
          type: string
          default: store_name
      - name: skip_validation
        in: query
        description: optional
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mobile:
                  type: string
                  description: Mobile number/ email Id/ External Id of the customer
                brand:
                  type: string
                  description: name of the brand
                transactionNumber:
                  type: string
                  description: transaction number for issuing the reward
                rewardId:
                  type: string
                  description: reward ID(s) of the rewards to be issued
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                With DATA-SCOPE as SELF:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"Reward issued successfully\"\
                    \n    },\n    \"rewards\": [\n        {\n            \"status\"\
                    : {\n                \"success\": true,\n                \"code\"\
                    : 200,\n                \"message\": \"Reward issued successfully\"\
                    \n            },\n            \"orgId\": 4004543,\n          \
                    \  \"transactionId\": 57097,\n            \"rewardId\": 350,\n\
                    \            \"requestedQuantity\": 1,\n            \"quantity\"\
                    : 1,\n            \"pointsReferenceId\": \"7Scaq1\",\n       \
                    \     \"pointsReferenceIds\": [\n                \"7Scaq1\"\n\
                    \            ],\n            \"eventLogId\": null,\n         \
                    \   \"requestId\": null,\n            \"intouch\": null,\n   \
                    \         \"promotions\": [],\n            \"vendor\": [\n   \
                    \             {\n                    \"valid_till\": \"2027-11-01\"\
                    ,\n                    \"voucher\": \"OV4GJYQV3Y\",\n        \
                    \            \"pointsRedeemed\": \"2\",\n                    \"\
                    offer_name\": \"marvel-loadtest\",\n                    \"coupon_series_id\"\
                    : \"234\"\n                }\n            ],\n            \"restrictions\"\
                    : null,\n            \"paymentConfig\": {\n                \"\
                    paymentMode\": \"CONV_RATIO\",\n                \"id\": 54,\n\
                    \                \"conversionRatio\": 0.5000\n            },\n\
                    \            \"fulfillmentDetails\": null,\n            \"customFields\"\
                    : null,\n            \"redemptionDetails\": {\n              \
                    \  \"redemptionType\": \"MILES\",\n                \"totalRedemptionValue\"\
                    : 1\n            }\n        }\n    ]\n}"
                With DATA-SCOPE as OTHER:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"Reward issued successfully\"\
                    \n    },\n    \"rewards\": [\n        {\n            \"status\"\
                    : {\n                \"success\": true,\n                \"code\"\
                    : 200,\n                \"message\": \"Reward issued successfully\"\
                    \n            },\n            \"orgId\": 4000086,\n          \
                    \  \"transactionId\": 57097,\n            \"rewardId\": 350,\n\
                    \            \"requestedQuantity\": 1,\n            \"quantity\"\
                    : 1,\n            \"pointsReferenceId\": \"7Scaq1\",\n       \
                    \     \"pointsReferenceIds\": [\n                \"7Scaq1\"\n\
                    \            ],\n            \"eventLogId\": null,\n         \
                    \   \"requestId\": null,\n            \"intouch\": null,\n   \
                    \         \"promotions\": [],\n            \"vendor\": [\n   \
                    \             {\n                    \"valid_till\": \"2027-11-01\"\
                    ,\n                    \"voucher\": \"OV4GJYQV3Y\",\n        \
                    \            \"pointsRedeemed\": \"2\",\n                    \"\
                    offer_name\": \"marvel-loadtest\",\n                    \"coupon_series_id\"\
                    : \"234\"\n                }\n            ],\n            \"restrictions\"\
                    : null,\n            \"paymentConfig\": {\n                \"\
                    paymentMode\": \"CONV_RATIO\",\n                \"id\": 54,\n\
                    \                \"conversionRatio\": 0.5000\n            },\n\
                    \            \"fulfillmentDetails\": null,\n            \"customFields\"\
                    : null,\n            \"redemptionDetails\": {\n              \
                    \  \"redemptionType\": \"MILES\",\n                \"totalRedemptionValue\"\
                    : 1\n            }\n        }\n    ]\n}"
