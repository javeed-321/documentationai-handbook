                            properties:
                              redemptionType:
                                type: string
                                example: MILES
                              totalRedemptionValue:
                                type: integer
                                example: 1
                                default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                '8003':
                  value: "{\n   \"status\": {\n       \"success\": false,\n      \
                    \ \"code\": 8003,\n       \"message\": \"fail to issue reward\"\
                    \n   },\n   \"rewards\": [\n       {\n           \"status\": {\n\
                    \               \"success\": false,\n               \"code\":\
                    \ 12005,\n               \"message\": \"Reward constraint evaluation\
                    \ failed. Request failed. Max limit for the DAYS is reached. Allowed\
                    \ limit is 15 For Level CUSTOMER\"\n           },\n          \
                    \ \"rewardId\": 49827,\n           \"requestedQuantity\": 1,\n\
                    \           \"pointsReferenceId\": null,\n           \"intouch\"\
                    : null,\n           \"promotions\": null,\n           \"vendor\"\
                    : null,\n           \"restrictions\": null\n       }\n   ]\n}\n\
                    \n"
                Result:
                  value: "{\n   \"status\": {\n       \"success\": false,\n      \
                    \ \"code\": 8010,\n       \"message\": \"Reward issued partially\"\
                    \n   },\n   \"rewards\": [\n       {\n           \"status\": {\n\
