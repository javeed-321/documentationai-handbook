openapi: 3.1.0
info:
  title: Set Cart Promotion Settings
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /v1/management/promotions/settings/strategy:
    post:
      summary: Set Cart Promotion Settings
      description: Lets you configure org level Cart promotion settings.
      operationId: set-promotion-settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                conditionBasedRankingStrategy:
                  type: string
                  description: Whether to evaluate cart first or line item first when
                    both promotions are applicable.
                  enum:
                  - CART_BASED_FIRST
                  - LINE_ITEM_BASED_FIRST
                rewardStrategy:
                  type: string
                  description: When both normal and reward promotions are applicable,
                    pass PROMOTION_FIRST to prioritize normal promotions such as Loyalty,
                    Loyalty earning and POS promotions. Pass REWARDS_FIRST to prioritize
                    reward promotions.
                  default: NO_STRATEGY
                  enum:
                  - PROMOTION_FIRST
                  - REWARDS_FIRST
                singlePromotionPerLineitem:
                  type: boolean
                  description: Pass false to to allow multiple promotions on different
                    quantities of a line items or SKUs; pass true to allow single
                    promotion.
                promotionRankingStrategy:
                  type: string
                  description: Define ranking of promotions when multiple promotions
                    are applicable - according to the early expiry date, maximum discount
                    applicable, or priority.
                  enum:
                  - EXPIRY_BASED
                  - MAX_DISCOUNT
                  - PRIORITY
                isActive:
                  type: boolean
            examples:
              Sample POST Body:
                value:
                  promotionRankingStrategy: EXPIRY_BASED
                  rewardStrategy: PROMOTION_FIRST
                  singlePromotionPerLineitem: true
                  conditionBasedRankingStrategy: LINE_ITEM_BASED_FIRST
                  isActive: true
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: ''
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
