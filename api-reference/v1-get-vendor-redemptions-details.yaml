info:
  title: Get all vendor redemptions
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/vendor/redemptions:
    get:
      summary: Get all vendor redemptions
      description: ''
      operationId: get-vendor-redemptions-details
      parameters:
      - name: page
        in: query
        description: Specify the number of page you want to view.
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        description: Specifies the size of page
        schema:
          type: integer
          format: int32
      - name: vendorIds
        in: query
        description: Unique ID of Vendor.
        schema:
          type: integer
          format: int32
      - name: redemptionType
        in: query
        description: Type of reward redemption .
        schema:
          type: string
          enum:
          - ''
      - name: order
        in: query
        description: Specifies the order in which you want to view the list.
        schema:
          type: string
      - name: sortOn
        in: query
        description: Filter used to sort the list.
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                "Failure: Incorrect Page number and size":
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 8000,\n        \"message\": \"Unable to fetch as\
                    \ Page number and size is invalid\"\n    },\n    \"redemptionList\"\
                    : null,\n    \"pagingDetails\": null\n}"
                "Failure: Invalid redemption type":
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 2110,\n        \"message\": \"Invalid redemption(reward)\
                    \ type\"\n    },\n    \"redemptionList\": null,\n    \"pagingDetails\"\
                    : null\n}"
