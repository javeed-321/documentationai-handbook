openapi: 3.1.0
info:
  title: Forget Password
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/password/forget:
    post:
      summary: Forget Password
      description: "Lets you set a new password if the customer has lost or forgot\
        \ password. This is applicable only for brands for which password is enabled.\
        \ You need to first generate sessionId and then use it in password/forget.\
        \ After setting a new password, the customer customer needs to authenticate\
        \ again - \n\n1. Generate token, \n2. Generate OTP, and \n3. Validate OTP."
      operationId: forget-password-1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - identifierType
              - identifierValue
              - brand
              - deviceId
              - sessionId
              - password
              - confirmPassword
              properties:
                identifierType:
                  type: string
                  description: "Identifier used for token generation. Values: MOBILE,\
                    \ EMAIL, USERNAME."
                identifierValue:
                  type: string
                  description: Value of the specified identifierType.
                brand:
                  type: string
                  description: Name of the brand/org for which authentication needs
                    to be verified.
                deviceId:
                  type: string
                  description: Unique ID of the device used for changing password.
                    Applicable only for mobile app.
                sessionId:
                  type: string
                  description: Unique sessionId generated for the identifierType and
                    deviceId combination.
                password:
                  type: string
                  description: New password for the account.
                confirmPassword:
                  type: string
                  description: Reenter the new password.
            examples:
              Sample POST Body:
                value:
                  identifierType: USERNAME
                  identifierValue: '9940000000'
                  deviceId: deviceid1
                  brand: KANMODEMO
                  password: password1
                  confirmPassword: password1
                  sessionId: D-86c23a88-9062-473d-ab3a-9a27145bf321
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"SUCCESS\"\n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: SUCCESS
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
