openapi: 3.1.0
info:
  title: Get badges for customer
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/v1/badges/customer/{customerId}":
    get:
      summary: Get badges for customer
      description: ''
      operationId: get-badges-for-customer
      parameters:
      - name: badgeType
        in: query
        description: The type of badge to display
        schema:
          type: string
          enum:
          - AVAILABLE
          - EARNED
          default: AVAILABLE
      - name: includeExpired
        in: query
        description: This is the earn expiry. If true then all the earned badges which
          are even expired will be part of the response. If false, then only the badges
          where earn is active will be a part of the response
        schema:
          type: boolean
      - name: customerId
        in: path
        schema:
          type: string
        required: true
      - name: sortOn
        in: query
        description: "Enables sorting of badges based on rank. Value: rank."
        schema:
          type: string
      - name: X-CAP-CUSTOMER-IDENTIFIER
        in: header
        description: Pass this header to search the customer based on their email,
          mobile number, card number or external ID.
        schema:
          type: string
          enum:
          - email
          - mobile
          - cardNumber
          - externalId
      - name: groupId
        in: query
        description: Badge group ID to which the badge belongs to.
        schema:
          type: string
      - name: lastEarnedOnDate
        in: query
        description: "Date and time when the badge was awarded to the customer. Time\
          \ format: Epoch format (UNIX timestamp in milliseconds)."
        schema:
          type: number
          format: float
      - name: lastEarnEventDate
        in: query
        description: "Date and time when a triggering event (transactional or behavioural)\
          \ occurred, initiating the badge earning. Time format: Epoch format (UNIX\
          \ timestamp in milliseconds)."
        schema:
          type: number
          format: float
      responses:
        '200':
          description: '200'
