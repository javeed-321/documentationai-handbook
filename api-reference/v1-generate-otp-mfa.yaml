openapi: 3.1.0
info:
  title: Generate MFA OTP
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/mfa/otp/generate:
    post:
      summary: Generate MFA OTP
      description: Generates OTP for MFA flow.
      operationId: generate-otp-mfa
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - identifierType
              - identifierValue
              - deviceId
              - brand
              - sessionId
              properties:
                identifierType:
                  type: string
                  description: Customer identifier used for MFA token generation.
                  enum:
                  - MOBILE
                  - EMAIL
                  - USERNAME
                  - EXTERNALID
                identifierValue:
                  type: string
                  description: Value of the identifier.
                deviceId:
                  type: string
                  description: Device ID of the customer that receives OTP.
                brand:
                  type: string
                  description: Name of the brand or organisation that needs verification.
                sessionId:
                  type: string
                  description: Unique session ID created from `/mfa/token/generate`
                    API.
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"SUCCESS\"\n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: SUCCESS
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
