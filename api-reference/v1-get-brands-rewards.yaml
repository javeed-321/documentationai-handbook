paths:
  "/api_gateway/rewards/core/v1/reward/brand/{brand Id}":
    get:
      summary: Get brand rewards
      description: ''
      operationId: get-brands-rewards
      parameters:
      - name: brandId
        in: path
        description: Unique identifier of the brand.
        schema:
          type: integer
          format: int64
        required: true
      - name: userId
        in: query
        schema:
          type: string
      - name: includeExpired
        in: query
        schema:
          type: boolean
      - name: language
        in: query
        description: Filters the response based on the reward language. Use this parameter
          to retrieve rewards in a specific language. For example, to display rewards
          in English, set the parameter to en
        schema:
          type: string
          enum:
          - ''
          default: en
      - name: brand Id
        in: path
        required: true
        schema:
          type: string
      responses:
