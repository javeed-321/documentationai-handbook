openapi: 3.1.0
info:
  title: Update Rich Text Content Metadata for Rewards
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/brand/richContentMeta/{richcontentmetaID}":
    put:
      summary: Update Rich Text Content Metadata for Rewards
      description: ''
      operationId: update-rich-content
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"id\": 10,\n    \"name\": \"RCtestwithdefaultvalue\"\
                    ,\n    \"description\": \"RC2_desc\",\n    \"isMandatory\": false,\n\
                    \    \"isActive\": false,\n    \"scope\": \"REWARD\",\n    \"\
                    defaultValue\": \"hello this is your reward\",\n    \"createdBy\"\
                    : 75161973,\n    \"createdOn\": 1743270626236,\n    \"lastUpdatedBy\"\
                    : 75161973,\n    \"lastUpdatedOn\": 1743270626236\n}"
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 10
                    default: 0
                  name:
                    type: string
                    example: RCtestwithdefaultvalue
                  description:
                    type: string
                    example: RC2_desc
                  isMandatory:
                    type: boolean
                    example: false
                    default: true
                  isActive:
                    type: boolean
                    example: false
                    default: true
                  scope:
                    type: string
                    example: REWARD
                  defaultValue:
                    type: string
                    example: hello this is your reward
                  createdBy:
                    type: integer
                    example: 75161973
                    default: 0
                  createdOn:
                    type: integer
                    example: 1743270626236
                    default: 0
                  lastUpdatedBy:
                    type: integer
                    example: 75161973
                    default: 0
                  lastUpdatedOn:
                    type: integer
                    example: 1743270626236
                    default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location --request PUT 'https://eu.api.capillarytech.com/api_gateway/rewards/core/v1/brand/richContentMeta/10'\
            \ \\\n--header 'Content-Type: application/json' \\\n--header 'Accept:\
            \ */*' \\\n--header 'Authorization: Basic YXV0b3N0b3JlMS50aWxsMS0xNjgwMTY5MjIxOjIwMmNiOTYyYWM1OTA3NWI5NjRiMDcxNTJkMjM0Yjcw'\
            \ \\\n--data '{\n    \"name\": \"RCtestwithdefaultvalue\",\n    \"description\"\
            : \"RC2_desc\",\n    \"isMandatory\": false,\n    \"isActive\": false,\n\
            \    \"scope\": \"REWARD\",\n    \"defaultValue\": \"hello this is your\
            \ reward\"\n}'"
          name: UPDATE Rich Text Content
        samples-languages:
        - curl
      parameters:
      - name: richcontentmetaID
        in: path
        required: true
        schema:
          type: string
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
