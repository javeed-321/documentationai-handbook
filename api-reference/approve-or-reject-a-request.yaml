openapi: 3.1.0
info:
  title: Approve or reject a request
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/v2/request-workflow/{requestType}":
    put:
      summary: Approve or reject a request
      description: This API enables you to approve or reject a request
      operationId: approve-or-reject-a-request
      parameters:
      - name: requestType
        in: path
        schema:
          type: string
          enum:
          - CUSTOMER-STATUS-CHANGE
          - POINTS-REDEMPTION
          - GOODWILL-POINTS
          - EARN-BADGE
          - ISSUE-BADGE
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - requestId
              - actionName
              - payload
              properties:
                requestId:
                  type: string
                  description: The request ID generated during creation of the request.
                actionName:
                  type: string
                  description: The name of the action being performed by the checker
                    admin user. For example, adminTask.
                payload:
                  type: object
                  properties:
                    ? ''
                    : type: string
            examples:
              Approval:
                value:
                  requestId: d9df3b65-62a7-11ee-aa6d-0aaee4e533d2
                  actionName: AdminTask
                  payload:
                    AdminTask-Payload:
                      actionDecision: approved
                      actionMessage: approving the request
