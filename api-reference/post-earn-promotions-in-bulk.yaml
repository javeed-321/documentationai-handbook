openapi: 3.1.0
info:
  title: Post Earn Cart Promotions in Bulk
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/promotions/earn/bulk:
    post:
      summary: Post Earn Cart Promotions in Bulk
      description: This API is used to earn cart promotions in bulk to the customers
      operationId: post-earn-promotions-in-bulk
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                RAW_BODY:
                  type: string
            examples:
              Request Body:
                value:
                  orgId: 0
                  customerId: 0
                  eventTime: 0
                  earnedFromType: BULK_ISSUE
                  eventDetails:
                    id: string
                    type: string
                    eventPayload:
                      additionalProp1: {}
                      additionalProp2: {}
                      additionalProp3: {}
                  earnedPromotions:
                  - promotionId: string
                    earnCount: 0
                    earnedFromId: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n\"data\": [\n{\n\"earnedFromId\": \"string\",       \
                    \          \t\t    // earn event id\n\"promotionId\": \"string\"\
                    ,                                  //Unique id assigned to each\
                    \ promotion\n“successfulEarnCount\": 0,                //Number\
                    \ of times the promotion is earned successfully\n“failedEarnCount\"\
                    : 0,                 //Number of times the promotion earn was\
                    \ unsuccessful   \n  \"errorDetails\": {\n        \"errorCode\"\
                    : 0,\n        \"errorMessages\": \"string\"\n      },\n      \"\
                    customerEarnedPromotions\": [\n        {\n          \"id\": \"\
                    string\",                                      //Unique id assigned\
                    \ of the promotion earned\n          \"customerId\": 0,      \
                    \             //Unique id of the customer who earned the promotion\n\
                    \          \"promotionId\": \"string\",                      \
                    \          //Unique id assigned to each promotion\n  \"eventDetails\"\
                    : {                                                      // unique\
                    \ details of event occurrence\n          \"earnedFromType\": \"\
                    BULK_ISSUE\",                // Type of earn, whether single/bulk\n\
                    \          \"earnedFromId\": \"string\", \n          \"eventTime\"\
                    : 0,                                     // Captures the time\
                    \ when the event occurs\n          \"eventDetails\": {\n     \
                    \       \"id\": \"string\",\n            \"type\": \"string\"\
                    ,\n            \"eventPayload\": {\n              \"additionalProp1\"\
                    : {},\n              \"additionalProp2\": {},\n              \"\
                    additionalProp3\": {}\n            }\n          },\n         \
                    \ \"validTill\": 0,                                          \
                    \             // promotion validity date\n          \"errorDetails\"\
                    : {\n            \"errorCode\": 0,\n            \"errorMessages\"\
                    : \"string\"\n          }\n        }\n      ]\n    }\n  ],\n \
                    \ \"errors\": [\n    {\n      \"code\": 0,\n      \"message\"\
                    : \"string\"\n    }\n  ]\n}\n\n\n\n\n"
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
