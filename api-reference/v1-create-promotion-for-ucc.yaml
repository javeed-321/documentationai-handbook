                    \  \"active\": true,\n                \"rules\": [\n         \
                    \           {\n                        \"id\": -1,\n         \
                    \               \"exp\": \"true\",\n                        \"\
                    expJSON\": \"{ \\\"arity\\\": \\\"literal\\\", \\\"value\\\":\
                    \ \\\"true\\\", \\\"type\\\": \\\"boolean:primitive\\\" }\",\n\
                    \                        \"isActive\": true,\n               \
                    \         \"caseToActions\": {\n                            \"\
                    true\": [\n                                {\n               \
