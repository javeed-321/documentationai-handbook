                    \            ],\n            \"restrictions\": {\n           \
                    \     \"redemptionRestrictions\": [\n                    {\n \
                    \                       \"name\": \"MAX_ALLOWED_TIMES_PER_CUSTOMER\"\
                    ,\n                        \"value\": 3,\n                   \
