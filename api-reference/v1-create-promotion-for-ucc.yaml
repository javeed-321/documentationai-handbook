openapi: 3.1.0
info:
  title: Create Loyalty Promotion for UCC
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/loyalty/v1/programs/{programId}/createPromotion/{promotionType}":
    post:
      summary: Create Loyalty Promotion for UCC
      description: Lets you create a promotion for UCC a specific loyalty program.
      operationId: create-promotion-for-ucc
      parameters:
      - name: programId
        in: path
        description: Unique ID of the loyalty program associated with the promotion.
        schema:
          type: integer
          format: int64
        required: true
      - name: promotionType
        in: path
        description: Type of promotion. Supported values SIMPLE, RANGE, KEYWORD
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - programId
              - startDate
              - endDate
              - identifier
              - eventName
              - rulesetInfos
              - contextID
              - orgID
              - contextType
              - endpointName
              - type
              - active
              - rules
              - caseToActions
              properties:
                id:
                  type: integer
                  description: The ID of the ruleset. Set the value to -1. This indicates
                    that a new promotion request is being created.
                  format: int32
                name:
                  type: string
                  description: Unique name for the ruleset
                programId:
                  type: integer
                  description: Unique ID of the loyalty program to associate with
                    the promotion. You can create multiple promotions under a single
                    loyalty program.
                  format: int32
                startDate:
                  type: string
                  description: "Validity of the promotion. Pass the date range in\
                    \ `startDate` and `endDate` (ISO standard - `yyyy-mm-ddThh:mm:ss.s+z`)."
                  format: date
                endDate:
                  type: string
                  description: "Validity of the promotion. Pass the ISO date range\
                    \ in `startDate` and `endDate` (ISO standard - `yyyy-mm-ddThh:mm:ss.s+z`)."
                  format: date
                allocatePointsOn:
                  type: string
                  description: Enter event action name that generates promotional
                    points. For example,  `Bill`
                identifier:
                  type: string
                  description: Unique identifier of the promotion
                eventName:
                  type: string
                  description: Name of the event to associate with the promotion.
                    For example, `TRANSACTIONADD`, `CUSTOMERUPDATE`, `OfferScan`,
                    `spinTheWheel`, and more
                  enum:
                  - ''
                metadata:
                  type: object
                  description: metadataEnter meta information of the promotion in
                    key and value.
                  properties: {}
                allocationActions:
                  type: object
                  description: Allocation attributes like allocation type, expiry
                    days, and more.
                  properties: {}
                qualifyingConditions:
                  type: array
                  description: Array of different conditions like KPI, parameters,
                    and more.
                  items:
                    type: string
                conditionExpression:
                  type: string
                  description: Name of the condition that is passed in `qualifyingConditions`.
                allocationRule:
                  type: array
                  description: Set the condition to generate the promotional points.
                  items:
                    type: string
                limits:
                  type: object
                  description: Set the maximum number of promotional points issued
                    to a customer during a specific promotion period. Set the maximum
                    number of times points can be issued to a customer during a promotion
                    period. Set the total number of points that can be generated during
                    a promotion period.
                  properties: {}
                rulesetInfos:
                  type: object
                  description: Information about the ruleset associated with the promotion.
                    The rulesets define the rules and conditions under which a promotion
                    operates.
                  properties: {}
                contextID:
                  type: integer
                  description: "Unique ID of the promotion. Refer to the documentation\
                    \ on [promotion IDs](https://docs.capillarytech.com/reference/get-promotion-by-id)\
                    \ for more information."
                  format: int32
                orgID:
                  type: integer
                  description: Unique ID of the organization
                  format: int32
                contextType:
                  type: string
                  description: The type of context. Set to program.
                endpointName:
                  type: string
                  description: Set to POINTSENGINE_ENDPOINT
                type:
                  type: string
                  description: Type of ruleset.
                active:
                  type: boolean
                  description: Status of the promotion. Set to true when creating
                    a promotion for the first time
                rules:
                  type: array
                  description: The rules defined for the promotion
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: The unique identifier for the rule.
                        format: int32
                      exp:
                        type: boolean
                        description: Enable rule expression. Rule expressions are conditions
                          that determine whether a statement is true or false. Refer
                          to rule writing for more information.
                      expJSON:
                        type: string
                        description: The rule expression in JSON format.
                      isActive:
                        type: boolean
                        description: Indicates whether the rule is active. Set to true
                          when creating a promotion for the first time
                      priority:
                        type: integer
                        description: The priority of the rule.
                        format: int32
                      startDate:
                        type: integer
                        description: The start date of the rule. ISO 8601 Date Format
                        format: int32
                      endDate:
                        type: integer
                        description: The end date of the rule. ISO 8601 Date Format
                        format: int32
                      createdOn:
                        type: integer
                        description: The timestamp when the rule was created. ISO 8601
                          Date Format
                        format: int32
                caseToActions:
                  type: object
                  description: The actions to be taken based on the rule. Refer to
                    actions for more information
                  properties:
                    name:
                      type: string
                      description: Name of the action
                    mandatoryPropertiesValues:
                      type: string
                      description: "As a set of key pair values  eg:   \"key\": \"ProRateOnSourceValue\"\
                        , \"value\": \"EVENT_DEFAULT_VALUE\""
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"promotion\": {\n        \"id\": -1,\n        \"\
                    name\": \"test_promo_uniqueName110\",\n        \"programId\":\
