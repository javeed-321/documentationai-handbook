                    \          \"actionName\": \"AWARD_TARGET_POINTS_ACTION\",\n \
                    \                                   \"mandatoryPropertiesValues\"\
                    : {\n                                        \"ProRateOnSourceValue\"\
                    : \"EVENT_DEFAULT_VALUE\",\n                                 \
                    \       \"DelayStrategy\": \"AS_DEFINED_IN_ALLOCATION_STRATEGY\"\
                    ,\n                                        \"SourceValueRoundingStrategy\"\
                    : \"ACTUAL\",\n                                        \"ExpiryStrategy\"\
                    : \"81042\",\n                                        \"AwardStrategy\"\
                    : \"82690\",\n                                        \"PointsRoundingStrategy\"\
                    : \"ACTUAL\",\n                                        \"TargetGroupId\"\
                    : \"1234567\",\n                                        \"TargetRuleName\"\
                    : \"TargetRuleName\"\n                                    }\n\
                    \                                }\n                         \
                    \   ]\n                        },\n                        \"\
                    filterInfo\": [],\n                        \"description\": \"\
                    \",\n                        \"expDataType\": \"\",\n        \
                    \                \"ruleSetId\": -1,\n                        \"\
                    updatedViaNewUI\": false\n                    }\n            \
                    \    ],\n                \"filterInfo\": [\n                 \
