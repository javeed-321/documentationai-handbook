                    \                        \"propertyToValues\": {\n           \
                    \                 \"loyaltyType\": [\n                       \
                    \         \"loyalty\"\n                            ]\n       \
                    \                 }\n                    },\n                \
                    \    {\n                        \"id\": -1,\n                \
