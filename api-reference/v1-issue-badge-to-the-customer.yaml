openapi: 3.1.0
info:
  title: Issue badge (earn)
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/badges/customer/earn:
    post:
      summary: Issue badge (earn)
      description: ''
      operationId: issue-badge-to-the-customer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - customerId
              - ownerType
              - referenceId
              properties:
                badgeMetaId:
                  type: string
                customerId:
                  type: string
                requestId:
                  type: string
                triggeredBy:
                  type: object
                  properties: {}
                ownerType:
                  type: string
                  description: Type of owner.
                referenceId:
                  type: string
                  description: A unique identifier associated with the owner.
                earnEventDate:
                  type: string
                  description: The date on which the customer performed the activity.
                    Earn event date. Timestamp in the ISO 8601 standard format format
                    YYYY-MM-DDTHH:MM:SS.SSSZ. has to be between the badge start date
                    and end date if it is a direct earn type of badge and it has to
                    be between the badge issual start date and end date if it is an
                    issue & earn type of badge.
                  format: date-time
            examples:
              request:
                value:
                  badgeMetaId: 692e7e739b3ca00e4bbf7c06
                  earnEventDate: '2025-12-02T11:30:00.192Z'
                  customerId: '23423'
                  requestId: 23432
                  triggeredBy:
                    ownerType: Loyalty
                    referenceId: '123'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample response:
                  value:
                    data:
                      badgeMetaId: 692e7e739b3ca00e4bbf7c06
                      customerId: 23423
                      earnedBadgeId: 696e2234eba5957293853195
                      expiresOn: 1770034996.71532
                      expiresOnISO: '2026-02-02T12:23:16Z'
                      requestId: '23432'
                      issuedId: null
                    errors: []
                    warnings: []
                  summary: Sample response
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      badgeMetaId:
                        type: string
                        example: 66276dc68fe258516a88ff8e
                      customerId:
                        type: integer
                        example: 62090013
                        default: 0
                      earnedBadgeId:
                        type: string
                        example: 66277aa28fe258516a88fff3
                      expiresOn:
                        type: number
                        example: 1715072930.64038
                        default: 0
                      requestId: {}
                  errors:
                    type: array
                  warnings:
                    type: array
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"data\": null,\n    \"errors\": [\n        {\n \
                    \           \"code\": 809,\n            \"message\": \"Request\
                    \ with same requestId is not allowed\",\n            \"reference\"\
                    : null\n        }\n    ],\n    \"warnings\": null\n}"
              schema:
                type: object
                properties:
                  data: {}
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: integer
                          example: 809
                          default: 0
                        message:
                          type: string
                          example: Request with same requestId is not allowed
                        reference: {}
                  warnings: {}
        '409':
          description: '409'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"data\": null,\n    \"errors\": [\n        {\n \
                    \           \"code\": 811,\n            \"message\": \"Badge issue\
                    \ is mandatory before earn\",\n            \"reference\": null\n\
                    \        }\n    ],\n    \"warnings\": null\n}"
              schema:
                type: object
                properties:
                  data: {}
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: integer
                          example: 811
                          default: 0
                        message:
                          type: string
                          example: Badge issue is mandatory before earn
                        reference: {}
                  warnings: {}
      deprecated: false
      x-readme:
        code-samples:
        - code: "curl --location 'https://eu.api.capillarytech.com/api_gateway/v1/badges/customer/earn'\
            \ \\\n--header 'Accept: application/json' \\\n--header 'Content-Type:\
            \ application/json' \\\n--header 'Authorization: Basic bWFkaHV2YQ==' \\\
            \n--header 'Cookie: _cfuvid=G55QZbUnuqcGlxvEVrDIeQAXNoTvA58qzY6ItL2dY2A-1768823991734-0.0.1.1-604800000'\
            \ \\\n--data '\n{\n  \"badgeMetaId\": \"692e7e739b3ca00e4bbf7c06\",\n\
            \  \"earnEventDate\": \"2025-12-02T11:30:00.192Z\",\n  \"customerId\"\
            : \"23423\",\n  \"requestId\": 23432,\n  \"triggeredBy\": {\n   \"ownerType\"\
            : \"Loyalty\",\n    \"referenceId\": \"123\"\n  }\n}\n'"
          language: shell
          name: Sample request
        samples-languages:
        - shell
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
