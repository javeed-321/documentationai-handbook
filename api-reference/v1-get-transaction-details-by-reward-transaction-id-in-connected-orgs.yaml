openapi: 3.1.0
info:
  title: Get Transaction Details by Reward Transaction ID in Connected orgs
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1.1/reward-transactions/{rewardTransactionId}:
    get:
      summary: Get Transaction Details by Reward Transaction ID in Connected orgs
      description: This API is used to retrieve details of a specific reward transaction
        using reward transaction ID, in connected orgs.
      operationId: get-transaction-details-by-reward-transaction-id-in-connected-orgs
      parameters:
      - name: DATA-SCOPE-ORG
        in: header
        description: List of Organization IDs
        schema:
          type: string
      - name: DATA-SCOPE
        in: header
        description: 'Scopes define what data can be accessed using the API. You can
          use scopes to control access to data from a parent or child organization.
          Defining a scope ensures that the response contains only data from the respective
          organization.  Supported headers: `SELF`, `OTHER` and `ALL`.'
        schema:
          type: string
      - name: rewardTransactionId
        in: path
        description: Unique identifier of the reward transaction. The reward transaction
          is generated during the issual of the reward.
        schema:
          type: string
        required: true
      responses:
        '200':
          description: '200'
          content:
