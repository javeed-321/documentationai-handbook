openapi: 3.1.0
info:
  title: Enroll/Re-Enroll a Customer to a Milestone or Streak
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/intouch-api-v3/v3.1/targetGroups/{targetGroupId}/targets/{targetId}/enroll:
    post:
      summary: Enroll/Re-Enroll a Customer to a Milestone or Streak
      description: ''
      operationId: connectedorgs-enroll-customer-milestone-or-streak
      parameters:
      - name: DATA-SCOPE-ORG
        in: header
        description: List of Organization IDs
        required: true
        schema:
          type: string
      - name: DATA-SCOPE
        in: header
        description: The scope to authorize access (SELF, OTHER)
        required: true
        schema:
          type: string
      - name: targetGroupId
        in: path
        description: The ID of the target group associaThe ID of the target group
          associated with the item.ted with the item.
        schema:
          type: integer
          format: int32
        required: true
      - name: targetId
        in: path
        description: The ID of the target.
        schema:
          type: integer
          format: int32
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - customerId
              properties:
                customerId:
                  type: string
                  description: Unique ID of the customer.
                periodName:
                  type: string
                  description: Name of the period/cycle into which the user has to
                    be enrolled/re-enrolled in the case of Milestones. Also, period
                    names can be found from the UI of the milestone. In the case of
                    Streaks, this field itself is not needed.
                initialBalance:
                  type: integer
                  description: The initial balance amount assigned to the customer.
                    This could be 0 or any other number, and when a user enrols with
                    initial balance, the amount of targets needs to be achieved will
                    be decreased by same value. If this given as NULL in the case
                    or re-enrol, then the user's target value will start from the
                    same value at which the un-enrol happened before. Initial balance
                    field won't work for streaks.
                  format: int32
                resetStreakStatus:
                  type: boolean
                  description: This field is only for streaks. If this is false, user
                    will continue from the streak value that is present before the
                    un-enrol from the streak. If this is marked as true during re-enrol,
                    then the streak value of the user will be reset & it's like starting
                    fresh.
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"data\": 345651201,\n    \"errors\": null,\n   \
                    \ \"warnings\": null\n}"
              schema:
                type: object
                properties:
                  data:
                    type: integer
                    example: 345651201
                    default: 0
                  errors: {}
                  warnings: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"data\": null,\n    \"errors\": [\n      {\n   \
                    \     \"code\": 310141,\n        \"message\": 'Datascope 'ALL'\
                    \ is not supported for this 'API'\n      }\n      ],\n    \"warnings\"\
                    : null\n}"
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location 'host/api_gateway/intouch-api-v3/v3.1/targetGroups/58378/targets/124370/enroll'\
            \ \\\n--header 'Content-Type: application/json' \\\t\n--header 'DATA-SCOPE:\
            \ OTHER' \\\n--header 'CONNECTED-ORGS: 1251' \\\n--data '[\n    {\n  \"\
            customerId\": \"7124712\",\n  \"periodName\": \"PERIOD_G_29463_1\",\n\
            \  \"initialBalance\": 0,\n  \"resetStreakStatus\": false\n        \n\
            \    }\n]'"
          name: cURL
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
