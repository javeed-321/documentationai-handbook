openapi: 3.1.0
info:
  title: Create custom field for badges
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/badges/customField:
    post:
      summary: Create custom field for badges
      description: ''
      operationId: create-custom-field
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - dataType
              properties:
                name:
                  type: string
                  description: The name of the custom field.
                isMandatory:
                  type: boolean
                  description: Indicates if the custom field is mandatory.
                defaultValue:
                  type: string
                  description: The default value of the custom field.
                dataType:
                  type: string
                  description: The data type of the custom field's value.
                  enum:
                  - INTEGER
                  - BOOLEAN
                  - DATE
                  - STRING
            examples:
              Request Body:
                value:
                  name: CF20 dates
                  isMandatory: false
                  defaultValue: '0'
                  dataType: STRING
      responses:
        '201':
          description: '201'
          content:
            application/json:
              examples:
                Sample response:
                  value:
                    data:
                      id: 69c0e1c823ba8848e5979a67
                      orgId: 100737
                      name: CF20 dates
                      isMandatory: false
                      defaultValue: '0'
                      isActive: true
                      dataType: STRING
                      createdOn: 1774248392.63756
