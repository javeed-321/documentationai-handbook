              schema:
                type: object
                properties:
                  customerDetails:
                    type: object
                    properties:
                      firstName:
                        type: string
                        example: Sushant
                      lastName:
                        type: string
                        example: Raj
                      userId:
                        type: integer
                        example: 347297848
                        default: 0
                      entityType:
                        type: string
                        example: CUSTOMER
                  ledgerDetails:
                    type: object
                    properties:
                      pageNumber:
                        type: integer
                        example: 0
                        default: 0
                      pageSize:
                        type: integer
                        example: 10
                        default: 0
                      totalEntries:
                        type: integer
                        example: 2
                        default: 0
                      pageCount:
                        type: integer
                        example: 1
                        default: 0
                      ledgerClosingBalance:
                        type: array
                  ledgerEntries:
                    type: array
                    items:
                      type: object
                      properties:
                        eventLogId:
                          type: integer
                          example: 13499091
                          default: 0
                        eventName:
                          type: string
                          example: TransactionAdd
                        customerId:
                          type: integer
                          example: 347297848
                          default: 0
                        ledgerCreatedDate:
                          type: string
                          example: "Fri Aug 30 11:17:57 GMT 2024"
                        customerDetails:
                          type: object
                          properties:
                            userId:
                              type: integer
                              example: 0
                              default: 0
                        entryDetails:
                          type: array
                          items:
                            type: object
                            properties:
                              ledgerEntryType:
                                type: string
                                example: CREDIT
                              points:
                                type: string
                                example: '100.000'
                              pointsCategory:
                                type: string
                                example: Main
                              programName:
                                type: string
                                example: ChildOrg1DefaultProgram
                              programId:
                                type: integer
                                example: 1148
                                default: 0
                        netPointsOnEvent:
