                        transactionDetails:
                          type: object
                          properties:
                            transactionId:
                              type: integer
                              example: 36363905
                              default: 0
                            transactionNumber:
                              type: string
                              example: '1725016677'
                            date:
                              type: string
                              example: "2024-08-30 11:17:57.0"
                            amount:
                              type: integer
                              example: 5000
                              default: 0
                            grossBillAmount:
