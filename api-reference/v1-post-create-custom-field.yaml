            ,\n    \"description\": \"Custom Field of STRING Type\",\n    \"scope\"\
            : \"CATALOGUE_PROMOTION\",\n    \"dataType\": \"STRING\",\n     Non-Mandatory\
            \ Parameters\n    \"orgId\": 100737,\n    \"isMandatory\": false,\n  \
            \  \"isActive\": true,\n     \"defaultValue\": \"EV3\",\n     \"enumValues\"\
            : [\"EV1\", \"EV2\", \"EV3\", \"EV4\", \"EV5\", \"EV6\", \"EV7\", \"EV8\"\
            , \"EV9\", \"EV10\", \"EV11\", \"EV12\", \"EV13\", \"EV14\", \"EV15\"\
