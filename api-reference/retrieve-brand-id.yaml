openapi: 3.1.0
info:
  title: Retrieve Brand ID
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/brand/getAll:
    post:
      summary: Retrieve Brand ID
      description: ''
      operationId: retrieve-brand-id
      parameters:
      - name: orgIds
        in: query
        description: Unique ID of the org.
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 3001,\n        \"message\": \"Brand fetched successfully\"\
                    \n    },\n    \"brandList\": [\n        {\n            \"id\"\
                    : 1,\n            \"brand\": \"BUKL\",\n            \"enabled\"\
                    : true,\n            \"orgId\": 100458\n        }\n    ]\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 3001
                        default: 0
                      message:
                        type: string
                        example: Brand fetched successfully
                  brandList:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                          default: 0
                        brand:
                          type: string
                          example: BUKL
                        enabled:
                          type: boolean
                          example: true
                          default: true
                        orgId:
                          type: integer
                          example: 100458
                          default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{}"
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location 'https://eu.api.capillarytech.com/api_gateway/rewards/core/v1/brand/getAll'\
