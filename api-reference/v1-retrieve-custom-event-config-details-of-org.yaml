openapi: 3.1.0
info:
  title: Retrieve Custom Event Config Details of Org
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/cortex/v1/neo-config:
    get:
      summary: Retrieve Custom Event Config Details of Org
      description: ''
      operationId: retrieve-custom-event-config-details-of-org
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"data\": [\n        {\n            \"orgId\": 100737,\n\
                    \            \"entityType\": \"TRANSACTION\",\n            \"\
                    transformEndpoint\": \"/transform/transaction/custom\",\n    \
                    \        \"active\": true,\n            \"auditInfo\": {\n   \
                    \             \"createdOn\": \"2025-04-23T06:59:56.411+00:00\"\
                    ,\n                \"createdBy\": 75155282,\n                \"\
                    lastUpdatedOn\": \"2025-04-23T07:06:33.947+00:00\",\n        \
                    \        \"lastUpdatedBy\": 75155282\n            }\n        },\n\
                    \        {\n            \"orgId\": 100737,\n            \"entityType\"\
                    : \"CUSTOMER\",\n            \"transformEndpoint\": \"/transform/customer/custom\"\
                    ,\n            \"active\": true,\n            \"auditInfo\": {\n\
                    \                \"createdOn\": \"2025-04-23T10:22:01.792+00:00\"\
                    ,\n                \"createdBy\": 75155282,\n                \"\
                    lastUpdatedOn\": \"2025-04-23T10:22:01.792+00:00\",\n        \
                    \        \"lastUpdatedBy\": 75155282\n            }\n        }\n\
                    \    ],\n    \"errors\": []\n}"
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        orgId:
                          type: integer
                          example: 100737
                          default: 0
                        entityType:
                          type: string
                          example: TRANSACTION
                        transformEndpoint:
                          type: string
                          example: /transform/transaction/custom
                        active:
                          type: boolean
                          example: true
                          default: true
                        auditInfo:
                          type: object
                          properties:
                            createdOn:
                              type: string
                              example: '2025-04-23T06:59:56.411+00:00'
                            createdBy:
                              type: integer
                              example: 75155282
                              default: 0
                            lastUpdatedOn:
                              type: string
                              example: '2025-04-23T07:06:33.947+00:00'
                            lastUpdatedBy:
                              type: integer
                              example: 75155282
                              default: 0
                  errors:
                    type: array
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location --request GET 'eu.api.capillarytech.com/api_gateway/cortex/v1/neo-config'\
            \ \\\n--header 'Content-Type: application/json' \\\n--header 'Authorization:\
            \ Basic bmVlcmFqLmRvYzpiNGFmODA0MDA5Y2IwMzZhNGNjZGMzMzQzMWVmOWFjOQ=='\
            \ \\\n--header 'Cookie: _cfuvid=dfGNwl01cEi2PH5VITS.zzfnmaVvZHqjsz8uMcy6KNA-1745384630231-0.0.1.1-604800000'\
            \ \\\n--data '{\n  \"orgId\": 100737,\n  \"entityType\": \"TRANSACTION\"\
            ,\n  \"transformEndpoint\": \"/transform/transaction/custom\",\n  \"active\"\
            : true\n}'"
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
