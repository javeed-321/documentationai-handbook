  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/v2/request-workflow/requests/{requestId}":
    get:
      summary: Get details of a particular request
      description: This API enables you to retrieve details of a particular request.
      operationId: get-request-info
      parameters:
