openapi: 3.1.0
info:
  title: Regenerate Authentication Token
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/token/regenerate:
    post:
      summary: Regenerate Authentication Token
      description: Generates authentication token using auth key or expired token
        generated in `otp/validate` API. By default, a token is valid for 15 minutes.
        You can use this API only for orgs in which password based authentication
        is enabled.
      operationId: regenerate-authentication-token-1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - identifierType
              - identifierValue
              - brand
              - deviceId
              - key
              properties:
                identifierType:
                  type: string
                  description: 'Identifier used for token generation. Values: MOBILE,
                    EMAIL, USERNAME.'
                identifierValue:
                  type: string
                  description: Value of the specified identifierType.
                brand:
                  type: string
                  description: Name of the brand/org for which authentication needs
                    to be verified.
                deviceId:
                  type: string
                  description: Unique ID of the device from which the customer has
                    generated the token.
                key:
                  type: string
                  description: Unique key generated for the successful mobile app
                    OTP validation.
            examples:
              Sample POST Body:
                value:
                  identifierType: MOBILE
                  identifierValue: 0495678923
                  deviceId: 32rtsdered
                  brand: STANDARDAPP
                  key: ''
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"identifierType\":\"MOBILE\",\n    \"identifierValue\"\
                    :\"0495678923\",\n    \"brand\": \"STANDARDAPP\", \"expiredToken\"\
                    :\"nhdbYiOlsiTU9CSUxFfDk5NDU1NjAyMjQiXSwiZGV2IjoiMzJydHNkZXJlZCIsIm9yZyI6IlNUQU5EQVJEQVBQIiwiYWxnIjoiSFMyNTYifQ.eyJpc3MiOiJDQVBJTExBUlkgVEVDSE5PTE9HSUVTIiwib2djIjpbIjE1MTA2MHxzYS5kZW1vLnNvbHV0aW9uIl0sImV4cCI6MTU5NzY1NTgxMywiaWF0IjoxNTk3NjUyMjEzLCJyb2wiOiJWSUVXIn0.2LqAg3tDVu8VwasSXuwiL6p917NCxgpKEt76qqrHGsF\"\
                    \n}"
              schema:
                type: object
                properties:
                  identifierType:
                    type: string
                    example: MOBILE
                  identifierValue:
                    type: string
                    example: 0495678923
                  brand:
                    type: string
                    example: STANDARDAPP
                  expiredToken:
                    type: string
                    example: nhdbYiOlsiTU9CSUxFfDk5NDU1NjAyMjQiXSwiZGV2IjoiMzJydHNkZXJlZCIsIm9yZyI6IlNUQU5EQVJEQVBQIiwiYWxnIjoiSFMyNTYifQ.eyJpc3MiOiJDQVBJTExBUlkgVEVDSE5PTE9HSUVTIiwib2djIjpbIjE1MTA2MHxzYS5kZW1vLnNvbHV0aW9uIl0sImV4cCI6MTU5NzY1NTgxMywiaWF0IjoxNTk3NjUyMjEzLCJyb2wiOiJWSUVXIn0.2LqAg3tDVu8VwasSXuwiL6p917NCxgpKEt76qqrHGsF
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
