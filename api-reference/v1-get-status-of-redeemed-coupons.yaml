      description: Retrieves the status of the uploaded coupon redeem job a coupon
        series.
      operationId: get-status-of-redeemed-coupons
      parameters:
      - name: couponSeriesId
        in: query
        description: The ID of coupon series for which the user wants to know the
          redeem status.
        required: true
        schema:
          type: integer
          format: int64
      - name: Content-Type
        in: header
        required: true
        schema:
          type: string
      - name: x-cap-api-oauth-token
        in: header
        required: true
        schema:
          type: string
      - name: couponSeriesId
        in: path
        required: true
        schema:
          type: string
      responses:
