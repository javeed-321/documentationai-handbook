openapi: 3.1.0
info:
  title: Get audit logs of entities
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v2/audits:
    get:
      summary: Get audit logs of entities
      description: This page provides you with information on entity audit log API.
      operationId: get-entity-audit-logs
      parameters:
      - name: entityType
        in: query
        description: The type of entity for which you want to fetch audit logs.
        required: true
        schema:
          type: string
          enum:
          - CUSTOMER
          - CARD
      - name: entityId
        in: query
        description: The unique identifier corresponding to the entity.
        required: true
        schema:
          type: integer
          format: int64
      - name: limit
        in: query
        description: 'The number of results you wish to retrieve. Default value: 10.'
        schema:
          type: integer
          format: int32
          default: 10
      - name: pageNo
        in: query
        description: The page number, indicating which page of results to retrieve
        schema:
          type: integer
          format: int32
          default: 0
      - name: sortBy
        in: query
        description: 'The field by which results should be sorted. Default value:
          autoUpdateTime.'
        schema:
          type: string
          default: autoUpdateTime
      - name: sortOrder
        in: query
        description: 'The order in which results should be sorted. Supported values:
          ASC, DESC.'
        schema:
          type: string
          enum:
          - ASC
          - DESC
      - name: startDate
        in: query
        description: 'The start date of the date range. Example: 2022-08-18 16:00:00.'
        schema:
          type: string
          format: date
      - name: endDate
        in: query
        description: 'The end date of the date range. Example: 2022-08-18 16:00:00.'
        schema:
          type: string
          format: date
      - name: referenceType
        in: query
        description: The reference type. For Extended fields and Custom fields, audit
          logging is allowed for a maximum of 5 fields each.
        schema:
          type: string
          enum:
          - Identifier
          - StandardField
          - ExtendedField
          - CustomField
          - CustomerStatus
          - CardStatus
          - SubscriptionStatus
          - CustomerMerge
          - CardCustomField
          - CommChannel
          - CardExtendedField
      - name: referenceValue
        in: query
        description: The value for the selected reference type.
        schema:
          type: string
      - name: includeUserContext
        in: query
        description: Enter true to retrieve user context details.
        schema:
          type: boolean
      - name: source
        in: query
        description: Entity source.
        schema:
          type: string
