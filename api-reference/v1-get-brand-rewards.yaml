              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: User Reward fetched successfully
                  rewardList:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 489
