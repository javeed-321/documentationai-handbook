openapi: 3.1.0
info:
  title: Validate MFA OTP
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/mfa/otp/validate:
    post:
      summary: Validate MFA OTP
      description: Validates the OTP generated for the MFA flow.
      operationId: validate-mfa-otp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - identifierType
              - identifierValue
              - deviceId
              - brand
              - sessionId
              - otp
              properties:
                identifierType:
                  type: string
                  description: Customer identifier used for MFA token generation.
                  enum:
                  - MOBILE
                  - EMAIL
                  - USERNAME
                  - EXTERNALID
                identifierValue:
                  type: string
                  description: Value of the identifier.
                deviceId:
                  type: string
                  description: Unique ID of the device where OTP is validated.
                brand:
                  type: string
                  description: Name of the brand or organisation that needs verification.
                sessionId:
                  type: string
                  description: Unique session ID created from `/mfa/token/generate`
                    API.
                otp:
                  type: string
                  description: OTP that needs validation.
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
