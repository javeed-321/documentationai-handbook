openapi: 3.1.0
info:
  title: Get Purchased Rewards for User (New API)
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/user/userReward/brand/{BrandName}:
    get:
      summary: Get Purchased Rewards for User (New API)
      description: ''
      operationId: get-rewards-for-user-new-api
      parameters:
      - name: mobile/email/externalId
        in: query
        description: Mobile number/email/externalId of the customer to fetch rewards.
        schema:
          type: string
      - name: username
        in: query
        description: till id used in the authorization of the request
        schema:
          type: string
      - name: language
        in: query
        description: Filters the response based on the reward language. Use this parameter
          to retrieve rewards in a specific language. For example, to display rewards
          in English, set the parameter to en
        schema:
          type: string
          enum:
          - ''
          default: en
      - name: orderBy
        in: query
        description: Pass asc to order the results in ascending order of sortBy value,
          desc to order in descending order.
        schema:
          type: string
          enum:
          - ''
      - name: sortBy
        in: query
        description: 'Sort the results by a specific parameter.   Possible Value (column
          names in User Rewards table) :    "createdOn" "rewardId"'
        schema:
          type: string
          enum:
          - '"createdOn" "rewardId"'
      - name: page
        in: query
        description: To retrieve details of a specific page. Pass 0 to not apply pagination.
          For example, page=2&size=10 shows 10 results of page 2.
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        description: Results to show per page. Default - 100
        schema:
          type: integer
          format: int64
      - name: typeOfReward
        in: query
        description: filter to be used to fetch specific type of rewards instead of
          all,  possible values:-  Intouch_Reward,  Vendor_Intouch_Reward,  Vendor_Only_Reward,  Cart_Promotion
        schema:
          type: string
          enum:
          - Intouch_Reward
          - Vendor_Intouch_Reward
          - Vendor_Only_Reward
          - Cart_Promotion
      - name: fromPurchaseDate
        in: query
        description: 'filter to be used to fetch rewards by fetching the info based
          on given inputs like fromPurchaseDate  and toPurchaseDate which can serve
          multiple purpose like Filter rewards by Purchase date : Last 30 days ( from  last
          30 days date, to-> todays date in epoch time)'
        schema:
          type: integer
          format: int64
      - name: toPurchaseDate
        in: query
        description: 'filter to be used to fetch rewards by fetching the info based
          on given inputs like fromPurchaseDate  and toPurchaseDate which can serve
          multiple purpose like Filter rewards by Purchase date : Last 30 days ( from  last
          30 days date, to-> todays date in epoch time)'
        schema:
          type: integer
          format: int64
      - name: brandName
        in: path
        description: Name of the brand
        schema:
          type: string
        required: true
      responses:
        '200':
          description: '200'
