openapi: 3.1.0
info:
  title: Enable or Disable Reward Categories
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/metadata/category/{categoryId}/status/{action}/brand/{brandId}:
    put:
      summary: Enable or Disable Reward Categories
      description: Enable or disable a particular reward category.
      operationId: enable-or-disable-reward-categories
      parameters:
      - name: categoryId
        in: path
        description: Unique identifier for the reward category that needs to be enabled.
        schema:
          type: integer
          format: int32
        required: true
      - name: brandId
        in: path
        description: Unique identifier for the brand under which the reward category
          is associated.
        schema:
          type: integer
          format: int64
        required: true
      - name: action
        in: path
        description: Action to be performed.
        schema:
          type: string
          enum:
          - enable
          - disable
        required: true
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample Response:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 2006,\n        \"message\": \"Category updated successfully\"\
                    \n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 2006
                        default: 0
                      message:
                        type: string
                        example: Category updated successfully
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: 'curl --location --request PUT ''https://eucrm.cc.capillarytech.com/api_gateway/rewards/core/v1/metadata/category/129/status/enable/brand/55''
            \

            --header ''Content-Type: application/json'' \

            --header ''Accept: */*'' \

            --header ''Authorization: Basic Ymxpc3M6MWYjNzU5MWI1NzY='''
          name: Sample Request for Enabling Reward Category
        - language: curl
          code: 'curl --location --request PUT ''https://eu.api.capillarytech.com/api_gateway/rewards/core/v1/metadata/category/129/status/disable/brand/55''
            \

            --header ''Content-Type: application/json'' \

            --header ''Accept: */*'' \

            --header ''Authorization: Basic Ymxpc3M6MWY5U5MWI1NzY='''
          name: Sample Request for Disabling Reward Category
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
