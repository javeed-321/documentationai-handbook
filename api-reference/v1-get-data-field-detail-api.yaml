openapi: 3.1.0
info:
  title: Get Data Field Detail
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/cortex/v1/dataFields:
    get:
      summary: Get Data Field Detail
      description: This API allows you to retrieve the data field definitions for
        the specified entity (Customer or Transaction)
      operationId: get-data-field-detail-api
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Customer:
                  value: "{\n    \"data\": [\n        {\n            \"id\": \"67e6a8bfdd6a186b5555ba98\"\
                    ,\n            \"orgId\": 100737,\n            \"searchStrategyType\"\
                    : \"PREFIX\",\n            \"entityType\": \"CUSTOMER\",\n   \
                    \         \"dataFieldDefinitions\": [\n                {\n   \
                    \                 \"fieldId\": \"firstName\",\n              \
                    \      \"fieldAlias\": \"firstName\",\n                    \"\
                    fieldType\": \"DATA\",\n                    \"dataSourceDetails\"\
                    : {\n                        \"fieldReference\": \"firstName\"\
                    \n                    },\n                    \"dataType\": \"\
                    STRING\"\n                },\n                {\n            \
                    \        \"fieldId\": \"lastName\",\n                    \"fieldAlias\"\
                    : \"lastName\",\n                    \"fieldType\": \"DATA\",\n\
                    \                    \"dataSourceDetails\": {\n              \
                    \          \"fieldReference\": \"lastName\"\n                \
                    \    },\n                    \"dataType\": \"STRING\"\n      \
                    \          },\n                {\n                    \"fieldId\"\
                    : \"mobile\",\n                    \"fieldAlias\": \"mobile\"\
                    ,\n                    \"fieldType\": \"DATA\",\n            \
                    \        \"dataSourceDetails\": {\n                        \"\
                    fieldReference\": \"mobile\"\n                    },\n       \
                    \             \"dataType\": \"STRING\"\n                },\n \
                    \               {\n                    \"fieldId\": \"email\"\
                    ,\n                    \"fieldAlias\": \"email\",\n          \
                    \          \"fieldType\": \"DATA\",\n                    \"dataSourceDetails\"\
                    : {\n                        \"fieldReference\": \"email\"\n \
                    \                   },\n                    \"dataType\": \"STRING\"\
                    \n                },\n                {\n                    \"\
                    fieldId\": \"externalId\",\n                    \"fieldAlias\"\
                    : \"externalId\",\n                    \"fieldType\": \"DATA\"\
                    ,\n                    \"dataSourceDetails\": {\n            \
                    \            \"fieldReference\": \"externalId\"\n            \
                    \        },\n                    \"dataType\": \"STRING\"\n  \
                    \              }\n            ],\n            \"auditInfo\": {\n\
                    \                \"createdOn\": \"2025-03-28T13:48:47.665+00:00\"\
                    ,\n                \"createdBy\": 75155282,\n                \"\
                    lastUpdatedOn\": \"2025-03-28T13:48:47.665+00:00\",\n        \
                    \        \"lastUpdatedBy\": 75155282\n            }\n        }\n\
                    \    ],\n    \"errors\": []\n}"
                Transaction:
                  value: "{\n    \"data\": {\n        \"id\": \"67ebcbe9730aa850fc504145\"\
                    ,\n        \"orgId\": 100737,\n        \"searchStrategyType\"\
                    : \"COMBINATION\",\n        \"entityType\": \"TRANSACTION\",\n\
                    \        \"dataFieldDefinitions\": [\n            {\n        \
                    \        \"fieldId\": \"billNumber\",\n                \"fieldAlias\"\
                    : \"billNumber\",\n                \"fieldType\": \"DATA\",\n\
                    \                \"dataSourceDetails\": {\n                  \
                    \  \"fieldReference\": \"billNumber\"\n                },\n  \
                    \              \"dataType\": \"STRING\"\n            },\n    \
                    \        {\n                \"fieldId\": \"billDate\",\n     \
                    \           \"fieldAlias\": \"billDate\",\n                \"\
                    fieldType\": \"DATA\",\n                \"dataSourceDetails\"\
                    : {\n                    \"fieldReference\": \"billDate\"\n  \
                    \              },\n                \"dataType\": \"DATE\"\n  \
                    \          },\n            {\n                \"fieldId\": \"\
                    storename\",\n                \"fieldAlias\": \"storename\",\n\
                    \                \"fieldType\": \"DATA\",\n                \"\
                    dataSourceDetails\": {\n                    \"fieldReference\"\
                    : \"additionalFields.storename\"\n                },\n       \
                    \         \"dataType\": \"STRING\"\n            },\n         \
                    \   {\n                \"fieldId\": \"storecode\",\n         \
                    \       \"fieldAlias\": \"storecode\",\n                \"fieldType\"\
                    : \"DATA\",\n                \"dataSourceDetails\": {\n      \
                    \              \"fieldReference\": \"additionalFields.storecode\"\
                    \n                },\n                \"dataType\": \"STRING\"\
                    \n            }\n        ],\n        \"auditInfo\": {\n      \
                    \      \"createdOn\": \"2025-04-01T11:20:09.793+00:00\",\n   \
                    \         \"createdBy\": 75155282,\n            \"lastUpdatedOn\"\
                    : \"2025-04-01T11:20:09.793+00:00\",\n            \"lastUpdatedBy\"\
                    : 75155282\n        }\n    },\n    \"errors\": []\n}"
              schema:
                oneOf:
                - title: Customer
                  type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 67e6a8bfdd6a186b5555ba98
                          orgId:
                            type: integer
                            example: 100737
                            default: 0
                          searchStrategyType:
                            type: string
                            example: PREFIX
                          entityType:
                            type: string
                            example: CUSTOMER
                          dataFieldDefinitions:
                            type: array
                            items:
                              type: object
                              properties:
                                fieldId:
                                  type: string
                                  example: firstName
                                fieldAlias:
                                  type: string
                                  example: firstName
                                fieldType:
                                  type: string
                                  example: DATA
                                dataSourceDetails:
                                  type: object
                                  properties:
                                    fieldReference:
                                      type: string
                                      example: firstName
                                dataType:
                                  type: string
                                  example: STRING
                          auditInfo:
                            type: object
                            properties:
                              createdOn:
                                type: string
                                example: '2025-03-28T13:48:47.665+00:00'
                              createdBy:
                                type: integer
                                example: 75155282
                                default: 0
                              lastUpdatedOn:
                                type: string
                                example: '2025-03-28T13:48:47.665+00:00'
                              lastUpdatedBy:
                                type: integer
                                example: 75155282
                                default: 0
                    errors:
                      type: array
                - title: Transaction
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        id:
                          type: string
                          example: 67ebcbe9730aa850fc504145
                        orgId:
                          type: integer
                          example: 100737
                          default: 0
                        searchStrategyType:
                          type: string
                          example: COMBINATION
                        entityType:
                          type: string
                          example: TRANSACTION
                        dataFieldDefinitions:
                          type: array
                          items:
                            type: object
                            properties:
                              fieldId:
                                type: string
                                example: billNumber
                              fieldAlias:
                                type: string
                                example: billNumber
                              fieldType:
                                type: string
                                example: DATA
                              dataSourceDetails:
                                type: object
                                properties:
                                  fieldReference:
                                    type: string
                                    example: billNumber
                              dataType:
                                type: string
                                example: STRING
                        auditInfo:
                          type: object
                          properties:
                            createdOn:
                              type: string
                              example: '2025-04-01T11:20:09.793+00:00'
                            createdBy:
                              type: integer
                              example: 75155282
                              default: 0
                            lastUpdatedOn:
                              type: string
                              example: '2025-04-01T11:20:09.793+00:00'
                            lastUpdatedBy:
                              type: integer
                              example: 75155282
                              default: 0
                    errors:
                      type: array
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: 'curl --location ''https://eu.api.capillarytech.com/api_gateway/cortex/v1/dataFields''
            \

            --header ''Authorization: Basic cHJlcmFuYV9zaW5naDoyZmFhZmZjNjY5ZDRjMTc5YMzNhYzc5OTBjMTQ1Ng==''
            \

            --header ''Content-Type: application/json'' \

            --header ''Cookie: _cfuvid=257QQtZKKeLsnIKUrPVpHcKPHvi2s4LSYFlH8VLHtc0-1743065149089-0.0.1.1-604800000;
            _cfuvid=cryFX5AeUyWVtFaBgq_5BT7fv.XNzDRf_OtNgx6a9oA-1743493240591-0.0.1.1-604800000'''
          name: Customer
        - language: curl
          code: "curl --location 'eu.api.capillarytech.com/api_gateway/cortex/v1/dataFields'\
            \ \\\n--header 'Authorization: Basic bmVlcmFqLmRvYzpiNGFmODDA5Y2IwMzZhNGNjZGMzMzQzMWVmOWFjOQ=='\
            \ \\\n--header 'Content-Type: application/json' \\\n--header 'Cookie:\
            \ _cfuvid=NIG4hPIouTlCOXgwODX50uFuouza2nwDNThbawZibQM-1743137683215-0.0.1.1-604800000'\
            \ \\\n--data '{\n\"searchStrategyType\" : \"COMBINATION\",\n\t\"entityType\"\
            \ : \"TRANSACTION\",\n  \"dataFieldDefinitions\" :\n   [\n\t\t{\n\t\t\t\
            \"fieldId\" : \"billNumber\",\n\t\t\t\"fieldAlias\" : \"billNumber\",\n\
            \t\t\t\"fieldType\" : \"DATA\",\n\t\t\t\"dataSourceDetails\" : \n    \
            \        {\n\t\t\t\t\"fieldReference\" : \"billNumber\"\n\t\t\t},\n\t\t\
            \t\"dataType\" : \"STRING\"\n\t\t},\n    {\n\t\t\t\"fieldId\" : \"billDate\"\
            ,\n\t\t\t\"fieldAlias\" : \"billDate\",\n\t\t\t\"fieldType\" : \"DATA\"\
            ,\n\t\t\t\"dataSourceDetails\" : {\n\t\t\t\t\"fieldReference\" : \"billDate\"\
            \n\t\t\t},\n\t\t\t\"dataType\" : \"DATE\"\n\t\t},\n    {\n      \"fieldId\"\
            \ : \"storename\",\n      \"fieldAlias\" : \"storename\",\n      \"fieldType\"\
            \ : \"DATA\",\n      \"dataSourceDetails\" : {\n        \"fieldReference\"\
            \ : \"additionalFields.storename\"\n      },\n      \"dataType\" : \"\
            STRING\"\n    },\n    {\n      \"fieldId\" : \"storecode\",\n      \"\
            fieldAlias\" : \"storecode\",\n      \"fieldType\" : \"DATA\",\n     \
            \ \"dataSourceDetails\" : {\n        \"fieldReference\" : \"additionalFields.storecode\"\
            \n      },\n      \"dataType\" : \"STRING\"\n    }\n    \n\t]\n\n}'"
          name: Transaction
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
