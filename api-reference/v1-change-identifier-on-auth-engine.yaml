openapi: 3.1.0
info:
  title: Change identifier on Auth engine (COPY)
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /auth/v1/user/updateIdentifierValue (COPY):
    post:
      summary: Change identifier on Auth engine (COPY)
      description: This API enables you to change identifier values in the Auth engine.
      operationId: change-identifier-on-auth-engine
      parameters:
      - name: XCAP
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - brandName
              - identifierType
              - oldIdentifierValue*
              - newIdentifierValue
              - deviceId
              properties:
                brandName:
                  type: string
                  description: Organisation name.
                identifierType:
                  type: string
                  description: Identifier type of the customer.
                  enum:
                  - MOBILE
                  - EMAIL
                oldIdentifierValue*:
                  type: string
                  description: Old identifier value for the selected identifier type.
                newIdentifierValue:
                  type: string
                  description: New identifier value for the selected identifier type.
                deviceId:
                  type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"SUCCESS\"\n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: SUCCESS
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Invalid identifier type:
                  value: "Can not deserialize value of type com.capillary.solutions.auth.domain.IdentifierType\
                    \ from String \"MOBIL\": value not one of declared Enum instance\
                    \ names: [MOBILE, EMAIL, USERNAME, EXTERNALID]\n at [Source: org.glassfish.jersey.message.internal.ReaderInterceptorExecutor$UnCloseableInputStream@497779b5;\
                    \ line: 3, column: 21] (through reference chain: com.capillary.solutions.auth.request.ChangeIdentifierRequest[\"\
                    identifierType\"])"
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "{\n  \"brandName\": \"BUKL\",\n  \"identifierType\": \"MOBILE\",\n\
            \  \"oldIdentifierValue\": \"9988221101\",\n  \"newIdentifierValue\":\
            \ \"9988221100\"\n  \n}"
          name: Example body
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
