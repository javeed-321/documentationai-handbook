      description: ''
      operationId: get-user-specific-reward-by-id
      parameters:
      - name: mobile/Email/Externalid
        in: query
        description: Mobile number/ email Id/ External Id of the customer
        schema:
          type: string
      - name: username
        in: query
        description: username here represents name of the store
        required: true
        schema:
          type: string
      - name: rewardId
        in: path
        description: Unique identifier of the reward.
        schema:
          type: string
        required: true
      - name: brandname
        in: path
        description: Name of the brand.
        schema:
          type: string
        required: true
      - name: brandName
        in: path
        required: true
        schema:
          type: string
      - name: mobile
        in: query
        schema:
          type: string
        required: false
      - name: store
        in: query
        schema:
          type: string
        required: false
