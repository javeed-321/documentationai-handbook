openapi: 3.1.0
info:
  title: Get purchased reward details by id and user
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/user/reward/{rewardId}/vouchers/brand/{brandName}":
