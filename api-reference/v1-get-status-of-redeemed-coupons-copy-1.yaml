              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                    default: true
                  status:
                    type: integer
                    example: 200
                    default: 0
                  result:
                    type: object
                    properties:
                      orgId:
                        type: integer
                        example: 9838
                        default: 0
                      couponSeriesId:
                        type: integer
                        example: 909234
                        default: 0
                      redeemUploadJobStatuses:
                        type: array
                        items:
                          type: object
                          properties:
                            jobId:
                              type: integer
                              example: 4455
                              default: 0
                            uploadRedeemedCouponStatus:
                              type: string
                              example: COMPLETED
                            createdOn:
                              type: string
                              example: '1603132200000'
                            updatedOn:
                              type: string
                              example: '1603132200000'
                            errorFileUrl:
