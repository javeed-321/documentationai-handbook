openapi: 3.1.0
info:
  title: Get Status of Redeemed Coupons (COPY)
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /coupon/api/v1/upload/getUploadRedeemedCouponStatus/{couponSeriesId}:
    get:
      summary: Get Status of Redeemed Coupons (COPY)
      description: Retrieves the status of the uploaded coupon redeem job a coupon
        series.
      operationId: get-status-of-redeemed-coupons-copy-1
      parameters:
      - name: couponSeriesId
        in: query
        description: The ID of coupon series for which the user wants to know the
          redeem status.
        required: true
        schema:
          type: integer
          format: int64
      - name: Content-Type
        in: header
        required: true
        schema:
          type: string
      - name: x-cap-api-oauth-token
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample Response:
                  value: "{\n   \"success\":true,\n   \"status\":200,\n   \"result\"\
