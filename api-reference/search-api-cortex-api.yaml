            \n--header 'Cookie: _cfuvid=712eXDq0ppxlT168Xp.8agHB9AIF3dm1OHgmh0Qi_x0-1747981082674-0.0.1.1-604800000'\
            \ \\\n--data '{\n    \"entityType\": \"CUSTOMER\",\n\n    \"searchConditions\"\
