        - language: curl
          code: "curl --location 'eu.api.capillarytech.com/api_gateway/cortex/v1/search'\
            \ \\\n--header 'Content-Type: application/json' \\\n--data '{\n    \"\
            entityType\": \"CUSTOMER\",\n\n    \"searchConditions\": [\n        {\n\
            \            \"fieldId\": \"createdAt\",\n            \"operator\": \"\
            RANGE\",\n            \"values\": [\n                1625097600, 1625184000\n\
            \            ]\n        }\n    ]\n\n} '"
