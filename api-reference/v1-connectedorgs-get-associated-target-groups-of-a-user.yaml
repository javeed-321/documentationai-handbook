    get:
      summary: Get Associated Target Groups of a User
      description: ''
      operationId: connectedorgs-get-associated-target-groups-of-a-user
      parameters:
      - name: userId
        in: path
        description: The userId represents the unique identifier of a user. It allows
          you to retrieve the target groups associated with a specific user.
        schema:
          type: integer
          format: int64
        required: true
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-CAP-API-AUTH-KEY
        in: header
        schema:
          type: string
      - name: X-CAP-API-AUTH-ORG-ID
        in: header
        schema:
          type: string
      - name: X-CAP-API-OAUTH-TOKEN
        in: header
        schema:
          type: string
      - name: includeInactive
        in: query
        description: .Set true for fetching user target for all periods, both active
          and inactive.
        schema:
          type: boolean
      - name: targetRuleId
        in: query
        description: The ID of the target rule set for the target group.
        schema:
          type: integer
          format: int64
      - name: includeInactiveTargets
        in: query
        description: Set true to fetch all inactive targets of the user.
        schema:
          type: boolean
      - name: DATA-SCOPE-ORG
        in: header
        description: List of Organization IDs
        schema:
          type: string
      - name: DATA-SCOPE
        in: header
        description: The scope to authorize access (SELF, OTHER, ALL)
        required: true
        schema:
          type: string
