openapi: 3.1.0
info:
  title: 'Add Promotion : don''t make it public'
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/loyalty/v1/programs/{programId}/promotions/add/{promotion_type}:
    post:
      summary: 'Add Promotion : don''t make it public'
      description: Lets you create a promotion for a specific loyalty program.
      operationId: add-promotion
      parameters:
      - name: programId
        in: path
        description: Unique ID of the loyalty program.
        schema:
          type: integer
          format: int64
        required: true
      - name: promotionType
        in: path
        description: Type of promotion.
        schema:
          type: string
          enum:
          - SIMPLE
          - RANGE
          - KEYWORD
        required: true
      - name: promotion_type
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - programId
              - startDate
              - endDate
              - identifier
              - eventName
              - rulesetInfos
              - contextID
              - orgID
              - contextType
              - endpointName
              - type
              - startDate , endDate
              - active
              - rules
              - -exp
              - -expJSON
              - -isActive
              - caseToActions
              - --name
              - --mandatoryPropertiesValues
              properties:
                name:
                  type: string
                  description: Unique name for the ruleset
                programId:
                  type: integer
                  description: Unique ID of the loyalty program to associate with
                    the promotion. You can create multiple promotions under a single
                    loyalty program.
                  format: int32
                startDate:
                  type: string
                  description: Validity of the promotion. Pass the date range in `startDate`
                    and `endDate` (ISO standard - `yyyy-mm-ddThh:mm:ss.s+z`).
                  format: date
                endDate:
                  type: string
                  description: Validity of the promotion. Pass the ISO date range
                    in `startDate` and `endDate` (ISO standard - `yyyy-mm-ddThh:mm:ss.s+z`).
                  format: date
                allocatePointsOn:
                  type: string
                  description: Enter event action name that generates promotional
                    points. For example,  `Bill`
                identifier:
                  type: string
                  description: Unique identifier of the promotion
                eventName:
                  type: string
                  description: Name of the event to associate with the promotion.
                    For example, `TRANSACTIONADD`, `CUSTOMERUPDATE`, `OfferScan`,
                    `spinTheWheel`, and more
                  enum:
                  - ''
                metadata:
                  type: object
                  description: metadataEnter meta information of the promotion in
                    key and value.
                  properties: {}
                allocationActions:
                  type: object
                  description: Allocation attributes like allocation type, expiry
                    days, and more.
                  properties: {}
                qualifyingConditions:
                  type: array
                  description: Array of different conditions like KPI, parameters,
                    and more.
                  items:
                    type: string
                conditionExpression:
                  type: string
                  description: Name of the condition that is passed in `qualifyingConditions`.
                allocationRule:
                  type: array
                  description: Set the condition to generate the promotional points.
                  items:
                    type: string
                limits:
                  type: object
                  description: Set the maximum number of promotional points issued
                    to a customer during a specific promotion period. Set the maximum
                    number of times points can be issued to a customer during a promotion
                    period. Set the total number of points that can be generated during
                    a promotion period.
                  properties: {}
                rulesetInfos:
                  type: object
                  description: Information about the ruleset associated with the promotion.
                    The rulesets define the rules and conditions under which a promotion
                    operates.
                  properties: {}
                id:
                  type: integer
                  description: The ID of the ruleset. Set the value to -1. This indicates
                    that a new promotion request is being created.
                  format: int32
                contextID:
                  type: integer
                  description: Unique ID of the promotion. Refer to the documentation
                    on [promotion IDs](https://docs.capillarytech.com/reference/get-promotion-by-id)
                    for more information.
                  format: int32
                orgID:
                  type: integer
                  description: Unique ID of the organization
                  format: int32
                contextType:
                  type: string
                  description: The type of context. Set to program.
                endpointName:
                  type: string
                  description: Set to POINTSENGINE_ENDPOINT
                type:
                  type: string
                  description: Type of ruleset.
                startDate , endDate:
                  type: string
                  description: Format in Epoch time (ex. 1726207950)
                active:
                  type: boolean
                  description: Status of the promotion. Set to true when creating
                    a promotion for the first time
                rules:
                  type: array
                  description: The rules defined for the promotion
                  items:
                    type: string
                -id:
                  type: integer
                  description: The unique identifier for the rule.
                  format: int32
                -exp:
                  type: boolean
                  description: Enable rule expression. Rule expressions are conditions
                    that determine whether a statement is true or false. Refer to
                    rule writing for more information.
                -expJSON:
                  type: string
                  description: The rule expression in JSON format.
                -isActive:
                  type: boolean
                  description: Indicates whether the rule is active. Set to true when
                    creating a promotion for the first time
                -priority:
                  type: integer
                  description: The priority of the rule.
                  format: int32
                -startDate:
                  type: integer
                  description: The start date of the rule. ISO 8601 Date Format
                  format: int32
                -endDate:
                  type: integer
                  description: The end date of the rule. ISO 8601 Date Format
                  format: int32
                -createdOn:
                  type: integer
                  description: The timestamp when the rule was created. ISO 8601 Date
                    Format
                  format: int32
                caseToActions:
                  type: object
                  description: The actions to be taken based on the rule. Refer to
                    actions for more information
                  properties: {}
                --name:
                  type: string
                  description: Name of the action
                --mandatoryPropertiesValues:
                  type: string
                  description: 'As a set of key pair values  eg:   "key": "ProRateOnSourceValue",
                    "value": "EVENT_DEFAULT_VALUE"'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"code\": 200,\n        \"\
                    message\": \"success\"\n    },\n    \"validationErrors\": null,\n\
                    \    \"data\": [\n        {\n            \"id\": 74116,\n    \
                    \        \"name\": \"promotion_nov27th\",\n            \"promotionStatus\"\
                    : \"UPCOMING\",\n            \"programId\": 699,\n           \
                    \ \"startDate\": \"2024-11-27T00:00:00.856Z\",\n            \"\
                    endDate\": \"2024-12-27T23:59:59.856Z\",\n            \"identifier\"\
                    : \"promotion_nov27th\",\n            \"isActive\": true,\n  \
                    \          \"promotionSourceType\": \"PROMOTION_API\",\n     \
                    \       \"eventName\": \"TRANSACTIONADD\",\n            \"allocatePointsOn\"\
                    : \"BILL\",\n            \"allocationActions\": [\n          \
                    \      {\n                    \"A1\": {\n                    \
                    \    \"allocation\": {\n                            \"type\":\
                    \ \"FIXED\",\n                            \"value\": 1.25\n  \
                    \                      },\n                        \"expiry\"\
                    : {\n                            \"type\": \"DAYS\",\n       \
                    \                     \"value\": \"2\"\n                     \
                    \   },\n                        \"rounding\": \"ROUND\"\n    \
                    \                }\n                }\n            ],\n      \
                    \      \"limits\": {\n                \"pointsPerCustomer\": -1,\n\
                    \                \"numberOfTimesPerCustomer\": -1,\n         \
                    \       \"totalPointsInPromotion\": -1,\n                \"totalPointsPerEventLimit\"\
                    : -1\n            },\n            \"pointsOfferType\": \"LOYALTY\"\
                    ,\n            \"promotionRestrictions\": {\n                \"\
                    restrictions\": {\n                    \"redemptionRestrictions\"\
                    : [\n                        {\n                            \"\
                    name\": \"MAX_ALLOWED_TIMES_PER_CUSTOMER\",\n                \
                    \            \"value\": 3,\n                            \"type\"\
                    : \"PERIOD_BASED\",\n                            \"periodType\"\
                    : \"MOVING_WINDOW\",\n                            \"periodUnit\"\
                    : \"WEEKLY\"\n                        },\n                   \
                    \     {\n                            \"name\": \"MAX_ALLOWED_TIMES_PER_PROMOTION\"\
                    ,\n                            \"value\": 3,\n               \
                    \             \"type\": \"NON_PERIOD_BASED\",\n              \
                    \              \"periodType\": null,\n                       \
                    \     \"periodUnit\": null\n                        },\n     \
                    \                   {\n                            \"name\": \"\
                    MAX_REDEMPTIONS_PER_EARN_PER_CUSTOMER\",\n                   \
                    \         \"value\": 100,\n                            \"type\"\
                    : \"NON_PERIOD_BASED\",\n                            \"periodType\"\
                    : null,\n                            \"periodUnit\": null\n  \
                    \                      }\n                    ],\n           \
                    \         \"issualRestrictions\": [\n                        {\n\
                    \                            \"name\": \"MAX_NUMBER_OF_ISSUALS_PER_CUSTOMER\"\
                    ,\n                            \"value\": 3\n                \
                    \        }\n                    ],\n                    \"earnRestrictions\"\
                    : [\n                        {\n                            \"\
                    name\": \"MAX_NUMBER_OF_EARNS_PER_CUSTOMER\",\n              \
                    \              \"value\": 3\n                        }\n     \
                    \               ],\n                    \"expiryRestrictions\"\
                    : [\n                        {\n                            \"\
                    name\": \"ISSUAL_PROMOTION_EXPIRY_BASED_ON\",\n              \
                    \              \"value\": 10,\n                            \"\
                    type\": \"PROMOTION\"\n                        }\n           \
                    \         ]\n                },\n                \"scope\": null,\n\
                    \                \"isStackable\": true,\n                \"isConsideredForRanking\"\
                    : true,\n                \"loyaltyEarningType\": \"ISSUE_AND_EARN\"\
                    ,\n                \"expiryReminder\": null,\n               \
                    \ \"isExclusive\": false,\n                \"isAlwaysApply\":\
                    \ false,\n                \"targetGroupIds\": null,\n        \
                    \        \"targetRuleIds\": null,\n                \"linkedTargetGroupVsTargetRuleIdMap\"\
                    : null\n            }\n        }\n    ]\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 200
                        default: 0
                      message:
                        type: string
                        example: success
                  validationErrors: {}
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 74116
                          default: 0
                        name:
                          type: string
                          example: promotion_nov27th
                        promotionStatus:
                          type: string
                          example: UPCOMING
                        programId:
                          type: integer
                          example: 699
                          default: 0
                        startDate:
                          type: string
                          example: '2024-11-27T00:00:00.856Z'
                        endDate:
                          type: string
                          example: '2024-12-27T23:59:59.856Z'
                        identifier:
                          type: string
                          example: promotion_nov27th
                        isActive:
                          type: boolean
                          example: true
                          default: true
                        promotionSourceType:
                          type: string
                          example: PROMOTION_API
                        eventName:
                          type: string
                          example: TRANSACTIONADD
                        allocatePointsOn:
                          type: string
                          example: BILL
                        allocationActions:
                          type: array
                          items:
                            type: object
                            properties:
                              A1:
                                type: object
                                properties:
                                  allocation:
                                    type: object
                                    properties:
                                      type:
                                        type: string
                                        example: FIXED
                                      value:
                                        type: number
                                        example: 1.25
                                        default: 0
                                  expiry:
                                    type: object
                                    properties:
                                      type:
                                        type: string
                                        example: DAYS
                                      value:
                                        type: string
                                        example: '2'
                                  rounding:
                                    type: string
                                    example: ROUND
                        limits:
                          type: object
                          properties:
                            pointsPerCustomer:
                              type: integer
                              example: -1
                              default: 0
                            numberOfTimesPerCustomer:
                              type: integer
                              example: -1
                              default: 0
                            totalPointsInPromotion:
                              type: integer
                              example: -1
                              default: 0
                            totalPointsPerEventLimit:
                              type: integer
                              example: -1
                              default: 0
                        pointsOfferType:
                          type: string
                          example: LOYALTY
                        promotionRestrictions:
                          type: object
                          properties:
                            restrictions:
                              type: object
                              properties:
                                redemptionRestrictions:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        example: MAX_ALLOWED_TIMES_PER_CUSTOMER
                                      value:
                                        type: integer
                                        example: 3
                                        default: 0
                                      type:
                                        type: string
                                        example: PERIOD_BASED
                                      periodType:
                                        type: string
                                        example: MOVING_WINDOW
                                      periodUnit:
                                        type: string
                                        example: WEEKLY
                                issualRestrictions:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        example: MAX_NUMBER_OF_ISSUALS_PER_CUSTOMER
                                      value:
                                        type: integer
                                        example: 3
                                        default: 0
                                earnRestrictions:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        example: MAX_NUMBER_OF_EARNS_PER_CUSTOMER
                                      value:
                                        type: integer
                                        example: 3
                                        default: 0
                                expiryRestrictions:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        example: ISSUAL_PROMOTION_EXPIRY_BASED_ON
                                      value:
                                        type: integer
                                        example: 10
                                        default: 0
                                      type:
                                        type: string
                                        example: PROMOTION
                            scope: {}
                            isStackable:
                              type: boolean
                              example: true
                              default: true
                            isConsideredForRanking:
                              type: boolean
                              example: true
                              default: true
                            loyaltyEarningType:
                              type: string
                              example: ISSUE_AND_EARN
                            expiryReminder: {}
                            isExclusive:
                              type: boolean
                              example: false
                              default: true
                            isAlwaysApply:
                              type: boolean
                              example: false
                              default: true
                            targetGroupIds: {}
                            targetRuleIds: {}
                            linkedTargetGroupVsTargetRuleIdMap: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location 'https://eu.api.capillarytech.com/api_gateway/loyalty/v1/programs/699/promotions/add/simple'\
            \ \\\n--header 'Accept: application/json' \\\n--header 'Content-Type:\
            \ application/json' \\\n--header 'Authorization: Basic bmFtYW46Y2FiYvbraf2U5OGM4MWFlNDM5ZTQ1Yjk3ZTM5YTY0NTY0MTY='\
            \ \\\n--header 'Cookie: _cfuvid=4eFmg.rN4cmzr9LZsrD0ys2FUFL4EdH9c200UfliHiM-1732856907850-0.0.1.1-604800000'\
            \ \\\n--data '{\n    \"id\": -1,\n    \"name\": \"promotion_nov27th\"\
            ,\n    \"programId\": 699,\n    \"startDate\": \"2024-11-27T12:00:00+01:00\"\
            ,\n    \"endDate\": \"2024-12-27T12:00:00+01:00\",\n    \"allocatePointsOn\"\
