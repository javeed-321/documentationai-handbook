            : [\n                {\n                    \"name\": \"MAX_ALLOWED_TIMES_PER_CUSTOMER\"\
            ,\n                    \"value\": 3,\n                    \"type\": \"\
            PERIOD_BASED\",\n                    \"periodType\": \"MOVING_WINDOW\"\
            ,\n                    \"periodUnit\": \"WEEKLY\"\n                },\n\
            \                {\n                    \"name\": \"MAX_ALLOWED_TIMES_PER_PROMOTION\"\
            ,\n                    \"value\": 3,\n                    \"type\": \"\
            NON_PERIOD_BASED\"\n                }\n            ],\n            \"\
            issualRestrictions\": [\n                {\n                    \"name\"\
            : \"MAX_NUMBER_OF_ISSUALS_PER_CUSTOMER\",\n                    \"value\"\
            : 3,\n                    \"type\": \"NON_PERIOD_BASED\"\n           \
            \     }\n            ],\n            \"earnRestrictions\": [\n       \
            \         {\n                    \"name\": \"MAX_NUMBER_OF_EARNS_PER_CUSTOMER\"\
            ,\n                    \"value\": 3\n                }\n            ],\n\
            \            \"expiryRestrictions\": [\n                {\n          \
