openapi: 3.1.0
info:
  title: Get Customer’s Earned and Expired Points by Year
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /das/getExpiredPointsByCustomerIdAndYear:
    get:
      summary: Get Customer’s Earned and Expired Points by Year
      description: ''
      operationId: get-expired-points-for-a-customer
      parameters:
      - name: points_category_id
        in: query
        description: Identifier of the category under which the points were awarded.
        required: true
        schema:
          type: integer
          format: int32
      - name: program_id
        in: query
        description: Unique identifier of the loyalty program.
        required: true
        schema:
          type: integer
          format: int32
      - name: entity_id
        in: query
        description: Unique customer ID of the customer whose details are retrieved.
        required: true
        schema:
          type: integer
          format: int64
      - name: page
        in: query
        description: 'Retrieve details of a specific page. Page count starts from
          1. Example: page=2 retrieves data on page 2.'
        schema:
          type: integer
          format: int32
      - name: count
        in: query
        description: Number of results to display per page. The default value is 10.
          The maximum supported value is 100.
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample Response:
                  value: "[\n    {\n        \"customerId\": 387910941,\n        \"\
                    year\": 2025,\n        \"earned\": 160,\n        \"expired\":\
                    \ 0\n    }\n]"
              schema:
                type: array
                items:
                  type: object
                  properties:
                    customerId:
                      type: integer
                      example: 387910941
                      default: 0
                    year:
                      type: integer
                      example: 2025
                      default: 0
                    earned:
                      type: integer
                      example: 160
                      default: 0
                    expired:
                      type: integer
                      example: 0
                      default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
