openapi: 3.1.0
info:
  title: Create search criteria
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/cortex/v1/criteria:
    post:
      summary: Create search criteria
      description: This API allows you to create a search criteria.
      operationId: create-meta-search
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Search criteria created:
                  value: '{"data":{"id":"67c091299e22382d75d405bc","orgId":100737,"name":"TransactionSearch3","searchStrategyType":"COMBINATION","entityType":"TRANSACTION","fieldDefinitions":[{"fieldId":"billNumber","fieldAlias":"billNumber","fieldType":"INDEXED","dataSourceDetails":{"fieldReference":"billNumber"},"dataType":"STRING"}],"dataFieldDefinitions":[{"fieldId":"billNumber","fieldAlias":"billNumber","fieldType":"DATA","dataSourceDetails":{"fieldReference":"billNumber"},"dataType":"STRING"},{"fieldId":"billDate","fieldAlias":"billDate","fieldType":"DATA","dataSourceDetails":{"fieldReference":"billDate"},"dataType":"DATE"}],"searchDataPolicy":{"dataRetentionPolicy":{"unit":"DAYS","value":10},"expireDataFrom":"CREATE"},"criteriaStatus":{"status":"VERIFICATION_IN_PROGRESS"},"bulkJobStatus":"OPEN","auditInfo":{"createdOn":"2025-02-27T16:22:01.911+00:00","createdBy":75155282,"lastUpdatedOn":"2025-02-27T16:22:01.911+00:00","lastUpdatedBy":75155282}},"errors":[]}'
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 67c091299e22382d75d405bc
                      orgId:
                        type: integer
                        example: 100737
                        default: 0
                      name:
                        type: string
                        example: TransactionSearch3
                      searchStrategyType:
                        type: string
                        example: COMBINATION
                      entityType:
                        type: string
                        example: TRANSACTION
                      fieldDefinitions:
                        type: array
                        items:
                          type: object
                          properties:
                            fieldId:
                              type: string
                              example: billNumber
                            fieldAlias:
                              type: string
                              example: billNumber
                            fieldType:
                              type: string
                              example: INDEXED
                            dataSourceDetails:
                              type: object
                              properties:
                                fieldReference:
                                  type: string
                                  example: billNumber
                            dataType:
                              type: string
                              example: STRING
                      dataFieldDefinitions:
                        type: array
                        items:
                          type: object
                          properties:
                            fieldId:
                              type: string
                              example: billNumber
                            fieldAlias:
                              type: string
                              example: billNumber
                            fieldType:
                              type: string
                              example: DATA
                            dataSourceDetails:
                              type: object
                              properties:
                                fieldReference:
                                  type: string
                                  example: billNumber
                            dataType:
                              type: string
                              example: STRING
                      searchDataPolicy:
                        type: object
                        properties:
                          dataRetentionPolicy:
                            type: object
                            properties:
                              unit:
                                type: string
                                example: DAYS
                              value:
                                type: integer
                                example: 10
                                default: 0
                          expireDataFrom:
                            type: string
                            example: CREATE
                      criteriaStatus:
                        type: object
                        properties:
                          status:
                            type: string
                            example: VERIFICATION_IN_PROGRESS
                      bulkJobStatus:
                        type: string
                        example: OPEN
                      auditInfo:
                        type: object
                        properties:
                          createdOn:
                            type: string
                            example: '2025-02-27T16:22:01.911+00:00'
                          createdBy:
                            type: integer
                            example: 75155282
                            default: 0
                          lastUpdatedOn:
                            type: string
                            example: '2025-02-27T16:22:01.911+00:00'
                          lastUpdatedBy:
                            type: integer
                            example: 75155282
                            default: 0
                  errors:
                    type: array
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --location 'https://eu.api.capillarytech.com/api_gateway/cortex/v1/criteria'\
