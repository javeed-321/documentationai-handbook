openapi: 3.1.0
info:
  title: Create a Vendor
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/vendor/create:
    post:
      summary: Create a Vendor
      description: ''
      operationId: createvendor
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - brandId
              - type
              properties:
                name:
                  type: string
                  description: Unique name identifier for the video.
                code:
                  type: string
                  description: Unique identification code for the vendor. In case
                    the code is null or not provided, a random, unique code is assigned
                    to the vendor. Maximum character limit is 255.
                brandId:
                  type: integer
                  description: Unique brand ID of the organisation.
                  format: int32
                type:
                  type: string
                  description: Type of vendor.
                  default: REWARDS
                  enum:
                  - REWARDS
                images:
                  type: array
                  description: Object containing details of images associated with
                    the vendor. You can add up to 5 images for a vendor.
                altText:
                  type: string
                  description: Brief text description of the video.
                id:
                  type: string
                  description: Unique ID that is generated when a video is created.
                    This ID is the file_handle for the associated video in the Capillary
                    system. If isExternal is false, then this parameter is required.
                    To add a video, raise a ticket to the support team.
                url:
                  type: string
                  description: Direct link to the video. If isExternal is true, then
                    this parameter is required.
                isExternal:
                  type: boolean
                  description: Indicate if the video is from an external source.
                videos:
                  type: array
                  description: Object containing details of videos associated with
                    the vendor. You can add up to 2 videos for a vendor.
                rank:
                  type: integer
                  description: Assign a rank to the vendor. This can be used for ordering
                    and prioritizing.
                  format: int32
                description:
                  type: string
                  description: Description for the vendor. Maximum character limit
                    is 1034.
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Invalid brandId:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 3004,\n        \"message\": \"Brand not found\"\
                    \n    }\n}"
                Vendor already exists:
                  value: "{\n    \"status\": {\n        \"success\": false,\n    \
                    \    \"code\": 5007,\n        \"message\": \"Vendor already exists\"\
                    \n    },\n    \"vendor\": null\n}"
                'Sample response ':
                  value:
                    status:
                      success: true
                      code: 5002
                      message: Vendor created successfully
                    vendor:
                      id: 674
                      name: UAT Vendor 21
                      brandId: 61
                      enabled: true
                      isEncryptionRequired: false
                      vendorTypes: null
                      vendorDetails:
                        value: '********************************************************************************'
                        key: '************************************************'
                      type: REWARDS
                      createdBy: 75197372
                      lastUpdatedBy: 75197372
                      createdOn: 1764149511000
                      lastUpdatedOn: 1764149511000
                      createdOnDateTime: '2025-11-26T09:31:51Z'
                      lastUpdatedOnDateTime: '2025-11-26T09:31:51Z'
                      rank: 6
                      code: uatVendor21
                      description: 6 Vendor for UAT
                      images:
                      - name: imageName001
                        altText: null
                        id: null
                        url: https://picsum.photos/seed/picsum/200/300
                        isExternal: true
                      videos:
                      - name: videoName001
                        altText: null
                        id: null
                        url: https://www.pexels.com/download/video/5538262/
                        isExternal: true
                      encryptionRequired: false
                  summary: 'Sample response '
              schema:
                oneOf:
                - title: Vendor Created
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: true
                          default: true
                        code:
                          type: integer
                          example: 5002
                          default: 0
                        message:
                          type: string
                          example: Vendor created successfully
                    vendor:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 153
                          default: 0
                        name:
                          type: string
                          example: vendor002
                        brandId:
                          type: integer
                          example: 61
                          default: 0
                        enabled:
                          type: boolean
                          example: true
                          default: true
                        isEncryptionRequired:
                          type: boolean
                          example: false
                          default: true
                        vendorTypes: {}
                        vendorDetails:
                          type: object
                          properties:
                            value:
                              type: string
                              example: '********************************************************************************'
                            key:
                              type: string
                              example: '************************************************'
                        type:
                          type: string
                          example: REWARDS
                        createdBy:
                          type: integer
                          example: 75161973
                          default: 0
                        lastUpdatedBy:
                          type: integer
                          example: 75161973
                          default: 0
                        createdOn:
                          type: integer
                          example: 1749708111000
                          default: 0
                        lastUpdatedOn:
                          type: integer
                          example: 1749708111000
                          default: 0
                        createdOnDateTime:
                          type: string
                          example: '2025-06-12T06:01:51Z'
                        lastUpdatedOnDateTime:
                          type: string
                          example: '2025-06-12T06:01:51Z'
                        rank: {}
                        code:
                          type: string
                          example: vendor002
                        description: {}
                        images:
                          type: array
                        videos:
                          type: array
                        encryptionRequired:
                          type: boolean
                          example: false
                          default: true
                - title: Invalid brandId
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 3004
                          default: 0
                        message:
                          type: string
                          example: Brand not found
                - title: Vendor already exists
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 5007
                          default: 0
                        message:
                          type: string
                          example: Vendor already exists
                    vendor: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Wrong type value:
                  value: "{\n  \"status\": {\n    \"success\": false,\n    \"code\"\
                    : 400,\n    \"message\": \"Cannot deserialize value of type com.capillary.solutions.rewards.domain.Type\
                    \ from String \\\"REWARD\\\": value not one of declared Enum instance\
                    \ names: [POINTS, REWARDS]\"\n  }\n}"
                Rank value is 0:
                  value: "{\n  \"status\": {\n    \"success\": false,\n    \"code\"\
                    : 400,\n    \"message\": \"rank must be greater than zero\"\n\
                    \  }\n}"
              schema:
                oneOf:
                - title: Wrong type value
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 400
                          default: 0
                        message:
                          type: string
                          example: 'Cannot deserialize value of type com.capillary.solutions.rewards.domain.Type
                            from String "REWARD": value not one of declared Enum instance
                            names: [POINTS, REWARDS]'
                - title: Rank value is 0
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        success:
                          type: boolean
                          example: false
                          default: true
                        code:
                          type: integer
                          example: 400
                          default: 0
                        message:
                          type: string
                          example: rank must be greater than zero
      deprecated: false
