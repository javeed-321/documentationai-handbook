            ,\n             \"isExternal\": true\n         }\n     ],\n     \"videos\"\
            : [\n         {\n             \"name\": \"videoName001\",\n          \
            \   \"altText\": null,\n             \"url\": \"https://www.pexels.com/download/video/5538262/\"\
            ,\n             \"isExternal\": true\n         }\n     ],\n     \"rank\"\
