openapi: 3.1.0
info:
  title: Get all reward transactions for a user in connected orgs
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1.1/reward-transactions:
    get:
      summary: Get all reward transactions for a user in connected orgs
      description: This API is used to retrieve reward transactions for a user using
        filters.
      operationId: get-all-reward-transactions-for-a-user-in-connected-orgs
      parameters:
      - name: customerId
        in: query
        description: Unique identifier of the customer.
        required: true
        schema:
          type: string
      - name: page
        in: query
        description: 'Retrieve information for a specific page. Set the page value
          to 0 to disable pagination. Example: page=2&size=10 retrieves 10 results
          from page 2.'
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        description: Number of results to display per page. Default value is 10. Maximum
          supported value is 50.
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        description: Filter the reward transactions based on status of the issued
          reward.   Set `status`=`true` to view successful transactions and `status`=`false`
          to view failed transactions.   Successful transactions are the ones where
          the reward was issued whereas failed transactions are ones where the reward
          was not issued.   If this parameter is not applied, the response by default
          gives both successful and failed transactions.
        schema:
          type: boolean
      - name: redemptionType
        in: query
        description: 'Retrieves rewards based on their redemption type. Reward redemption
          is when a customer uses their points/ cash to redeem a reward. Supported
          values: GAMES, AUCTION, CART_PROMOTION, CASH_WALLET, VENDOR_ONLY_REWARD,
          VOUCHER, CASH_BACK, INTOUCH_REWARD, PHYSICAL_REWARD, CHARITY, MILES, GIFT_CARD,
          SWEEPSTAKES, VENDOR_INTOUCH_REWARD, CARD_DISC. Use comma separated values
          to retrieve reward details for multiple redemption types. Example: INTOUCH_REWARD,
          MILES The values are case sensitive. This parameter fetches both, failed
          and successful reward issue transactions. To filter successful transactions
          for a specific redemption type, set status=true.'
        schema:
          type: string
          enum:
          - ''
      - name: ownerType
        in: query
        description: 'Module for which the reward was created. Supported values: Loyalty
          program, Milestones, Campaigns, Journeys, Goodwill.'
        schema:
          type: string
          enum:
          - ''
      - name: ownerId
        in: query
        description: Unique identifier of the owner.
        schema:
          type: string
      - name: groupName
        in: query
        description: Retrieves rewards associated with a specific group name.
        schema:
          type: string
      - name: DATA-SCOPE-ORG
        in: header
        description: List of Organization IDs
        schema:
          type: string
      - name: DATA-SCOPE
        in: header
        description: 'Scopes define what data can be accessed using the API. You can
          use scopes to control access to data from a parent or child organization.
          Defining a scope ensures that the response contains only data from the respective
          organization.  Supported headers: `SELF`, `OTHER` and `ALL`.'
        schema:
          type: string
      responses:
        '200':
          description: '200'
