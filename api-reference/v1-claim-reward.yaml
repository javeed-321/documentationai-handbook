openapi: 3.1.0
info:
  title: Claim Reward
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/rewards/core/v1/reward/claim:
    post:
      summary: Claim Reward
      description: ''
      operationId: claim-reward
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - brandID
              - ownerType
              properties:
                brandID:
                  type: string
                  description: Unique identifier of the brand.
                rewardId:
                  type: string
                  description: Unique identifer of the reward.
                ownerType:
                  type: string
                  description: Module for which the reward was created for.
                  enum:
                  - Loyalty program
                  - Milestones
                  - Campaigns
                  - Journeys
                  - Goodwill
                ownerId:
                  type: string
                  description: Unique identifer of the owner to claim the reward.
            examples:
              Sample body:
                value:
                  brandId: 29
                  rewardId: 28359
                  ownerType: CAMPAIGNS
                  ownerId: '12345678'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 6013,\n        \"message\": \"Reward claimed successfully\"\
                    \n    },\n    \"reward\": {\n        \"id\": 28359\n    }\n}"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                        default: true
                      code:
                        type: integer
                        example: 6013
                        default: 0
                      message:
                        type: string
                        example: Reward claimed successfully
                  reward:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 28359
                        default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
