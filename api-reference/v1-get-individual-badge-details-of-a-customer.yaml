openapi: 3.1.0
info:
  title: Get individual badge details of a customer
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /api_gateway/v1/badges/management/{customerId}/badge/{badgeId}:
    get:
      summary: Get individual badge details of a customer
      description: ''
      operationId: get-individual-badge-details-of-a-customer
      parameters:
      - name: customerId
        in: path
        description: Unique customer identifier
        schema:
          type: string
        required: true
      - name: badgeId
        in: path
        description: Unique ID of the badge
        schema:
          type: string
        required: true
      - name: includeStatistics
        in: query
        description: Set true to retrieve customer and badge constraints, and earn
          and issue badge details.
        schema:
          type: boolean
      responses:
