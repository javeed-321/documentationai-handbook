openapi: 3.1.0
info:
  title: Get purchased rewards for user (Old API)
  version: '1.0'
servers:
- url: "https://{host}"
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  "/api_gateway/rewards/core/v1/user/vouchers/brand/{brandName}":
    get:
      summary: Get purchased rewards for user (Old API)
      description: ''
      operationId: get-user-reward
      parameters:
      - name: mobile/email/externalId
        in: query
        description: Mobile number/ email Id/ External Id of the customer
        schema:
          type: string
      - name: username
        in: query
        description: username here represents name of the store
        required: true
        schema:
          type: string
      - name: brandName
        in: path
        description: Name of the brand name.
        schema:
          type: string
        required: true
      - name: sortBy
        in: query
        schema:
          type: string
          enum:
          - REWARD_ID
          - INTOUCH_VOUCHER
          - INTOUCH_VOUCHER_EXPIRY
          - PURCHASE_DATE
      - name: orderBy
        in: query
        schema:
          type: string
          enum:
          - ASC
          - DESC
          default: ASC
      - name: status
        in: query
        description: The status of the reward
        schema:
          type: string
      - name: intouch
        in: query
        description: Allows you to fetch rewards from InTouch if enabled
        schema:
          type: string
          default: 'true'
      - name: mobile
        in: query
        schema:
          type: string
        required: false
      - name: store
        in: query
        schema:
          type: string
        required: false
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                with payment config info:
                  value: "{\n    \"status\": {\n        \"success\": true,\n     \
                    \   \"code\": 200,\n        \"message\": \"User Reward fetched\
                    \ successfully\"\n    },\n    \"reward\": {\n        \"id\": 121879,\n\
                    \        \"name\": \"Flat 100 off on protein powder\",\n     \
                    \   \"description\": \"Burn 100 points and get a Flat 100 off\
                    \ on protein powder coupon\",\n        \"imageId\": \"0f1aee40-3e4d-474d-8070-546eb2ac777e\"\
                    ,\n        \"imageUrl\": \"https://eucrm-solutions.s3.amazonaws.com/rewards/5bea603b-6ff2-4e00-88fb-8610012b.jpg\"\
                    ,\n        \"thumbnailId\": \"2f6fc242-58c1-4a41-9e2f-66bc9acac52e\"\
                    ,\n        \"thumbnailUrl\": \"https://eucrm-solutions.s3.amazonaws.com/rewards/ae890c7e-9c8f-47d9-b5e2-1c62265e.jpg\"\
                    ,\n        \"termAndConditionsId\": \"9303b31a-6042-475e-bb46-3129bc22baa1\"\
                    ,\n        \"termAndConditionsUrl\": \"https://eucrm-solutions.s3.amazonaws.com/rewards/b7bb1e12-8b1e-4089-888d-3f13723.html\"\
                    ,\n        \"tier\": \"4\",\n        \"label\": \"4\",\n     \
                    \   \"priority\": 1,\n        \"intouchPoints\": 100,\n      \
                    \  \"group\": \"Protein\",\n        \"startTime\": \"2024-01-24\
                    \ 08:28:16\",\n        \"endTime\": \"2028-07-31 02:58:16\",\n\
                    \        \"expired\": false,\n        \"started\": true,\n   \
                    \     \"programId\": null,\n        \"categoryList\": [\n    \
                    \        {\n                \"id\": 2,\n                \"name\"\
                    : \"accessories\",\n                \"enabled\": true\n      \
                    \      }\n        ],\n        \"customFields\": {\n          \
                    \  \"CF2\": \"value\"\n        },\n        \"loyaltyProgramCriteria\"\
                    : [],\n        \"restrictions\": {\n            \"isValid\": true\n\
                    \        },\n        \"appliedPromotions\": [],\n        \"groupName\"\
                    : TOP,\n        \"groupRank\": 1,\n        \"rewardRank\": 5,\n\
                    \        \"images\": [],\n        \"videos\": []\n    }\n}"
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n   \"status\": {\n       \"success\": false,\n      \
                    \ \"code\": 1014,\n       \"message\": \"Cannot find customer\
                    \ for provided mobile/external-id/e-mail/id\"\n   },\n   \"userVouchers\"\
                    : null,\n   \"pagingDto\": null\n}\n\n"
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: false
                        default: true
                      code:
                        type: integer
                        example: 1014
                        default: 0
                      message:
                        type: string
                        example: Cannot find customer for provided mobile/external-id/e-mail/id
                  userVouchers: {}
                  pagingDto: {}
      deprecated: false
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
