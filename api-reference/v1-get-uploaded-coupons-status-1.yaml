openapi: 3.1.0
info:
  title: Get Uploaded Coupons' Status
  version: '1.0'
servers:
- url: https://{host}
  variables:
    host:
      default: host
security:
- sec0: []
paths:
  /coupon/api/v1/upload/getUploadStatus/{couponSeriesId}:
    get:
      summary: Get Uploaded Coupons' Status
      description: Retrieves the status of a coupon upload job.
      operationId: get-uploaded-coupons-status-1
      parameters:
      - name: couponSeriesId
        in: path
        description: The unique ID of the coupon series to get the status.
        schema:
          type: integer
          format: int64
        required: true
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Sample Response:
                  value: "{\n   \"success\":true,\n   \"status\":200,\n   \"result\"\
                    :{\n      \"orgId\":2345,\n      \"couponSeriesId\":253543,\n\
                    \      \"uploadJobStatuses\":[\n         {\n            \"jobId\"\
                    :93477,\n            \"uploadStatus\":\"FINISHED\",\n        \
                    \    \"createdOn\":\"1603101625000\",\n            \"updatedOn\"\
                    :\"1603101632000\",\n            \"errorFileUrl\":\"error_1619_2532342020_10_19_15_30_32\"\
                    ,\n            \"successFileUrl\":null,\n            \"uploadedFileUrl\"\
                    :\"couponCode_1603101623721_253234.csv\",\n            \"totalUploadedCount\"\
                    :3,\n            \"actualRowCount\":3,\n            \"errorCount\"\
                    :3,\n            \"uploadTableName\":\"temp_1619_20201019_153531582\"\
                    ,\n            \"uploadedFileName\":\"couponCode.csv\",\n    \
                    \        \"audienceGroupId\":0,\n            \"audienceGroupVersionId\"\
                    :0\n         }\n      ]\n   }\n}"
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                    default: true
                  status:
                    type: integer
                    example: 200
                    default: 0
                  result:
                    type: object
                    properties:
                      orgId:
                        type: integer
                        example: 2345
                        default: 0
                      couponSeriesId:
                        type: integer
                        example: 253543
                        default: 0
                      uploadJobStatuses:
                        type: array
                        items:
                          type: object
                          properties:
                            jobId:
                              type: integer
                              example: 93477
                              default: 0
                            uploadStatus:
                              type: string
                              example: FINISHED
                            createdOn:
                              type: string
                              example: '1603101625000'
                            updatedOn:
                              type: string
                              example: '1603101632000'
                            errorFileUrl:
                              type: string
                              example: error_1619_2532342020_10_19_15_30_32
                            successFileUrl: {}
                            uploadedFileUrl:
                              type: string
                              example: couponCode_1603101623721_253234.csv
                            totalUploadedCount:
                              type: integer
                              example: 3
                              default: 0
                            actualRowCount:
                              type: integer
                              example: 3
                              default: 0
                            errorCount:
                              type: integer
                              example: 3
                              default: 0
                            uploadTableName:
                              type: string
                              example: temp_1619_20201019_153531582
                            uploadedFileName:
                              type: string
                              example: couponCode.csv
                            audienceGroupId:
                              type: integer
                              example: 0
                              default: 0
                            audienceGroupVersionId:
                              type: integer
                              example: 0
                              default: 0
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --request GET \\\n     --url https://host/coupon/api/v1/upload/getUploadStatus/couponSeriesId\
            \ \\\n     --header 'Accept: application/json' \\\n     --header 'Content-Type:\
            \ application/json' \\\n     --header 'accept: application/json' \\\n\
            \     --data string"
          name: Sample Request
        samples-languages:
        - curl
components:
  securitySchemes:
    sec0:
      type: http
      scheme: basic
