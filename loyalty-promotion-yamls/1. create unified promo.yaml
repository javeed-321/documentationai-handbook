      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  properties:
                    name:
                      type: string
                      description: >-
                        The display name of the promotion. Required. Maximum 255
                        characters.
                      example: Program Limit - Max 10k Points per Month V2
                    description:
                      type: string
                      description: >-
                        A detailed description of the promotion. Maximum 1000
                        characters.
                      example: >-
                        Defines a program-wide monthly earning cap for Points
                        currency.
                    programId:
                      type: integer
                      description: >-
                        The numeric ID of the loyalty program this promotion
                        belongs to.
                      example: 2607
                    startDate:
                      type: string
                      format: date-time
                      description: >-
                        The date and time when the promotion becomes active.
                        Required. ISO 8601 format with timezone offset (e.g.,
                        2026-01-01T00:00:00Z or 2026-01-01T05:30:00+05:30).
                      example: '2026-01-01T00:00:00Z'
                    endDate:
                      type: string
                      format: date-time
                      description: >-
                        The date and time when the promotion ends. Required. ISO
                        8601 format with timezone offset.
                      example: '2026-12-31T23:59:59Z'
                    promotionType:
                      type: string
                      description: >-
                        The type of promotion. Determines the enrollment and
                        earning model in combination with enrolmentMethod and
                        loyaltyEarningType. GENERIC: Neither opt-in nor
                        enrollment is active. The promotion is triggered
                        automatically by customer transactions. Use with
                        enrolmentMethod: TRANSACTION and loyaltyEarningType:
                        null. LOYALTY: Enrollment is active, opt-in is disabled.
                        Focuses on loyalty membership status rather than a
                        specific earning mechanism. Use with enrolmentMethod:
                        IMPORT and loyaltyEarningType: null. LOYALTY_EARNING
                        with loyaltyEarningType ISSUE_AND_EARN: Both enrollment
                        and opt-in are active. Customers sign up (enroll) and
                        then earn rewards upon qualifying events. Use with
                        enrolmentMethod: IMPORT. LOYALTY_EARNING with
                        loyaltyEarningType DIRECT_EARN: Opt-in is active,
                        enrollment is disabled. Customers earn rewards directly
                        through participation without a formal enrollment step.
                        Use with enrolmentMethod: IMPORT.
                      enum:
                        - GENERIC
                        - LOYALTY
                        - LOYALTY_EARNING
                      example: GENERIC
                    status:
                      type: string
                      description: >-
                        The state of the promotion. Set to DRAFT on creation.
                        The full status lifecycle is: DRAFT → PENDING_APPROVAL →
                        ACTIVE. Other values (PAUSED, STOPPED, COMPLETED,
                        PUBLISH_FAILED) are set by the system or via the review
                        endpoint.
                      enum:
                        - DRAFT
                        - ACTIVE
                        - PAUSED
                        - PENDING_APPROVAL
                        - STOPPED
                        - SNAPSHOT
                        - LIVE
                        - UPCOMING
                        - COMPLETED
                        - PUBLISH_FAILED
                      example: DRAFT
                    timezoneName:
                      type: string
                      description: >-
                        The IANA timezone identifier used to evaluate all
                        promotion dates and cycle boundaries (e.g.,
                        Asia/Kolkata, America/New_York, UTC).
                      example: Asia/Kolkata
                    promoIdentifier:
                      type: string
                      description: >-
                        A unique human-readable identifier for this promotion.
                        Maximum 255 characters.
                      example: PROG_LIMIT_POINTS_MONTHLY_10K_V2
                    loyaltyConfigMetaData:
                      type: object
                      properties:
                        isStackable:
                          type: boolean
                          description: >-
                            When true, this promotion can be earned alongside
                            other promotions in the same transaction. When
                            false, it cannot be combined with others.
                          example: false
                        isExclusive:
                          type: boolean
                          description: >-
                            When true, earning this promotion prevents any other
                            promotion from being earned in the same transaction.
                          example: false
                        isAlwaysApply:
                          type: boolean
                          description: >-
                            When true, the promotion is automatically applied to
                            all qualifying events without requiring explicit
                            enrollment.
                          example: false
                        isConsideredForRanking:
                          type: boolean
                          description: >-
                            When true, this promotion participates in the
                            promotion ranking evaluation that determines
                            priority when multiple promotions compete for the
                            same transaction.
                          example: false
                    loyaltyEarningType:
                      type: string
                      nullable: true
                      description: >-
                        Defines the earning model. DIRECT_EARN: points are
                        awarded immediately on the qualifying event.
                        ISSUE_AND_EARN: points are held pending and earned after
                        a subsequent redemption event. Set to null for default
                        earning behavior.
                      enum:
                        - DIRECT_EARN
                        - ISSUE_AND_EARN
                      example: null
                    promotionMetadata:
                      type: array
                      description: >-
                        A list of custom key-value metadata entries for the
                        promotion. Each entry is an object with key (string),
                        value (string), and isBrandDefined (string) fields.
                        Leave as an empty array if no custom metadata is needed.
                      example: []
                      items:
                        type: string
                customerEnrolment:
                  type: object
                  properties:
                    enrolmentMethod:
                      type: string
                      description: >-
                        Defines how customers are enrolled in the promotion.
                        TRANSACTION: auto-enrolled upon completing a qualifying
                        transaction. IMPORT: enrolled via bulk data import.
                        AUDIENCE_FILTER: enrolled by matching a defined audience
                        segment.
                      enum:
                        - TRANSACTION
                        - IMPORT
                        - AUDIENCE_FILTER
                      example: TRANSACTION
                activities:
                  type: array
                  example:
                    - id: placeholder_activity_for_limit_promo
                      type: SINGLE
                      name: Placeholder Activity
                      event: TransactionAdd
                      expJSON: |-
                        {
                          "arity": "literal",
                          "type": "boolean:primitive",
                          "value": "true"
                        }
                      commonCycleActionMapping:
                        - cycle: PlaceholderCycle
                          actions:
                            - id: placeholder_action
                              actionName: NO_OP_ACTION
                              actionClass: >-
                                com.capillary.loyalty.engine.impl.action.NoOpAction
                              description: Placeholder Action - Does Nothing
                              mandatoryPropertiesValues: {}
                  items:
                    type: object
                    example:
                      id: placeholder_activity_for_limit_promo
                      type: SINGLE
                      name: Placeholder Activity
                      event: TransactionAdd
                      expJSON: |-
                        {
                          "arity": "literal",
                          "type": "boolean:primitive",
                          "value": "true"
                        }
                      commonCycleActionMapping:
                        - cycle: PlaceholderCycle
                          actions:
                            - id: placeholder_action
                              actionName: NO_OP_ACTION
                              actionClass: >-
                                com.capillary.loyalty.engine.impl.action.NoOpAction
                              description: Placeholder Action - Does Nothing
                              mandatoryPropertiesValues: {}
                    properties:
                      id:
                        type: string
                        description: >-
                          A unique identifier for this activity. Caller-supplied
                          string (e.g., activity_1234567890 or group_main_goal).
                        example: placeholder_activity_for_limit_promo
                      type:
                        type: string
                        description: >-
                          The activity type. SINGLE: a standalone activity that
                          tracks one event with optional milestones. GROUP: a
                          container that groups multiple child activities using
                          AND/OR logic defined by combinationType.
                        enum:
                          - SINGLE
                          - GROUP
                        example: SINGLE
                      name:
                        type: string
                        description: >-
                          The display name for this activity. Maximum 100
                          characters.
                        example: Placeholder Activity
                      event:
                        type: string
                        description: >-
                          The loyalty event that triggers this activity. Known
                          values: TransactionAdd, VoucherRedemption,
                          FriendReferred, TargetCompleted.
                        example: TransactionAdd
                      expJSON:
                        type: string
                        description: >-
                          A JSON expression tree defining the eligibility
                          condition for this activity. Each node contains arity
                          (literal, binary_operation, object_dereference, name),
                          type, value, and operands fields. Use
                          {"arity":"literal","type":"boolean:primitive","value":"true"}
                          to match all events with no additional filter.
                        example: |-
                          {
                            "arity": "literal",
                            "type": "boolean:primitive",
                            "value": "true"
                          }
                      milestones:
                        type: array
                        description: >-
                          A list of milestones (targets) for this activity. A
                          SINGLE activity supports at most one milestone. Omit
                          or leave empty when rewards fire directly via
                          commonCycleActionMapping without a target threshold.
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: >-
                                A unique name for the milestone. Recommended
                                convention:
                                {promotionName}~{activityName}~Milestone {id}.
                            trackingType:
                              type: string
                              description: >-
                                How progress is tracked for this milestone.
                                DEFAULT: standard linear tracking. CAPPING:
                                tracks up to a defined cap. UNIFIED: tracks
                                progress across multiple activities together.
                                STREAKS: tracks consecutive cycle completions.
                                NON_CONTINUOUS_STREAKS: tracks non-consecutive
                                streak completions.
                              enum:
                                - DEFAULT
                                - CAPPING
                                - UNIFIED
                                - STREAKS
                                - NON_CONTINUOUS_STREAKS
                            targetType:
                              type: string
                              description: >-
                                The metric being measured. COUNT: number of
                                qualifying events. SALES: net transaction value.
                                GROSS_SALES: gross transaction value. QUANTITY:
                                item quantity. VISIT: number of store visits.
                                REGULAR_POINTS: regular points earned.
                                PROMOTIONAL_POINTS: promotional points earned.
                                ALL_POINTS: all points combined. EXTENDED_FIELD:
                                value from a transaction extended field.
                                EVENT_ATTRIBUTE: value from a custom event
                                attribute.
                              enum:
                                - COUNT
                                - SALES
                                - GROSS_SALES
                                - QUANTITY
                                - VISIT
                                - REGULAR_POINTS
                                - PROMOTIONAL_POINTS
                                - ALL_POINTS
                                - EXTENDED_FIELD
                                - EVENT_ATTRIBUTE
                            targetEntity:
                              type: string
                              description: >-
                                The entity level at which the target is tracked.
                                TRANSACTION: counts at the full transaction
                                level. LINEITEM: counts at the individual line
                                item level. POINTS: tracks point values. EVENT:
                                counts custom events. ALTERNATE_CURRENCIES:
                                tracks alternate loyalty currency values.
                              enum:
                                - TRANSACTION
                                - LINEITEM
                                - POINTS
                                - EVENT
                                - ALTERNATE_CURRENCIES
                            defaultValue:
                              type: string
                              description: >-
                                The target value that must be reached to
                                complete this milestone (e.g., '3' for 3
                                transactions, '1000' for 1000 in sales). Passed
                                as a string even though it represents a number.
                            targetEvaluationType:
                              type: string
                              description: >-
                                The window type used to evaluate this milestone.
                                FIXED_CALENDAR_WINDOW: evaluates within fixed
                                calendar periods (e.g., weekly, monthly) set by
                                frequencyType — the system auto-generates cycles
                                within the promotion date range. CYCLIC_WINDOW:
                                uses recurring cycles of a fixed length.
                                PERIOD_AGNOSTIC_WINDOW: evaluates over the
                                entire promotion duration with no cycle
                                boundaries. CALENDAR_CYCLIC_WINDOW: combines
                                calendar alignment with cyclic repetition.
                              enum:
                                - FIXED_CALENDAR_WINDOW
                                - CYCLIC_WINDOW
                                - PERIOD_AGNOSTIC_WINDOW
                                - CALENDAR_CYCLIC_WINDOW
                            frequencyType:
                              type: string
                              description: >-
                                The cycle frequency when targetEvaluationType is
                                FIXED_CALENDAR_WINDOW. The system automatically
                                divides the promotion period into cycles of this
                                length. DAILY: one cycle per day. WEEKLY: one
                                cycle per week (Mon–Sun). MONTHLY: one cycle per
                                calendar month. QUARTERLY: one cycle per
                                quarter. HALF_YEARLY: one cycle per half-year.
                                YEARLY: one cycle per year. CUSTOM: boundaries
                                defined manually in cycleActionMapping.
                              enum:
                                - DAILY
                                - WEEKLY
                                - MONTHLY
                                - QUARTERLY
                                - HALF_YEARLY
                                - YEARLY
                                - CUSTOM
                            sameActionsForEveryCycle:
                              type: boolean
                              description: >-
                                When true, the reward actions defined in
                                commonCycleActionMapping for Cycle_1 are reused
                                automatically for every cycle — each
                                cycleActionMapping entry's actions array can be
                                left empty. When false, each cycle entry in
                                cycleActionMapping must explicitly define its
                                own actions.
                            differentTargetsForEveryCycle:
                              type: boolean
                              description: >-
                                When true, each cycle entry in
                                cycleActionMapping can specify a different
                                defaultValue (target). When false, the top-level
                                defaultValue applies uniformly to all cycles.
                            leaderboardEnabled:
                              type: boolean
                              description: >-
                                When true, a leaderboard is enabled for this
                                milestone, ranking customers by their progress
                                towards the target.
                            preferredTillId:
                              type: integer
                              description: >-
                                The ID of the preferred till (point-of-sale
                                terminal) used for transaction tracking within
                                this milestone. Set to the org's default till ID
                                if not targeting a specific terminal.
                            cycleActionMapping:
                              type: array
                              description: >-
                                Per-cycle target and action definitions. Each
                                entry maps a cycle to its date range, target
                                value, and optional actions. When
                                sameActionsForEveryCycle is true, the actions
                                array can be left empty in every entry.
                              items:
                                type: object
                                properties:
                                  cycle:
                                    type: string
                                    description: >-
                                      The cycle identifier (e.g., Cycle_1,
                                      Cycle_2). Auto-generated by the system
                                      based on frequencyType and the promotion
                                      date range.
                                  startDate:
                                    type: string
                                    description: >-
                                      Start date and time of this cycle in ISO
                                      8601 format.
                                  endDate:
                                    type: string
                                    description: >-
                                      End date and time of this cycle in ISO
                                      8601 format.
                                  defaultValue:
                                    type: string
                                    description: >-
                                      The target value for this specific cycle.
                                      Only used when
                                      differentTargetsForEveryCycle is true;
                                      otherwise the milestone-level defaultValue
                                      applies.
                                  actions:
                                    type: array
                                    description: >-
                                      Actions to execute when this cycle's
                                      target is met. Leave as an empty array
                                      when sameActionsForEveryCycle is true.
                                    items:
                                      type: object
                      commonCycleActionMapping:
                        type: array
                        description: >-
                          Maps reward actions directly to cycles for this
                          activity. Use commonCycleActionMapping when the
                          promotion rewards customers on every qualifying event
                          with no target threshold to hit. Leave this empty and
                          populate milestones instead when the reward is
                          conditional on reaching a defined target (e.g., spend
                          $500, complete 10 check-ins).
                        example:
                          - cycle: PlaceholderCycle
                            actions:
                              - id: placeholder_action
                                actionName: NO_OP_ACTION
                                actionClass: >-
                                  com.capillary.loyalty.engine.impl.action.NoOpAction
                                description: Placeholder Action - Does Nothing
                                mandatoryPropertiesValues: {}
                        items:
                          type: object
                          example:
                            cycle: PlaceholderCycle
                            actions:
                              - id: placeholder_action
                                actionName: NO_OP_ACTION
                                actionClass: >-
                                  com.capillary.loyalty.engine.impl.action.NoOpAction
                                description: Placeholder Action - Does Nothing
                                mandatoryPropertiesValues: {}
                          properties:
                            cycle:
                              type: string
                              description: >-
                                The cycle identifier this mapping applies to
                                (e.g., Cycle_1). For promotions without
                                milestones, use a single cycle ID spanning the
                                full promotion period.
                              example: PlaceholderCycle
                            actions:
                              type: array
                              example:
                                - id: placeholder_action
                                  actionName: NO_OP_ACTION
                                  actionClass: >-
                                    com.capillary.loyalty.engine.impl.action.NoOpAction
                                  description: Placeholder Action - Does Nothing
                                  mandatoryPropertiesValues: {}
                              items:
                                type: object
                                example:
                                  id: placeholder_action
                                  actionName: NO_OP_ACTION
                                  actionClass: >-
                                    com.capillary.loyalty.engine.impl.action.NoOpAction
                                  description: Placeholder Action - Does Nothing
                                  mandatoryPropertiesValues: {}
                                properties:
                                  id:
                                    type: string
                                    description: >-
                                      A unique identifier for this action.
                                      Caller-supplied string.
                                    example: placeholder_action
                                  actionName:
                                    type: string
                                    description: >-
                                      The reward action to execute. The
                                      corresponding implementation class must be
                                      set in delegateActionClass inside
                                      mandatoryPropertiesValues. Points and
                                      currency:
                                      ADVANCE_CURRENCY_ALLOCATION_ACTION,
                                      AWARD_POINTS_ACTION,
                                      AWARD_TARGET_POINTS_ACTION,
                                      BILL_POINTS_ACTION,
                                      DELAYED_ACCRUAL_ACTION,
                                      TRIGGER_BASED_DELAYED_ACCRUAL_ACTION,
                                      REDEEM_POINTS_ACTION,
                                      POINTS_REDEMPTION_REVERSAL_ACTION,
                                      POINTS_TRANSFER_ACTION,
                                      POINTS_GROUP_TRANSFER_ACTION,
                                      POINTS_GROUP_REDEMPTION_ACTION,
                                      POINTS_CONTRIBUTION_TO_GROUP_ACTION,
                                      AWARD_REFERRER_POINTS_ACTION,
                                      AWARD_REFEREE_POINTS_ACTION. Tier and
                                      slab: UPGRADE_SLAB_ACTION,
                                      UPGRADE_SLAB_ACTION_SLAB,
                                      UPGRADE_SLAB_ACTION_STRATEGY,
                                      RENEW_SLAB_ACTION, TIER_ACTION_V2,
                                      UPGRADE_TIER_BASED_ON_PARTNER_PROGRAM,
                                      RENEW_TIER_BASED_ON_PARTNER_PROGRAM.
                                      Voucher, promotion, and reward:
                                      PE_ISSUE_VOUCHER_ACTION,
                                      ISSUE_PROMOTION_ACTION,
                                      EARN_PROMOTION_ACTION,
                                      CONVERT_POINTS_TO_REWARD_ACTION,
                                      BADGE_EARN_ACTION. Communication:
                                      SEND_COMMUNICATION_ACTION,
                                      PE_EMAIL_ACTION, PE_SMS_ACTION,
                                      PE_MOBILE_PUSH_ACTION, PE_FACEBOOK_ACTION,
                                      PE_WECHAT_MESSAGE_ACTION,
                                      PE_MESSAGE_ACTION, EBILL_ACTION. Customer
                                      and status: TAG_CUSTOMER_ACTION,
                                      STATUS_LABEL_UPDATE_ACTION,
                                      INITIATE_SUPPLEMENTARY_MEMBERSHIP. Other:
                                      TRACKER_EVALUATION_ACTION,
                                      RETURN_BILL_ACTION,
                                      REEVALUATE_REGULAR_BILL, FORWARD,
                                      NO_OP_ACTION (placeholder, performs no
                                      reward).
                                    example: NO_OP_ACTION
                                  actionClass:
                                    type: string
                                    description: >-
                                      The fully qualified Java wrapper class for
                                      this action. For point allocation actions
                                      (ADVANCE_CURRENCY_ALLOCATION_ACTION,
                                      AWARD_POINTS_ACTION, BILL_POINTS_ACTION,
                                      etc.), use
                                      com.capillary.shopbook.pointsengine.endpoint.impl.action.CommunicationDecoratorActionImpl.
                                      The specific action implementation is set
                                      separately via delegateActionClass inside
                                      mandatoryPropertiesValues.
                                    example: >-
                                      com.capillary.loyalty.engine.impl.action.NoOpAction
                                  description:
                                    type: string
                                    description: >-
                                      A human-readable description of what this
                                      action does.
                                    example: Placeholder Action - Does Nothing
                                  mandatoryPropertiesValues:
                                    type: object
                                    description: >-
                                      Key-value map of configuration properties
                                      for this action. All values are strings.
                                      Supported keys:

                                      delegateActionClass — The specific action
                                      implementation class. Set this to the
                                      class that corresponds to the actionName.
                                      For example,
                                      ADVANCE_CURRENCY_ALLOCATION_ACTION uses
                                      com.capillary.shopbook.pointsengine.endpoint.impl.action.AdvanceCurrencyAllocationActionImpl.

                                      PointType — The point category to award.
                                      Valid values are the point type names
                                      configured for the org (e.g., Main,
                                      Promotional). Defaults to the main point
                                      type if omitted.

                                      Currency — The currency type to award.
                                      POINTS for standard loyalty points. Any
                                      org-configured alternate currency
                                      identifier (e.g., MILES, CASHBACK) is also
                                      valid.

                                      Event Name — The event name that this
                                      action responds to. Must match the event
                                      field of the parent activity (e.g.,
                                      TransactionAdd, TargetCompleted).

                                      PointsRoundingStrategy — How the final
                                      points amount is rounded. ACTUAL
                                      (default): rounds half-up. FLOOR: always
                                      rounds down. ROUND: rounds to nearest.
                                      ROUND_TO_NEAREST: rounds to nearest
                                      (half-down variant).

                                      SourceValueRoundingStrategy — How the
                                      source value (e.g., bill amount) is
                                      rounded before points are calculated.
                                      ACTUAL (default): no rounding. FLOOR:
                                      always rounds down. ROUND: rounds to
                                      nearest. ROUND_TO_NEAREST: rounds to
                                      nearest (half-down variant).

                                      DelayStrategy — Controls when points are
                                      accrued. AS_DEFINED_IN_ALLOCATION_STRATEGY
                                      (default): follows the allocation
                                      strategy.
                                      FIXED_DELAY_FROM_ITEM_RETURN_PERIOD:
                                      accrues after the item return period.
                                      ON_EXTERNAL_TRIGGER: accrues only when an
                                      external trigger fires.
                                      FIXED_DELAY_FROM_TXN_ITEM_EXT_FIELD: delay
                                      read from a transaction/line item extended
                                      field. ACCRUAL_DATE_AS_PER_BE_ATTRIBUTE:
                                      uses a backend attribute for the accrual
                                      date.
                                      ACCRUAL_DATE_FROM_TXN_ITEM_EXT_FIELD:
                                      reads accrual date from a transaction/line
                                      item extended field.
                                      FIXED_DELAY_FROM_BE_ATTRIBUTE: delays by a
                                      fixed duration from a backend attribute.

                                      ProRateOnSourceValue — The base value used
                                      when prorating points. EVENT_DEFAULT_VALUE
                                      (default): the event's default value
                                      (e.g., bill amount). AMOUNT: transaction
                                      or line item amount. QUANTITY: item
                                      quantity. LINEITEM_AMOUNT: individual line
                                      item amount. LINEITEM_QUANTITY: individual
                                      line item quantity. DEFINED_TARGET: the
                                      defined milestone target value.
                                      ACHIEVED_VALUE: value achieved towards a
                                      target.
                                      ACHIEVED_VALUE_MINUS_DEFINED_TARGET:
                                      achieved minus target. TRACKED_VALUE: a
                                      tracker's current tracked value.
                                      TRACKER_EVALUATION: the tracker evaluation
                                      result. CURRENT_AGGREGATE /
                                      PREVIOUS_AGGREGATE: tracker aggregate
                                      values. GENERIC_EVENT_FIELD_VALUE: a named
                                      field from the event.
                                      TRANSACTION_EXTENDED_FIELD /
                                      LINEITEM_EXTENDED_FIELD /
                                      CUSTOMER_EXTENDED_FIELD /
                                      CUSTOMER_CUSTOM_FIELD: extended or custom
                                      attribute values. GAP_TO_UPGRADE: gap
                                      between next slab threshold and current
                                      tracker value before the event.
                                      GAP_TO_UPGRADE_AFTER_EVENT: same gap
                                      computed after the event.
                                      CURRENT_EVENT_TRACKED_VALUE: value tracked
                                      in the current event.
                                      EXCESS_AFTER_UPGRADE: amount by which the
                                      current event exceeds the upgrade gap.

                                      EvaluatedEntity — The entity the action is
                                      evaluated against. USER (default): the
                                      individual customer. USERGROUP2: a user
                                      group. USER_ENTITY_REFERENCE: same as
                                      USERGROUP2.

                                      ProrateFieldName — The exact field name to
                                      use when ProRateOnSourceValue is a
                                      field-based value (e.g.,
                                      TRANSACTION_EXTENDED_FIELD). Leave as an
                                      empty string if not applicable.
                                    additionalProperties:
                                      type: string
                                  mandatoryComplexPropertiesValues:
                                    type: object
                                    description: >-
                                      Key-value map of complex (object or array)
                                      configuration properties for this action.
                                      Returns {} for most actions.

                                      Only populated for actions that support
                                      line-item filtering — restricting awards
                                      to specific SKUs, brands, or categories.
                                      Supported on
                                      AdvanceCurrencyAllocationActionImpl and
                                      badge earn actions only.
                                    additionalProperties: true
                                  embeddedStrategies:
                                    type: array
                                    description: >-
                                      Inline strategy configurations attached to
                                      this action. Defines how points are
                                      allocated (strategyTypeId 1) and when they
                                      expire (strategyTypeId 3) without
                                      requiring a pre-configured strategy. Each
                                      action supports at most one allocation
                                      strategy and one expiry strategy.
                                    items:
                                      type: object
                                      properties:
                                        strategyTypeId:
                                          type: integer
                                          description: >-
                                            Identifies the strategy type. 1: point
                                            allocation strategy — defines how many
                                            points to award per slab. 3: point
                                            expiry strategy — defines when awarded
                                            points expire. These are the only valid
                                            values.
                                          enum:
                                            - 1
                                            - 3
                                        propertyValues:
                                          type: string
                                          description: >-
                                            JSON string containing the strategy
                                            configuration. Fields differ by
                                            strategyTypeId.

                                            For strategyTypeId 1 (allocation):
                                            allocation_type (only FIXED confirmed)
                                            and allocation_values (comma-separated
                                            point amounts, one per slab level —
                                            e.g., "100,100,100,100,100,100,100,100"
                                            for 8 slabs).

                                            For strategyTypeId 3 (expiry):
                                            expiry_type (SLAB_INDEPENDENT: same
                                            expiry for all slabs; SLAB_BASED: expiry
                                            differs per slab), expiry_from (when the
                                            expiry clock starts — CURRENT_DATE,
                                            CUSTOMER_ENROLLMENT_DATE,
                                            ACTIVITY_BASED_EXTENSION,
                                            MEMBERSHIP_DATE,
                                            FARTHEST_POINTS_TRANSFERRED_EXPIRY_DATE,
                                            EXPIRY_DATE_BEFORE_REDEMPTION_REVERSAL,
                                            EXPIRY_DATE_BEFORE_POINTS_CONTRIBUTION_TO_GROUP,
                                            BILL_EXTENDED_FIELD,
                                            LINEITEM_EXTENDED_FIELD,
                                            CUSTOMER_EXTENDED_FIELD),
                                            expiry_time_units (comma-separated unit
                                            per slab — NUM_DAYS, MONTH_END,
                                            NUM_MONTHS, NUM_MONTHS_END, YEAR_END,
                                            NUM_YEARS, NEVER, FIXED_DATE,
                                            ENROLLMENT_DATE,
                                            FIXED_DATE_WITHOUT_YEAR),
                                            expiry_time_values (comma-separated
                                            values per slab — date strings when unit
                                            is FIXED_DATE; numeric duration when
                                            unit is NUM_DAYS/NUM_MONTHS/etc.; use
                                            "100" as a placeholder when unit is
                                            NEVER).
                                        owner:
                                          type: string
                                          description: >-
                                            The system that owns this strategy.
                                            Typically LOYALTY.
                                        strategySubType:
                                          type: string
                                          description: >-
                                            The strategy sub-type. DEFAULT is the
                                            standard value.
                                        useCommonExpiryStrategy:
                                          type: boolean
                                          nullable: true
                                          description: >-
                                            Controls whether this embedded strategy
                                            references a shared expiry from
                                            commonStrategies.expiry instead of
                                            defining expiry inline.

                                            Null when using inline expiry
                                            (propertyValues is set directly on this
                                            strategy). True when the action's
                                            embedded strategy should point to a
                                            named shared expiry entry in
                                            commonStrategies.expiry.

                                            Only valid for expiry strategies
                                            (strategyTypeId: 3). Using on a
                                            non-expiry strategy causes a validation
                                            error.

                                            Validation rules: (1) If true,
                                            strategyRef must be non-empty — error:
                                            "Expiry strategy must provide a
                                            non-empty strategyRef". (2) If true,
                                            propertyValues must not be set — error:
                                            "Expiry strategy cannot set
                                            propertyValues when
                                            useCommonExpiryStrategy=true".

                                            Inline example: {"strategyTypeId": 3,
                                            "propertyValues": "{...}",
                                            "useCommonExpiryStrategy": null} Shared
                                            reference example: {"strategyTypeId": 3,
                                            "useCommonExpiryStrategy": true,
                                            "strategyRef": "shared_expiry_90d"}
                                        strategyRef:
                                          type: string
                                          nullable: true
                                          description: >-
                                            The name/key of the shared expiry entry
                                            in commonStrategies.expiry to use. Null
                                            when useCommonExpiryStrategy is null
                                            (inline expiry mode).

                                            Only valid for expiry strategies
                                            (strategyTypeId: 3).

                                            Validation rules: (1) Must be non-empty
                                            when useCommonExpiryStrategy is true —
                                            error: "Expiry strategy must provide a
                                            non-empty strategyRef". (2) Must match
                                            an existing entry in
                                            commonStrategies.expiry — error:
                                            "Invalid common expiry strategyRef
                                            '<ref>'". (3) All strategyRef values in
                                            commonStrategies.expiry must be unique.
                                            (4) Not applicable for allocation
                                            strategies (strategyTypeId: 1).

                                            Example: "strategyRef":
                                            "shared_expiry_90d"
                limits:
                  type: array
                  example:
                    - entityScope: PROGRAM
                      entityId: 2607
                      granularity: USER
                      actionType: AWARD_CURRENCY
                      actionSubTypeId: Points
                      limitType: SUM
                      limitValue: 10000
                      period:
                        periodType: FIXED_CALENDAR_WINDOW
                        periodUnit: MONTHS
                        periodValue: 1
                      active: true
                  items:
                    type: object
                    example:
                      entityScope: PROGRAM
                      entityId: 2607
                      granularity: USER
                      actionType: AWARD_CURRENCY
                      actionSubTypeId: Points
                      limitType: SUM
                      limitValue: 10000
                      period:
                        periodType: FIXED_CALENDAR_WINDOW
                        periodUnit: MONTHS
                        periodValue: 1
                      active: true
                    properties:
                      entityScope:
                        type: string
                        description: >-
                          The scope at which this limit is enforced. PROGRAM:
                          applies across the entire loyalty program. PROMOTION:
                          scoped to this promotion only.
                        enum:
                          - PROGRAM
                          - PROMOTION
                        example: PROGRAM
                      entityId:
                        type: integer
                        description: >-
                          The numeric ID of the entity the limit applies to.
                          Required when entityScope is PROGRAM — set this to the
                          programId. Not required when entityScope is PROMOTION.
                        example: 2607
                      granularity:
                        type: string
                        description: >-
                          The level at which the limit is tracked. USER: limit
                          is applied per individual customer. OVERALL: limit is
                          applied across all customers combined. PER_ACTIVITY:
                          limit is tracked per activity within the promotion.
                        enum:
                          - OVERALL
                          - USER
                          - PER_ACTIVITY
                        example: USER
                      actionType:
                        type: string
                        description: >-
                          The type of reward action this limit constrains.
                          Supported values: AWARD_CURRENCY (points/currency),
                          AWARD_BADGE, ISSUE_COUPON, ISSUE_REWARD, UPGRADE_TIER,
                          RENEW_TIER, DOWNGRADE_TIER.
                        enum:
                          - AWARD_CURRENCY
                          - AWARD_BADGE
                          - ISSUE_COUPON
                          - ISSUE_REWARD
                          - UPGRADE_TIER
                          - RENEW_TIER
                          - DOWNGRADE_TIER
                        example: AWARD_CURRENCY
                      actionSubTypeId:
                        type: string
                        description: >-
                          The specific currency or sub-type this limit targets.
                          For points-based limits, use the point type name
                          (e.g., Points).
                        example: Points
                      limitType:
                        type: string
                        description: >-
                          How the limit is measured. SUM: caps the total value
                          awarded (e.g., max 10,000 points per month). COUNT:
                          caps the number of times the reward action fires
                          (e.g., max 5 reward events).
                        enum:
                          - SUM
                          - COUNT
                        example: SUM
                      limitValue:
                        type: integer
                        description: >-
                          The maximum allowed threshold for this limit. For SUM
                          limits this is the total points/currency cap; for
                          COUNT limits this is the maximum number of reward
                          occurrences.
                        example: 10000
                      period:
                        type: object
                        properties:
                          periodType:
                            type: string
                            description: >-
                              Defines the time window for this limit.
                              NON_PERIOD_BASED: limit applies for the lifetime
                              of the promotion with no reset.
                              FIXED_CALENDAR_WINDOW: resets on a fixed calendar
                              cycle (e.g., monthly on the 1st). MOVING_WINDOW: a
                              rolling window relative to the current date (e.g.,
                              last 30 days). FIXED_WINDOW: a specific fixed date
                              range.
                            enum:
                              - MOVING_WINDOW
                              - FIXED_CALENDAR_WINDOW
                              - NON_PERIOD_BASED
                              - FIXED_WINDOW
                            example: FIXED_CALENDAR_WINDOW
                          periodUnit:
                            type: string
                            description: >-
                              The time unit for the period window. Required when
                              periodType is FIXED_CALENDAR_WINDOW or
                              MOVING_WINDOW.
                            enum:
                              - DAYS
                              - WEEKS
                              - MONTHS
                            example: MONTHS
                          periodValue:
                            type: integer
                            description: >-
                              The number of time units in the window (e.g.,
                              periodValue: 1 with periodUnit: MONTHS means a
                              1-month window).
                            example: 1
                      active:
                        type: boolean
                        description: >-
                          Whether this limit is currently active and being
                          enforced.
                        example: true
                liabilityOwnerSplitInfo:
                  type: array
                  example: []
                  items:
                    type: string
                workflowMetadata:
                  type: object
                  description: >-
                    Configures opt-in and enrollment workflows. Required for
                    LOYALTY and LOYALTY_EARNING promotion types. For GENERIC
                    promotions, pass an empty object ({}) for both enrolment and
                    optin.
                  properties:
                    enrolment:
                      type: object
                      description: >-
                        Enrollment workflow configuration. Controls how and when
                        customers become enrolled in the promotion.
                      properties:
                        basedOn:
                          type: string
                          description: >-
                            The enrollment trigger. ACTIVITY: customers are
                            enrolled upon completing a defined activity.
                            AUDIENCE: all customers in the specified audience
                            groups are enrolled. EXTERNAL_TRIGGER: enrollment is
                            triggered by an external system call.
                          enum:
                            - ACTIVITY
                            - AUDIENCE
                            - EXTERNAL_TRIGGER
                        audienceMapping:
                          type: array
                          description: >-
                            The audience groups whose members will be enrolled.
                            Required when basedOn is AUDIENCE.
                          items:
                            type: object
                            properties:
                              groupId:
                                type: integer
                                description: The numeric ID of the audience group.
                              groupName:
                                type: string
                                description: >-
                                  The name of the audience group. Maximum 255
                                  characters.
                        restrictions:
                          type: object
                          description: Enrollment-level constraints and expiry rules.
                          properties:
                            enrolmentLimitPerCustomer:
                              type: object
                              description: >-
                                Maximum number of times a single customer can be
                                enrolled in this promotion.
                              properties:
                                value:
                                  type: integer
                                  description: The maximum enrollment count per customer.
                                type:
                                  type: string
                                  description: >-
                                    NON_PERIOD_BASED: lifetime limit with no
                                    reset. PERIOD_BASED: limit resets on a
                                    rolling period defined by periodType and
                                    periodUnit.
                                  enum:
                                    - NON_PERIOD_BASED
                                    - PERIOD_BASED
                            enrolmentLimitPerPromotion:
                              type: object
                              description: >-
                                Maximum total enrollments allowed across all
                                customers for this promotion.
                              properties:
                                value:
                                  type: integer
                                type:
                                  type: string
                                  enum:
