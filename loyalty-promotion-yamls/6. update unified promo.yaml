openapi: 3.0.1
info:
  title: Sample API
  version: 1.0.0
  description: >-
    API specification generated from cURL for PUT
    /api_gateway/v1/promotions/%7Bpromotion_id%7D
servers:
  - url: https://{host}
paths:
  /v3/promotions/{promotion_id}:
    put:
      summary: Update a Loyalty Promotion
      description: Endpoint for PUT /api_gateway/v1/promotions/%7Bpromotion_id%7D
      operationId: putApi_gatewayv1promotions7Bpromotion_id7D
      parameters:
        - name: X-CAP-API-AUTH-ORG-ID
          in: header
          required: false
          schema:
            type: string
            example: '100232'
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
            example: pyapps_auto_Promotion_Engine_Eucrm_Smoke
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
            example: Basic bmFtYW5fZGgyMzA3MWJmYjM5OGM5ZmM2YjZlY2I2MmEy
        - in: path
          name: promotion_id
          schema:
            type: string
          required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Created:
                  summary: Created
                  value:
                    data:
                      metadata:
                        name: Efd Activity Based Prom11
                        description: >-
                          Enrollment for all members, requires activity-based
                          opt-in.
                        programId: HiddenGemDefaultProgram_ID
                        orgId: 51174
                        startDate: '2025-11-27T05:30:00+05:30'
                        endDate: '2025-12-28T05:29:59+05:30'
                        timezoneName: Asia/Kolkata
                        promotionType: LOYALTY
                        status: DRAFT
