                      comments: null
                      parentId: null
                      version: 1
                      limits: []
                      liabilityOwnerSplitInfo: []
                      id: 68f7a304fd5b970d1efaf626
                      workflowMetadata:
                        enrolment:
                          basedOn: null
                          activities: null
                          audienceMapping: null
                          restrictions: null
                        optin:
                          basedOn: ACTIVITY
                          audienceMapping: null
                          activities:
                            - type: SINGLE
                              id: activity_optin_trigger
                              name: Opt-in Trigger Activity
                              event: TransactionAdd
                              allCycles: []
                          restrictions: null
                    errors: null
                    warnings: null
          description: Created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: CODE_Promotion_Test_17573886
                orgId:
                  type: integer
                  example: 100027
                priority:
                  type: integer
                  example: 0
                active:
                  type: boolean
                  example: true
                messageLabel:
                  type: string
                  example: test!!
                type:
                  type: string
                  example: CODE
                condition:
                  type: object
                  properties:
                    type:
                      type: string
                      example: CART
                    cartCondition:
                      type: object
                      properties:
                        kpi:
                          type: string
                          example: SUBTOTAL
                        operator:
                          type: string
                          example: EQUALS
                        value:
                          type: integer
                          example: 250
                action:
                  type: object
                  properties:
                    type:
                      type: string
                      example: CART_BASED
                    cartBasedAction:
                      type: object
                      properties:
                        type:
                          type: string
                          example: ABSOLUTE
                        value:
                          type: integer
                          example: 25
                createdBy:
                  type: integer
                  example: 70707
                createdOn:
                  type: integer
                  example: 0
                lastUpdatedBy:
                  type: integer
                  example: 70707
                startDate:
                  type: integer
                  example: '1857388651000'
                endDate:
                  type: integer
                  example: '1857475051000'
                campaignId:
                  type: integer
                  example: 39077
                mode:
                  type: string
                  example: DISCOUNT
                promotionRestrictions:
                  type: object
                  properties:
                    Code:
                      type: array
                      example:
                        - kpi: REDEMPTION
                          limit: 1
                      items:
                        type: object
                        example:
                          kpi: REDEMPTION
                          limit: 1
                        properties:
                          kpi:
                            type: string
                            example: REDEMPTION
                          limit:
                            type: integer
                            example: 1
                isStackable:
                  type: boolean
                  example: false
              description: Request body as an object
        description: Request body
        required: false
